<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — Thong's Learning Hub</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <span class="brand">Thong's Learning Hub</span>
    <div style="display:flex; align-items:center;">
      <span class="badge" id="who-badge" style="display:none;"></span>
      <span class="who" id="who"></span>
      <button class="ghost" id="lang-btn" style="margin-right:0.5rem;"></button>
      <button class="ghost" id="signout" data-i18n="sign_out">Sign out</button>
    </div>
  </header>

  <main class="container" id="app">
    <p class="empty" data-i18n="loading">Loading…</p>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="lang.js"></script>
  <script src="config.js"></script>
  <script>
    applyI18n();
    const langBtn = document.getElementById("lang-btn");
    langBtn.textContent = LANG === "en" ? "VI" : "EN";
    langBtn.title = t("lang_name");
    langBtn.addEventListener("click", () => setLang(otherLang()));

    const app = document.getElementById("app");
    const who = document.getElementById("who");
    let user = null;
    let adminTab = "lessons";

    document.getElementById("signout").addEventListener("click", async () => {
      await sb.auth.signOut();
      window.location.href = "index.html";
    });

    function esc(s) {
      return String(s ?? "").replace(/[&<>"']/g, c =>
        ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" }[c]));
    }

    // Label a file/link by its extension.
    function kindOf(name) {
      const e = (String(name || "").split("?")[0].split(".").pop() || "").toLowerCase();
      return ({ pdf:"pdf", doc:"word", docx:"word", ppt:"powerpoint", pptx:"powerpoint",
                xls:"excel", xlsx:"excel", csv:"excel", html:"html", htm:"html",
                mp3:"audio", wav:"audio", m4a:"audio", mp4:"video",
                png:"image", jpg:"image", jpeg:"image", webp:"image", gif:"image",
                txt:"text" })[e] || null;
    }

    function iconFor(kind) {
      return ({ pdf:"📄", word:"📝", powerpoint:"📊", excel:"📈", html:"🌐",
                audio:"🎧", video:"🎬", image:"🖼️", text:"📃", link:"🔗" })[kind] || "📄";
    }

    // Open an uploaded material via a short-lived signed link.
    // Supabase only grants the link if this user may access the file.
    function wireFileButtons(scope) {
      scope.querySelectorAll(".open-file").forEach(btn => {
        btn.addEventListener("click", async () => {
          btn.disabled = true;
          const { data, error } = await sb.storage
            .from("materials").createSignedUrl(btn.getAttribute("data-path"), 3600);
          btn.disabled = false;
          if (error) { alert(t("file_open_fail") + error.message); return; }
          window.open(data.signedUrl, "_blank", "noopener");
        });
      });
    }

    async function start() {
      const { data: { session } } = await sb.auth.getSession();
      if (!session) { window.location.href = "index.html"; return; }
      user = session.user;

      const { data: profile } = await sb
        .from("profiles").select("full_name, role, avatar_url, active_session, multi_device").eq("id", user.id).single();

      // ---- one device per student account ----
      // (admins and accounts you've granted multi-device are exempt)
      if (profile?.role !== "admin" && !profile?.multi_device) {
        let device = null;
        try { device = localStorage.getItem("hub_device"); } catch (e) {}
        if (!device) {
          device = crypto.randomUUID();
          try { localStorage.setItem("hub_device", device); } catch (e) {}
        }
        const kick = async () => {
          try { await sb.auth.signOut({ scope: "local" }); } catch (e) {}
          window.location.href = "index.html?kicked=1";
        };
        if (!profile?.active_session) {
          // Legacy session from before this feature: claim this device.
          await sb.from("profiles").update({ active_session: device }).eq("id", user.id);
        } else if (profile.active_session !== device) {
          kick(); return;
        }
        // Re-check periodically: if another device logs in, leave.
        setInterval(async () => {
          const { data } = await sb.from("profiles")
            .select("active_session").eq("id", user.id).single();
          if (data?.active_session && data.active_session !== device) kick();
        }, 45000);
      }

      const name = profile?.full_name || user.email;
      who.textContent = name;
      const badge = document.getElementById("who-badge");
      badge.style.display = "inline-flex";
      badge.innerHTML = profile?.avatar_url
        ? `<img src="${esc(profile.avatar_url)}" alt="" />`
        : esc(String(name).charAt(0).toUpperCase());

      if (profile?.role === "admin") renderAdmin();
      else renderStudent();
    }

    // ---------- STUDENT VIEW ----------
    async function renderStudent() {
      // RLS already filters these to: my courses, their lessons,
      // plus any lesson that has no course.
      const { data: courses } = await sb
        .from("courses").select("*").order("sort_order").order("created_at");
      const { data: lessons } = await sb
        .from("lessons").select("*").order("sort_order").order("created_at");
      const { data: mine } = await sb
        .from("progress").select("lesson_id, status").eq("student_id", user.id);
      const { data: anns } = await sb
        .from("announcements").select("*")
        .order("created_at", { ascending: false }).limit(10);

      const done = new Set((mine || []).filter(p => p.status === "completed").map(p => p.lesson_id));

      const withLms = l => l.url + (l.url.includes("?") ? "&" : "?") + "lms=" + l.id;

      const lessonRow = l => `
        <div class="lesson">
          <span class="icon">${iconFor(l.kind)}</span>
          <div class="meta">
            <div class="title">${esc(l.title)}</div>
            <span class="kind">${esc(l.kind)}</span>
          </div>
          ${l.storage_path
            ? `<button class="ghost open-file" data-lesson="${l.id}" data-path="${esc(l.storage_path)}">${t("open")}</button>`
            : `<a class="btn ghost open-link" data-lesson="${l.id}" href="${esc(withLms(l))}" target="_blank" rel="noopener">${t("open")}</a>`}
          ${done.has(l.id)
            ? `<span class="pill done">${t("completed_pill")}</span>`
            : `<button data-lesson="${l.id}" class="mark">${t("mark_done")}</button>`}
        </div>`;

      // Which lessons are locked? In a "sequential" course, everything
      // after the first uncompleted lesson is locked.
      const lockedSet = new Set();
      for (const c of (courses || [])) {
        if (!c.sequential) continue;
        const ls = (lessons || []).filter(l => l.course_id === c.id);
        const fi = ls.findIndex(x => !done.has(x.id));
        if (fi === -1) continue;
        ls.forEach((l, i) => { if (i > fi) lockedSet.add(l.id); });
      }
      const fmtDur = m => m >= 60
        ? Math.floor(m / 60) + "h" + (m % 60 ? " " + (m % 60) + "m" : "")
        : m + " min";

      // One roadmap card per course, grouped into collapsible categories.
      const courseCard = c => {
        const ls = (lessons || []).filter(l => l.course_id === c.id);
        const doneCount = ls.filter(l => done.has(l.id)).length;
        const pct = ls.length ? Math.round(doneCount / ls.length * 100) : 0;
        const complete = ls.length > 0 && doneCount === ls.length;
        const color = c.color || "#1e4f8f";
        const firstOpen = ls.findIndex(x => !done.has(x.id));
        const minsLeft = ls.filter(l => !done.has(l.id))
          .reduce((s, l) => s + (l.est_minutes || 0), 0);

        const BADGES = [["🌱", 25], ["⭐", 50], ["🏅", 75], ["🏆", 100]];
        const badgeRow = ls.length ? `
          <div class="badges">
            ${BADGES.map(([b, th]) =>
              `<span class="b ${pct >= th ? "earned" : ""}" title="${th}%">${b}</span>`).join("")}
            ${minsLeft ? `<span class="kind" style="margin-left:auto;">${tf("time_left", { t: fmtDur(minsLeft) })}</span>` : ""}
          </div>` : "";

        const rows = ls.map((l, i) => {
          const isDone = done.has(l.id);
          const isLocked = lockedSet.has(l.id);
          const isCurrent = !isDone && !isLocked && c.sequential && i === firstOpen;
          const nodeStyle = isDone
            ? `style="background:${esc(color)};border-color:${esc(color)};"`
            : (isCurrent ? `style="border-color:${esc(color)};"` : "");
          const node = `<span class="node ${isDone ? "done" : ""} ${isCurrent ? "current" : ""}" ${nodeStyle}>${isDone ? "✓" : i + 1}</span>`;
          const meta = `
            <div class="meta">
              <div class="title">${esc(l.title)}</div>
              <span class="kind">${esc(l.kind)}${l.est_minutes ? " · ~" + l.est_minutes + " min" : ""}${isLocked ? " · " + t("locked_hint") : ""}</span>
            </div>`;
          const actions = isLocked
            ? `<span class="pill todo">🔒 ${t("locked")}</span>`
            : `${l.storage_path
                ? `<button class="ghost open-file" data-lesson="${l.id}" data-path="${esc(l.storage_path)}">${t("open")}</button>`
                : `<a class="btn ghost open-link" data-lesson="${l.id}" href="${esc(withLms(l))}" target="_blank" rel="noopener">${t("open")}</a>`}
              ${isDone
                ? `<span class="pill done">${t("completed_pill")}</span>`
                : `<button data-lesson="${l.id}" class="mark">${t("mark_done")}</button>`}`;
          return `<div class="lesson ${isLocked ? "locked" : ""}">${node}${meta}${actions}</div>`;
        }).join("");

        return `
          <div class="card" id="course-${c.id}" style="border-top:4px solid ${esc(color)};">
            <h2>${esc(c.title)}
              <span class="kind" style="float:right;">${tf("done_count", { d: doneCount, t: ls.length })}</span></h2>
            <div class="progress"><span style="width:${pct}%; background:${esc(color)};"></span></div>
            ${badgeRow}
            ${c.description ? `<p style="color:var(--muted); font-size:0.88rem; margin:0 0 0.5rem;">${esc(c.description)}</p>` : ""}
            <div class="roadmap">${rows || `<p class="empty">${t("no_lessons_course")}</p>`}</div>
            ${complete ? `<div class="congrats">🎉 <span>${esc(c.title)}${t("congrats")}</span></div>` : ""}
          </div>`;
      };

      const byCat = {};
      for (const c of (courses || [])) {
        const cat = c.category || t("cat_other");
        (byCat[cat] = byCat[cat] || []).push(c);
      }
      let collapsedCats = {};
      try { collapsedCats = JSON.parse(localStorage.getItem("hub_cats") || "{}"); } catch (e) {}

      const catSections = Object.entries(byCat).map(([cat, cs]) => `
        <div class="cat ${collapsedCats[cat] ? "collapsed" : ""}" data-cat="${esc(cat)}">
          <button class="cat-head" type="button">
            <span class="chev">▸</span>
            <span style="flex:1;">${esc(cat)}</span>
            <span class="kind">${cs.length} ${cs.length === 1 ? "course" : "courses"}</span>
          </button>
          <div class="cat-body"><div>${cs.map(courseCard).join("")}</div></div>
        </div>`).join("");

      const loose = (lessons || []).filter(l => !l.course_id);
      const looseCard = loose.length
        ? `<div class="card"><h2>${t("other_lessons")}</h2>${loose.map(lessonRow).join("")}</div>` : "";

      // Announcements card (RLS already filtered to this student's courses).
      const annBody = s => esc(s).replace(/\n/g, "<br>");
      const annCard = (anns || []).length ? `
        <div class="card" id="ann-card" style="border-top:4px solid var(--gold);">
          <h2>📣 ${t("announcements")}</h2>
          ${(anns || []).map(a => `
            <div style="padding:0.55rem 0; border-bottom:1px solid var(--line);">
              <div style="font-size:0.92rem;">${annBody(a.body)}</div>
              <span class="kind">${a.course_id
                ? esc((courses || []).find(c => c.id === a.course_id)?.title || "")
                : t("ann_all")} · ${new Date(a.created_at).toLocaleDateString()}</span>
            </div>`).join("")}
        </div>` : "";

      // Instructor panel (teacher profile is readable thanks to migration 8).
      const { data: teachers } = await sb
        .from("profiles").select("full_name, avatar_url, bio").eq("role", "admin").limit(1);
      const teacher = (teachers || [])[0];
      const zaloUrl = "https://zalo.me/0961923983";
      const instructorCard = `
        <div class="card" style="border-top:4px solid var(--gold);">
          <h2>${t("your_teacher")}</h2>
          <div style="display:flex; gap:1.1rem; align-items:flex-start; flex-wrap:wrap;">
            ${teacher?.avatar_url
              ? `<img src="${esc(teacher.avatar_url)}" alt="" style="width:64px;height:64px;border-radius:50%;object-fit:cover;border:1px solid var(--line);flex:none;" />`
              : ""}
            <div style="flex:1; min-width:220px;">
              <div style="font-weight:700; font-size:1.05rem;">${esc(teacher?.full_name || "Thầy Lê Quốc Thông")}</div>
              ${teacher?.bio ? `<p style="color:var(--muted); font-size:0.88rem; margin:0.25rem 0 0.7rem;">${esc(teacher.bio)}</p>` : `<div style="height:0.5rem;"></div>`}
              <a class="btn" href="${zaloUrl}" target="_blank" rel="noopener"
                 style="text-decoration:none; display:inline-block;">💬 ${t("zalo_chat")}: 0961 923 983</a>
            </div>
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=110x110&data=${encodeURIComponent(zaloUrl)}"
                 alt="Zalo QR" width="110" height="110"
                 style="border:1px solid var(--line); border-radius:8px; flex:none;" />
          </div>
        </div>`;
      const hubFooter = `<footer class="hub-footer">Designed by Thầy Lê Quốc Thông · 📞 Zalo: 0961 923 983</footer>`;

      const { data: me } = await sb
        .from("profiles").select("full_name, bio, avatar_url").eq("id", user.id).single();

      const avatar = me?.avatar_url
        ? `<img src="${esc(me.avatar_url)}" alt="" style="width:84px;height:84px;border-radius:50%;object-fit:cover;border:1px solid var(--line);" />`
        : `<div style="width:84px;height:84px;border-radius:50%;background:var(--line);display:grid;place-items:center;font-family:var(--serif);font-size:2rem;color:var(--muted);">${esc((me?.full_name || user.email || "?").charAt(0).toUpperCase())}</div>`;

      const profileCard = `
        <div class="card">
          <h2>${t("my_profile")}</h2>
          <div style="display:flex; gap:1.25rem; align-items:flex-start; flex-wrap:wrap;">
            <div style="text-align:center;">
              ${avatar}
              <input type="file" id="p-file" accept="image/png,image/jpeg,image/webp,image/gif" style="display:none;" />
              <button class="ghost" id="p-pick" style="margin-top:0.6rem;">${t("change_photo")}</button>
            </div>
            <div style="flex:1; min-width:230px;">
              <div class="field"><label>${t("my_name")}</label>
                <input id="p-name" value="${esc(me?.full_name || "")}" placeholder="${esc(t("ph_name"))}" /></div>
              <div class="field"><label>${t("about_me")}</label>
                <input id="p-bio" value="${esc(me?.bio || "")}" placeholder="${esc(t("ph_bio"))}" /></div>
              <button id="p-save">${t("save_profile")}</button>
              <p id="p-msg" class="msg"></p>
            </div>
          </div>
        </div>`;

      app.innerHTML = `
        <p class="eyebrow">${t("my_lessons")}</p>
        <h1>${t("welcome")}${me?.full_name ? ", " + esc(me.full_name) : ""}</h1>
        <div class="search-wrap">
          <input id="hub-search" placeholder="${esc(t("search_ph"))}" autocomplete="off" />
          <div id="search-results" class="search-results" style="display:none;"></div>
        </div>
        ${annCard}
        ${catSections || `<div class="card"><p class="empty">${t("not_enrolled")}</p></div>`}
        ${looseCard}
        ${instructorCard}
        ${profileCard}
        ${hubFooter}`;

      document.getElementById("p-save").addEventListener("click", async () => {
        const m = document.getElementById("p-msg");
        const full_name = document.getElementById("p-name").value.trim() || null;
        const bio = document.getElementById("p-bio").value.trim() || null;
        const { error } = await sb.from("profiles").update({ full_name, bio }).eq("id", user.id);
        m.className = "msg" + (error ? " err" : "");
        m.textContent = error ? t("err_save") + error.message : t("saved");
        if (!error) who.textContent = full_name || user.email;
      });

      document.getElementById("p-pick").addEventListener("click", () =>
        document.getElementById("p-file").click());

      document.getElementById("p-file").addEventListener("change", async (e) => {
        const file = e.target.files[0];
        const m = document.getElementById("p-msg");
        if (!file) return;
        if (file.size > 2 * 1024 * 1024) {
          m.textContent = t("img_too_big"); m.className = "msg err"; return;
        }
        m.textContent = t("uploading"); m.className = "msg";
        const path = user.id + "/avatar";
        const { error: upErr } = await sb.storage.from("avatars")
          .upload(path, file, { upsert: true, contentType: file.type });
        if (upErr) { m.textContent = t("upload_failed") + upErr.message; m.className = "msg err"; return; }
        const { data } = sb.storage.from("avatars").getPublicUrl(path);
        const avatar_url = data.publicUrl + "?v=" + Date.now();
        const { error } = await sb.from("profiles").update({ avatar_url }).eq("id", user.id);
        if (error) { m.textContent = t("err_save") + error.message; m.className = "msg err"; return; }
        renderStudent();
      });

      wireFileButtons(app);

      // --- collapsible categories (state remembered per device) ---
      app.querySelectorAll(".cat-head").forEach(h => {
        h.addEventListener("click", () => {
          const catEl = h.parentElement;
          catEl.classList.toggle("collapsed");
          collapsedCats[catEl.getAttribute("data-cat")] = catEl.classList.contains("collapsed");
          try { localStorage.setItem("hub_cats", JSON.stringify(collapsedCats)); } catch (e) {}
        });
      });

      // --- instant search across courses and lessons ---
      const sInput = document.getElementById("hub-search");
      const sBox = document.getElementById("search-results");
      const normTxt = s => String(s || "").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
      const sIndex = [
        ...(anns || []).map(a => ({ type: "ann", title: a.body.slice(0, 70), sub: t("announcements"), obj: a })),
        ...(courses || []).map(c => ({ type: "course", title: c.title, sub: c.category || "", obj: c })),
        ...(lessons || []).map(l => ({
          type: "lesson", title: l.title,
          sub: (courses || []).find(c => c.id === l.course_id)?.title || t("other_lessons"), obj: l
        }))
      ];
      const hiLite = (text, q) => {
        const i = text.toLowerCase().indexOf(q.toLowerCase());
        if (i < 0) return esc(text);
        return esc(text.slice(0, i)) + "<mark>" + esc(text.slice(i, i + q.length)) + "</mark>" + esc(text.slice(i + q.length));
      };
      const openLesson = l => {
        if (lockedSet.has(l.id)) { alert(t("locked_hint")); return; }
        sb.from("lesson_activity").upsert({
          student_id: user.id, lesson_id: l.id, kind: "activity",
          key: "opened", value: 1, max_value: 1, updated_at: new Date().toISOString()
        }, { onConflict: "student_id,lesson_id,kind,key" }).then(() => {});
        if (l.storage_path) {
          sb.storage.from("materials").createSignedUrl(l.storage_path, 3600)
            .then(({ data, error }) => {
              if (error) alert(t("file_open_fail") + error.message);
              else window.open(data.signedUrl, "_blank", "noopener");
            });
        } else window.open(withLms(l), "_blank", "noopener");
      };
      sInput.addEventListener("input", () => {
        const q = sInput.value.trim();
        if (!q) { sBox.style.display = "none"; sBox.innerHTML = ""; return; }
        const nq = normTxt(q);
        const hits = sIndex.filter(it => normTxt(it.title).includes(nq) || normTxt(it.sub).includes(nq)).slice(0, 8);
        sBox.innerHTML = hits.length
          ? hits.map(it => `
              <button class="res" data-i="${sIndex.indexOf(it)}">
                <span>${it.type === "course" ? "📚" : it.type === "ann" ? "📣" : iconFor(it.obj.kind)}</span>
                <span style="flex:1;">${hiLite(it.title, q)}<br><span class="kind">${esc(it.sub)}</span></span>
              </button>`).join("")
          : `<div class="res" style="cursor:default;">${t("no_results")}</div>`;
        sBox.style.display = "block";
        sBox.querySelectorAll("button.res").forEach(b => b.addEventListener("click", () => {
          const it = sIndex[Number(b.getAttribute("data-i"))];
          sBox.style.display = "none"; sInput.value = "";
          if (it.type === "lesson") { openLesson(it.obj); return; }
          const el = it.type === "ann"
            ? document.getElementById("ann-card")
            : document.getElementById("course-" + it.obj.id);
          if (el) {
            const catEl = el.closest(".cat");
            if (catEl) catEl.classList.remove("collapsed");
            el.scrollIntoView({ behavior: "smooth", block: "start" });
            el.classList.add("flash");
            setTimeout(() => el.classList.remove("flash"), 1400);
          }
        }));
      });
      sInput.addEventListener("keydown", e => { if (e.key === "Escape") sBox.style.display = "none"; });
      if (!window.__hubDocClick) {
        window.__hubDocClick = true;
        document.addEventListener("click", e => {
          const box = document.getElementById("search-results");
          if (box && !e.target.closest(".search-wrap")) box.style.display = "none";
        });
      }

      // Record that the student opened a lesson (any type).
      app.querySelectorAll(".open-link, .open-file").forEach(el => {
        el.addEventListener("click", () => {
          const lid = el.getAttribute("data-lesson");
          if (!lid) return;
          sb.from("lesson_activity").upsert({
            student_id: user.id, lesson_id: lid, kind: "activity",
            key: "opened", value: 1, max_value: 1,
            updated_at: new Date().toISOString()
          }, { onConflict: "student_id,lesson_id,kind,key" }).then(() => {});
        });
      });

      app.querySelectorAll(".mark").forEach(btn => {
        btn.addEventListener("click", async () => {
          btn.disabled = true;
          const lesson_id = btn.getAttribute("data-lesson");
          const { error } = await sb.from("progress").upsert(
            { student_id: user.id, lesson_id, status: "completed", updated_at: new Date().toISOString() },
            { onConflict: "student_id,lesson_id" }
          );
          if (error) { btn.disabled = false; alert(t("save_retry")); return; }
          renderStudent();
        });
      });
    }

    // ---------- ADMIN VIEW ----------
    async function renderAdmin() {
      const { data: lessons } = await sb
        .from("lessons").select("*").order("sort_order").order("created_at");

      // Every student's progress, joined with names + lesson titles.
      const { data: prog } = await sb
        .from("progress")
        .select("status, updated_at, profiles(full_name, email), lessons(title)")
        .order("updated_at", { ascending: false });

      const { data: students } = await sb
        .from("profiles")
        .select("id, full_name, email, role, avatar_url, bio, multi_device")
        .order("created_at");

      const { data: courses } = await sb
        .from("courses").select("*").order("sort_order").order("created_at");

      const { data: enrollments } = await sb
        .from("enrollments")
        .select("id, profiles(full_name, email), courses(title)")
        .order("created_at");

      const { data: anns } = await sb
        .from("announcements").select("*").order("created_at", { ascending: false });

      const { data: activity } = await sb
        .from("lesson_activity")
        .select("kind, key, value, max_value, updated_at, profiles(full_name, email), lessons(title)")
        .order("updated_at", { ascending: false });

      const courseName = id => (courses || []).find(c => c.id === id)?.title || null;
      const studentName = s => s.full_name || s.email || "—";
      const onlyStudents = (students || []).filter(s => s.role !== "admin");

      const progressRows = (prog || []).map(p => `
        <tr>
          <td>${esc(p.profiles?.full_name || p.profiles?.email || "—")}</td>
          <td>${esc(p.lessons?.title || "—")}</td>
          <td>${p.status === "completed"
                ? `<span class="pill done">completed</span>`
                : `<span class="pill todo">in progress</span>`}</td>
          <td>${new Date(p.updated_at).toLocaleDateString()}</td>
        </tr>`).join("");

      const lessonList = (lessons || []).map(l => `
        <div class="lesson">
          <span class="icon">${iconFor(l.kind)}</span>
          <div class="meta">
            <div class="title">${esc(l.title)}</div>
            <span class="kind">#${l.sort_order ?? 0} · ${esc(l.kind)} · ${l.storage_path ? "uploaded file" : esc(l.url || "")}</span>
          </div>
          ${l.storage_path ? `<button class="ghost open-file" data-path="${esc(l.storage_path)}">Open</button>` : ""}
          <input type="number" class="l-min-edit" data-id="${l.id}" value="${l.est_minutes ?? ""}"
                 min="0" placeholder="min" title="Estimated minutes" style="max-width:70px; flex:none;" />
          <select class="l-move" data-id="${l.id}" style="max-width:150px;">
            <option value="">— no course —</option>
            ${(courses || []).map(c =>
              `<option value="${c.id}" ${l.course_id === c.id ? "selected" : ""}>${esc(c.title)}</option>`).join("")}
          </select>
          <button class="ghost l-save" data-id="${l.id}">Save</button>
          <button class="ghost l-del" data-id="${l.id}"
                  style="color:var(--danger); border-color:var(--danger);">Delete</button>
        </div>`).join("");

      const studentRows = (students || []).map(s => `
        <tr>
          <td style="width:40%;">
            <div style="display:flex; gap:0.5rem; align-items:center;">
              ${s.avatar_url
                ? `<img src="${esc(s.avatar_url)}" alt="" style="width:28px;height:28px;border-radius:50%;object-fit:cover;flex:none;" />`
                : ""}
              <input class="s-name" data-id="${s.id}"
                value="${esc(s.full_name || "")}" placeholder="Type a name…" />
            </div>
          </td>
          <td>${esc(s.email || "—")}${s.bio ? `<div class="kind" style="margin-top:0.15rem;">${esc(s.bio)}</div>` : ""}</td>
          <td>${s.role === "admin" ? `<span class="pill done">admin</span>` : "student"}</td>
          <td style="white-space:nowrap;">
            ${s.role === "admin"
              ? `<span class="kind">always</span>`
              : `<label style="font-size:0.82rem; color:var(--muted); cursor:pointer;">
                   <input type="checkbox" class="s-multi" data-id="${s.id}" ${s.multi_device ? "checked" : ""} /> allow
                 </label>`}
          </td>
          <td><button class="ghost s-save" data-id="${s.id}">Save</button></td>
        </tr>`).join("");

      const courseOptions = (courses || []).map(c =>
        `<option value="${c.id}">${esc(c.title)}</option>`).join("");
      const studentOptions = onlyStudents.map(s =>
        `<option value="${s.id}">${esc(studentName(s))}</option>`).join("");

      const courseList = (courses || []).map(c => `
        <div class="lesson">
          <span style="width:14px;height:14px;border-radius:50%;background:${esc(c.color || "#1e4f8f")};flex:none;"></span>
          <div class="meta"><div class="title">${esc(c.title)}</div>
            <span class="kind">${(lessons || []).filter(l => l.course_id === c.id).length} lessons${c.category ? " · " + esc(c.category) : ""}</span></div>
          <input type="color" class="c-color" data-id="${c.id}" value="${esc(c.color || "#1e4f8f")}"
                 style="width:44px; height:34px; padding:2px; flex:none;" />
          <input class="c-cat" data-id="${c.id}" value="${esc(c.category || "")}" placeholder="Category"
                 style="max-width:130px;" />
          <label style="font-size:0.8rem; color:var(--muted); white-space:nowrap; cursor:pointer;">
            <input type="checkbox" class="c-seq" data-id="${c.id}" ${c.sequential ? "checked" : ""} /> in order
          </label>
          <button class="ghost c-save" data-id="${c.id}">Save</button>
        </div>`).join("");

      const enrollmentRows = (enrollments || []).map(e => `
        <tr>
          <td>${esc(e.profiles?.full_name || e.profiles?.email || "—")}</td>
          <td>${esc(e.courses?.title || "—")}</td>
          <td><button class="ghost e-remove" data-id="${e.id}">Remove</button></td>
        </tr>`).join("");

      // Roll raw engagement events into one row per student × lesson.
      const engMap = {};
      (activity || []).forEach(a => {
        const who = a.profiles?.full_name || a.profiles?.email || "—";
        const les = a.lessons?.title || "—";
        const k = who + "|" + les;
        const e = engMap[k] || (engMap[k] = { who, les, time: 0, sections: 0, acts: [], opened: false, last: a.updated_at });
        if (a.kind === "time") e.time = Number(a.value) || 0;
        else if (a.kind === "section") e.sections++;
        else if (a.kind === "activity" && a.key === "opened") e.opened = true;
        else if (a.kind === "activity") {
          e.acts.push(a.max_value && Number(a.max_value) > 1
            ? `${esc(a.key)}: ${a.value}/${a.max_value}`
            : (Number(a.value) > 1
                ? `${esc(a.key)}: ${a.value}`
                : `${esc(a.key)} ✓`));
        }
        if (a.updated_at > e.last) e.last = a.updated_at;
      });
      const fmtTime = s => !s ? "—" : (s < 60 ? "<1 min" : Math.round(s / 60) + " min");
      const engRows = Object.values(engMap).map(e => `
        <tr>
          <td>${esc(e.who)}</td>
          <td>${esc(e.les)}</td>
          <td>${fmtTime(e.time)}</td>
          <td>${e.sections || "—"}</td>
          <td>${e.acts.join(", ") || (e.opened ? "opened" : "—")}</td>
          <td>${new Date(e.last).toLocaleDateString()}</td>
        </tr>`).join("");

      app.innerHTML = `
        <p class="eyebrow">Admin</p>
        <h1>Center overview</h1>

        <div class="tabs">
          <button data-tab="lessons">Lessons (${(lessons || []).length})</button>
          <button data-tab="courses">Courses (${(courses || []).length})</button>
          <button data-tab="students">Students (${onlyStudents.length})</button>
          <button data-tab="progress">Progress</button>
          <button data-tab="announce">Announce${(anns || []).length ? " (" + anns.length + ")" : ""}</button>
        </div>

        <div class="tabpane" data-tab="courses">
        <div class="card">
          <h2>Courses</h2>
          <div class="form-row">
            <div class="field"><label>Course title</label><input id="c-title" placeholder="HSK 1" /></div>
            <div class="field"><label>Description (optional)</label><input id="c-desc" placeholder="Beginner Chinese" /></div>
            <div class="field" style="max-width:150px;"><label>Category</label><input id="c-cat" placeholder="Chinese / IELTS…" /></div>
            <div class="field" style="max-width:120px;"><label>Color</label>
              <input id="c-color" type="color" value="#1e4f8f" style="height:42px; padding:0.2rem;" />
              <div class="swatches" id="c-swatches"></div>
            </div>
            <button id="c-add">Add course</button>
          </div>
          <p id="c-msg" class="msg"></p>
          <div style="margin-top:0.75rem;">${courseList || `<p class="empty">No courses yet. Lessons without a course are visible to all students.</p>`}</div>
        </div>

        <div class="card">
          <h2>Enroll a student</h2>
          <div class="form-row">
            <div class="field"><label>Student</label>
              <select id="e-student">${studentOptions || `<option value="">No students yet</option>`}</select></div>
            <div class="field"><label>Course</label>
              <select id="e-course">${courseOptions || `<option value="">No courses yet</option>`}</select></div>
            <button id="e-add">Enroll</button>
          </div>
          <p id="e-msg" class="msg"></p>
          ${enrollmentRows
            ? `<table style="margin-top:0.75rem;"><thead><tr><th>Student</th><th>Course</th><th></th></tr></thead>
               <tbody>${enrollmentRows}</tbody></table>`
            : `<p class="empty" style="margin-top:0.75rem;">No enrollments yet.</p>`}
        </div>
        </div>

        <div class="tabpane" data-tab="lessons">
        <div class="card">
          <h2>Add a lesson</h2>
          <div class="form-row">
            <div class="field"><label>Title</label><input id="l-title" placeholder="Lesson 1: Introduction" /></div>
            <div class="field" style="max-width:140px;"><label>Course</label>
              <select id="l-course"><option value="">— none —</option>${courseOptions}</select></div>
            <div class="field" style="max-width:90px;"><label>Order</label>
              <input id="l-order" type="number" value="${(lessons?.length || 0) + 1}" min="0" /></div>
            <div class="field" style="max-width:90px;"><label>Minutes</label>
              <input id="l-min" type="number" min="0" placeholder="—" /></div>
            <div class="field"><label>Link (URL)</label><input id="l-url" placeholder="https://your-site.github.io/lesson1.html" /></div>
            <button id="l-add">Add</button>
          </div>
          <div id="l-drop" class="dropzone">
            <input id="l-file" type="file" style="display:none;"
              accept=".pdf,.doc,.docx,.ppt,.pptx,.xls,.xlsx,.csv,.txt,.png,.jpg,.jpeg,.webp,.gif,.mp3,.wav,.m4a,.mp4,.html" />
            <span id="l-drop-text">📎 Drag &amp; drop a file here, or click to browse — PDF, Word, PowerPoint, Excel, audio… (max 50 MB)</span>
          </div>
          <p id="l-msg" class="msg"></p>
        </div>

        <div class="card">
          <h2>Lessons (${(lessons || []).length})</h2>
          ${lessonList || `<p class="empty">No lessons yet — add your first one above.</p>`}
        </div>
        </div>

        <div class="tabpane" data-tab="students">
        <div class="card">
          <h2>Students</h2>
          ${studentRows
            ? `<table><thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Multi-device</th><th></th></tr></thead>
               <tbody>${studentRows}</tbody></table>
               <p class="empty" style="margin-top:0.5rem;">Type a name and click Save — it then appears in the progress table below. Tick "allow" to let an account stay signed in on several devices at once.</p>`
            : `<p class="empty">No accounts yet.</p>`}
        </div>
        </div>

        <div class="tabpane" data-tab="progress">
        <div class="card">
          <h2>Student progress</h2>
          ${progressRows
            ? `<table><thead><tr><th>Student</th><th>Lesson</th><th>Status</th><th>Updated</th></tr></thead>
               <tbody>${progressRows}</tbody></table>`
            : `<p class="empty">No activity yet. Once students open and complete lessons, it shows here.</p>`}
        </div>

        <div class="card">
          <h2>Lesson engagement</h2>
          ${engRows
            ? `<table><thead><tr><th>Student</th><th>Lesson</th><th>Time</th><th>Sections</th><th>Activities & scores</th><th>Last active</th></tr></thead>
               <tbody>${engRows}</tbody></table>
               <p class="empty" style="margin-top:0.5rem;">Time counts only while the lesson tab is visible. Sections and scores appear for lessons that include the tracker script.</p>`
            : `<p class="empty">No engagement data yet. It appears once students open lessons that include the tracker script.</p>`}
        </div>
        </div>

        <div class="tabpane" data-tab="announce">
        <div class="card">
          <h2>New announcement</h2>
          <div class="field"><label>Message</label>
            <textarea id="a-body" placeholder="No class this Friday — see you next week!"></textarea></div>
          <div class="form-row">
            <div class="field" style="max-width:220px;"><label>Send to</label>
              <select id="a-course"><option value="">All students</option>${courseOptions}</select></div>
            <button id="a-add">Post announcement</button>
          </div>
          <p id="a-msg" class="msg"></p>
        </div>
        <div class="card">
          <h2>Posted announcements</h2>
          ${(anns || []).length ? (anns || []).map(a => `
            <div class="lesson">
              <span class="icon">📣</span>
              <div class="meta">
                <div class="title" style="font-weight:500;">${esc(a.body)}</div>
                <span class="kind">${a.course_id
                  ? esc((courses || []).find(c => c.id === a.course_id)?.title || "?")
                  : "All students"} · ${new Date(a.created_at).toLocaleDateString()}</span>
              </div>
              <button class="ghost a-del" data-id="${a.id}"
                      style="color:var(--danger); border-color:var(--danger);">Delete</button>
            </div>`).join("") : `<p class="empty">Nothing posted yet.</p>`}
        </div>
        </div>`;

      document.getElementById("a-add").addEventListener("click", async () => {
        const body = document.getElementById("a-body").value.trim();
        const course_id = document.getElementById("a-course").value || null;
        const m = document.getElementById("a-msg");
        if (!body) { m.textContent = "Write a message first."; m.className = "msg err"; return; }
        const { error } = await sb.from("announcements").insert({ body, course_id });
        if (error) { m.textContent = "Could not post: " + error.message; m.className = "msg err"; return; }
        renderAdmin();
      });

      app.querySelectorAll(".a-del").forEach(btn => {
        btn.addEventListener("click", async () => {
          if (!confirm("Delete this announcement?")) return;
          btn.disabled = true;
          const { error } = await sb.from("announcements").delete().eq("id", btn.getAttribute("data-id"));
          if (error) { btn.disabled = false; alert("Could not delete: " + error.message); return; }
          renderAdmin();
        });
      });

      function showTab(t) {
        adminTab = t;
        app.querySelectorAll(".tabpane").forEach(p =>
          p.classList.toggle("show", p.getAttribute("data-tab") === t));
        app.querySelectorAll(".tabs button").forEach(b =>
          b.classList.toggle("active", b.getAttribute("data-tab") === t));
      }
      app.querySelectorAll(".tabs button").forEach(b =>
        b.addEventListener("click", () => showTab(b.getAttribute("data-tab"))));
      showTab(adminTab);

      // --- drag & drop upload zone ---
      const drop = document.getElementById("l-drop");
      const fileInput = document.getElementById("l-file");
      const dropText = document.getElementById("l-drop-text");
      const dropDefault = dropText.innerHTML;
      const allowedExt = ["pdf","doc","docx","ppt","pptx","xls","xlsx","csv","txt",
                          "png","jpg","jpeg","webp","gif","mp3","wav","m4a","mp4","html"];

      function refreshDrop() {
        const f = fileInput.files[0];
        if (!f) { dropText.innerHTML = dropDefault; return; }
        dropText.innerHTML =
          `📄 <span class="file-picked">${esc(f.name)}</span>` +
          ` <span class="kind">(${(f.size / 1024 / 1024).toFixed(1)} MB)</span>` +
          `<span class="file-remove" id="l-file-remove">remove</span>`;
        // Autofill the title from the file name if it's still empty.
        const titleBox = document.getElementById("l-title");
        if (!titleBox.value.trim()) {
          titleBox.value = f.name.replace(/\.[^.]+$/, "").replace(/[_-]+/g, " ").trim();
        }
      }

      drop.addEventListener("click", (e) => {
        if (e.target.id === "l-file-remove") {
          fileInput.value = ""; refreshDrop(); return;
        }
        fileInput.click();
      });
      fileInput.addEventListener("change", refreshDrop);

      ["dragover", "dragenter"].forEach(ev =>
        drop.addEventListener(ev, (e) => { e.preventDefault(); drop.classList.add("dragover"); }));
      ["dragleave", "dragend"].forEach(ev =>
        drop.addEventListener(ev, () => drop.classList.remove("dragover")));
      drop.addEventListener("drop", (e) => {
        e.preventDefault();
        drop.classList.remove("dragover");
        const f = e.dataTransfer.files[0];
        if (!f) return;
        const ext = (f.name.split(".").pop() || "").toLowerCase();
        const m = document.getElementById("l-msg");
        if (!allowedExt.includes(ext)) {
          m.textContent = "That file type isn't supported. Use PDF, Word, PowerPoint, Excel, image, audio, video, text, or HTML.";
          m.className = "msg err"; return;
        }
        m.textContent = ""; m.className = "msg";
        fileInput.files = e.dataTransfer.files;
        refreshDrop();
      });

      document.getElementById("l-add").addEventListener("click", async () => {
        const title = document.getElementById("l-title").value.trim();
        const url = document.getElementById("l-url").value.trim();
        const file = document.getElementById("l-file").files[0] || null;
        const sort_order = parseInt(document.getElementById("l-order").value, 10) || 0;
        const est_minutes = parseInt(document.getElementById("l-min").value, 10) || null;
        const course_id = document.getElementById("l-course").value || null;
        const m = document.getElementById("l-msg");
        m.className = "msg";

        if (!title || (!url && !file)) {
          m.textContent = "Add a title, plus either a link or a file."; m.className = "msg err"; return;
        }
        if (file && file.size > 50 * 1024 * 1024) {
          m.textContent = "Files must be under 50 MB."; m.className = "msg err"; return;
        }

        let storage_path = null;
        let kind = kindOf(file ? file.name : url) || (file ? "file" : "link");

        if (file) {
          m.textContent = "Uploading…";
          const folder = course_id || "shared";
          const safe = file.name.replace(/[^a-zA-Z0-9._-]/g, "_");
          storage_path = folder + "/" + Date.now() + "-" + safe;
          const { error: upErr } = await sb.storage.from("materials")
            .upload(storage_path, file, { contentType: file.type || undefined });
          if (upErr) { m.textContent = "Upload failed: " + upErr.message; m.className = "msg err"; return; }
        }

        const { error } = await sb.from("lessons")
          .insert({ title, kind, url: url || null, sort_order, course_id, storage_path, est_minutes });
        if (error) { m.textContent = "Could not add: " + error.message; m.className = "msg err"; return; }
        renderAdmin();
      });

      // predefined swatches for quick color choice
      const SWATCHES = ["#1e4f8f","#0e7c66","#b7823f","#a4442f","#6d28d9","#c026d3","#0891b2","#374151"];
      const swWrap = document.getElementById("c-swatches");
      swWrap.innerHTML = SWATCHES.map(col =>
        `<button type="button" data-col="${col}" style="background:${col};" title="${col}"></button>`).join("");
      swWrap.querySelectorAll("button").forEach(b =>
        b.addEventListener("click", () => { document.getElementById("c-color").value = b.getAttribute("data-col"); }));

      document.getElementById("c-add").addEventListener("click", async () => {
        const title = document.getElementById("c-title").value.trim();
        const description = document.getElementById("c-desc").value.trim() || null;
        const category = document.getElementById("c-cat").value.trim() || null;
        const color = document.getElementById("c-color").value || null;
        const m = document.getElementById("c-msg");
        if (!title) { m.textContent = "Give the course a title."; m.className = "msg err"; return; }
        const { error } = await sb.from("courses")
          .insert({ title, description, category, color, sort_order: (courses?.length || 0) + 1 });
        if (error) { m.textContent = "Could not add: " + error.message; m.className = "msg err"; return; }
        renderAdmin();
      });

      app.querySelectorAll(".c-save").forEach(btn => {
        btn.addEventListener("click", async () => {
          const id = btn.getAttribute("data-id");
          const color = app.querySelector(`.c-color[data-id="${id}"]`).value || null;
          const category = app.querySelector(`.c-cat[data-id="${id}"]`).value.trim() || null;
          const sequential = app.querySelector(`.c-seq[data-id="${id}"]`).checked;
          btn.disabled = true;
          const { error } = await sb.from("courses").update({ color, category, sequential }).eq("id", id);
          btn.disabled = false;
          if (error) { alert("Could not save: " + error.message); return; }
          btn.textContent = "Saved ✓";
          setTimeout(() => renderAdmin(), 600);
        });
      });

      document.getElementById("e-add").addEventListener("click", async () => {
        const student_id = document.getElementById("e-student").value;
        const course_id = document.getElementById("e-course").value;
        const m = document.getElementById("e-msg");
        if (!student_id || !course_id) { m.textContent = "You need at least one student and one course."; m.className = "msg err"; return; }
        const { error } = await sb.from("enrollments").insert({ student_id, course_id });
        if (error) {
          m.textContent = error.code === "23505"
            ? "That student is already enrolled in that course."
            : "Could not enroll: " + error.message;
          m.className = "msg err"; return;
        }
        renderAdmin();
      });

      app.querySelectorAll(".e-remove").forEach(btn => {
        btn.addEventListener("click", async () => {
          if (!confirm("Remove this enrollment? The student will no longer see that course's lessons.")) return;
          btn.disabled = true;
          const { error } = await sb.from("enrollments").delete().eq("id", btn.getAttribute("data-id"));
          if (error) { btn.disabled = false; alert("Could not remove: " + error.message); return; }
          renderAdmin();
        });
      });

      app.querySelectorAll(".l-save").forEach(btn => {
        btn.addEventListener("click", async () => {
          const id = btn.getAttribute("data-id");
          const sel = app.querySelector(`.l-move[data-id="${id}"]`);
          const lesson = (lessons || []).find(x => x.id === id);
          btn.disabled = true;

          let newPath = lesson?.storage_path || null;
          // If this lesson is an uploaded file, move it to the new
          // course's folder so student access follows the course.
          if (lesson?.storage_path) {
            const folder = sel.value || "shared";
            const fname = lesson.storage_path.split("/").pop();
            const target = folder + "/" + fname;
            if (target !== lesson.storage_path) {
              const { error: mvErr } = await sb.storage.from("materials")
                .move(lesson.storage_path, target);
              if (mvErr) { btn.disabled = false; alert("Could not move the file: " + mvErr.message); return; }
              newPath = target;
            }
          }

          const est_minutes = parseInt(app.querySelector(`.l-min-edit[data-id="${id}"]`).value, 10) || null;
          const { error } = await sb.from("lessons")
            .update({ course_id: sel.value || null, storage_path: newPath, est_minutes }).eq("id", id);
          btn.disabled = false;
          if (error) { alert("Could not move the lesson: " + error.message); return; }
          btn.textContent = "Saved ✓";
          setTimeout(() => renderAdmin(), 600);
        });
      });

      app.querySelectorAll(".l-del").forEach(btn => {
        btn.addEventListener("click", async () => {
          if (!confirm("Delete this lesson? Its uploaded file (if any) and student progress records will also be removed. This cannot be undone.")) return;
          const id = btn.getAttribute("data-id");
          const lesson = (lessons || []).find(x => x.id === id);
          btn.disabled = true;
          const { error } = await sb.from("lessons").delete().eq("id", id);
          if (error) { btn.disabled = false; alert("Could not delete: " + error.message); return; }
          if (lesson?.storage_path) {
            await sb.storage.from("materials").remove([lesson.storage_path]);
          }
          renderAdmin();
        });
      });

      wireFileButtons(app);

      app.querySelectorAll(".s-multi").forEach(cb => {
        cb.addEventListener("change", async () => {
          cb.disabled = true;
          const { error } = await sb.from("profiles")
            .update({ multi_device: cb.checked }).eq("id", cb.getAttribute("data-id"));
          cb.disabled = false;
          if (error) { cb.checked = !cb.checked; alert("Could not save: " + error.message); }
        });
      });

      app.querySelectorAll(".s-save").forEach(btn => {
        btn.addEventListener("click", async () => {
          const id = btn.getAttribute("data-id");
          const input = app.querySelector(`.s-name[data-id="${id}"]`);
          btn.disabled = true;
          const { error } = await sb.from("profiles")
            .update({ full_name: input.value.trim() || null }).eq("id", id);
          btn.disabled = false;
          if (error) { alert("Could not save the name: " + error.message); return; }
          btn.textContent = "Saved ✓";
          setTimeout(() => (btn.textContent = "Save"), 1500);
        });
      });
    }

    start();
  </script>
</body>
</html>
