              grid = X.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { header: 1, raw: false, defval: "" })

              grid = parseCSV(new TextDecoder("utf-8").decode(await f.arrayBuffer()));

          } catch (err) {
            rtiBox.innerHTML = `<p class="msg err">Could not read the file: ${esc(err.message)}</p>`;

          if (!grid || grid.length < 2) {

          const cols = grid[0].map(h => RTI_HEADS[nrm(h)] || null);
          if (!cols.includes("title") || !cols.includes("content")) {

          // theme/subtopic names → ids (only needed when the file has those columns)

          const tnrm = s => nrm(s).replace(/\s+/g, " ").trim();

          const parsedR = grid.slice(1).map((r, ix) => {
            const rec = {};

            const errors = [];

            if (!content) errors.push("missing content");

                       : (tierRaw === "free" || tierRaw === "" ? "free" : null);

            const published = !["no", "false", "0", "draft", "nhap", "khong"].includes(pubRaw);
            // ---- new fields (Phase 20/21) — only validated when the file provides them ----
            let themeId = null, subIds = null;
            if (wantsThemes && ((rec.theme || "") + (rec.subtopics || "")).trim()) {
              if (!TS.ok) errors.push("theme/subtopics need migration33 + 34 on the database first");

            // include the new columns only when the file has them, so files made from

            if (cols.includes("cover_alt")) row.cover_alt = rec.cover_alt || "";
            if (cols.includes("cover_url")) row.cover_url = rec.cover_url || null;
            return { line: ix + 2, errors, row };
          });

            { k: "shot_url", l: "Ảnh chụp tin nhắn (đã che thông tin cá nhân)", t: "img" },
            { k: "shot_caption", l: "Chú thích ảnh" },
            { k: "permission", l: "✅ ĐÃ xin phép học viên cho đăng công khai", t: "check" }
          ],
          gal: [
            { k: "image_url", l: "Ảnh *", t: "img", req: 1 },
            { k: "image_alt", l: "Mô tả ảnh (alt, tiếng Việt) *", req: 1 },
            { k: "category", l: "Nhóm", t: "sel",
              o: [["activity","Hoạt động lớp học"],["platform","Nền tảng"],["result","Kết quả học viên"],["event","Sự kiện"],["other","Khác"]] },
            { k: "caption", l: "Chú thích" },
            { k: "date_text", l: "Ngày / năm" }
          ]
        };
        const SEC_NAMES = { trial: "Học thử miễn phí", courses: "Khóa học", teacher: "Đội ngũ giáo viên",
                            achieve: "Thành tựu & Cảm nhận", feats: "Tính năng", quote: "Câu trích dẫn", contact: "Liên hệ / Học phí" };
        const SEC_DEFAULT = ["trial", "courses", "teacher", "achieve", "feats", "quote", "contact"];
        /* the hero is always first and always visible — shown in the list as locked */
        const SEC_LOCKED = [{ id: "hero", name: "Hero (tiêu đề chính + nút Bắt đầu học)" }];
        const okUrl = u => !u || /^(https?:\/\/|\/|#|[a-z0-9_-]+\.html)/i.test(String(u).trim());
        const statusPill = s => s === "published"
          ? '<span class="pill done">Published</span>'
          : s === "hidden" ? '<span class="pill bad">Hidden</span>' : '<span class="pill">Draft</span>';
        const fmtDate = d => { try { return new Date(d).toLocaleString("vi-VN", { dateStyle: "short", timeStyle: "short" }); } catch (e) { return ""; } };

        async function load() {
          const rs = await Promise.all([
            sb.from("landing_settings").select("config").eq("id", 1).maybeSingle(),
            ...Object.values(T).map(t => sb.from(t).select("*").order("sort_order").order("updated_at"))
          ]);
          if (rs[0].error || rs.slice(1).some(r => r.error)) { failed = true; return; }
          D.cfg = (rs[0].data && rs[0].data.config) || {};
          Object.keys(T).forEach((k, i) => { D[k] = rs[i + 1].data || []; });
          loaded = true;
        }

        function guardDirty(fn) {
          if (!dirty) return fn();
          UI.confirmDialog({ title: "Bỏ thay đổi chưa lưu?", danger: true,
            body: "Biểu mẫu đang mở có thay đổi chưa lưu — rời đi sẽ mất chúng.", okText: "Bỏ thay đổi" })
            .then(ok => { if (ok) { dirty = false; editing = null; fn(); } });
        }
        if (!window.__lpmBU) {
          window.__lpmBU = true;
          window.addEventListener("beforeunload", e => { if (dirty) { e.preventDefault(); e.returnValue = ""; } });
        }

        /* ---------- generic field rendering ---------- */
        function fieldHtml(f, val) {
          const v = val == null ? "" : val;
          if (f.t === "check") return `
            <label style="font-size:0.86rem; color:var(--muted); cursor:pointer; align-self:center; white-space:nowrap;">
              <input type="checkbox" data-k="${f.k}" ${v ? "checked" : ""} /> ${esc(f.l)}</label>`;
          if (f.t === "area") return `
            <div class="field" style="flex-basis:100%;"><label>${esc(f.l)}</label>
              <textarea data-k="${f.k}" style="min-height:74px;">${esc(v)}</textarea></div>`;
          if (f.t === "sel") return `
            <div class="field" style="max-width:230px;"><label>${esc(f.l)}</label>
              <select data-k="${f.k}">${f.o.map(([ov, ol]) =>
                `<option value="${esc(ov)}" ${String(v) === ov ? "selected" : ""}>${esc(ol)}</option>`).join("")}
                ${f.k === "focal" && !FOCAL_OPTS.some(([ov]) => ov === v) && v ? `<option value="${esc(v)}" selected>${esc(v)}</option>` : ""}
              </select></div>`;
          if (f.t === "course") return `
            <div class="field" style="max-width:230px;"><label>${esc(f.l)}</label>
              <select data-k="${f.k}"><option value="">— không gắn —</option>${(courses || []).map(c =>
                `<option value="${c.id}" ${v === c.id ? "selected" : ""}>${esc(c.title)}</option>`).join("")}</select></div>`;
          if (f.t === "img") return `
            <div class="field" style="min-width:260px; flex-basis:100%;"><label>${esc(f.l)} — JPG/PNG/WebP, tối đa 10 MB</label>
              <div class="lpm-drop" data-imgk="${f.k}" tabindex="0" role="button"
                   style="border:2px dashed var(--line); border-radius:10px; padding:0.6rem 0.8rem; display:flex; gap:0.8rem; align-items:center; flex-wrap:wrap; cursor:pointer;">
                <img src="${esc(v)}" alt="" style="${v ? "" : "display:none;"} width:132px; aspect-ratio:16/9; object-fit:cover; border-radius:8px; border:1px solid var(--line);">
                <span class="kind" style="text-transform:none; letter-spacing:0;">Kéo–thả ảnh vào đây hoặc bấm để chọn</span>
                <button type="button" class="ghost" data-imgdel ${v ? "" : "hidden"} style="flex:none;">✕ Bỏ ảnh</button>
                <span class="msg" data-imgmsg style="flex-basis:100%; margin:0;"></span>
                <input type="hidden" data-k="${f.k}" value="${esc(v)}">
                <input type="file" accept="image/jpeg,image/png,image/webp,.jpg,.jpeg,.png,.webp" hidden>
              </div></div>`;
          return `
            <div class="field"><label>${esc(f.l)}</label>
              <input data-k="${f.k}" value="${esc(v)}" /></div>`;
        }
        function formHtml(coll, r) {
          return `
            <div class="lpm-form" data-coll="${coll}" data-id="${r.id || ""}"
                 style="border:1px solid var(--accent-ink); border-radius:var(--radius); padding:0.9rem; margin:0.5rem 0 0.9rem;">
              <div class="form-row">${F[coll].map(f => fieldHtml(f, r[f.k])).join("")}</div>
              <div class="form-row" style="margin-top:0.5rem;">
                <button data-act="save">💾 Lưu</button>
                <button class="ghost" data-act="cancel">Hủy</button>
                <span class="kind" style="align-self:center; text-transform:none;">${r.id ? "Sửa lần cuối: " + fmtDate(r.updated_at) : "Mục mới — sẽ lưu ở trạng thái Draft"}</span>
              </div>
              <p class="msg lpm-msg"></p>
            </div>`;
        }

        /* ---------- panels ---------- */
        /* hero = the very top of the landing page (always visible, always first) */
        function heroPanel() {
          const H = (D.cfg || {}).hero || {};
          return `
            <div class="lpm-form" data-coll="hero">
            <p class="kind" style="text-transform:none; margin:.5rem 0;">Phần đầu trang: tiêu đề lớn, mô tả, hai nút và các thẻ nhỏ bên dưới. Ô nào để trống sẽ giữ nguyên nội dung đang hiển thị — không cần điền hết. Hero luôn ở đầu trang và luôn hiển thị.</p>
            <div class="form-row">
              <div class="field" style="flex-basis:100%;"><label>Tiêu đề lớn — xuống dòng ở đâu thì Enter ở đó</label>
                <textarea data-cfg="hero.title" style="min-height:70px;" placeholder="Học tiếng Anh &amp; tiếng Trung theo lộ trình,&#10;tiến bộ đo được mỗi ngày">${esc(H.title || "")}</textarea></div>
              <div class="field" style="flex-basis:100%;"><label>Mô tả ngắn dưới tiêu đề</label>
                <textarea data-cfg="hero.sub" style="min-height:60px;" placeholder="Lớp học trực tuyến của Thầy Lê Quốc Thông — …">${esc(H.sub || "")}</textarea></div>
              <div class="field"><label>Nút vàng — nhãn (khách chưa đăng nhập)</label>
                <input data-cfg="hero.p_label" value="${esc(H.p_label || "")}" placeholder="Bắt đầu học →"></div>
              <div class="field"><label>Nút vàng — liên kết</label>
                <input data-cfg="hero.p_url" value="${esc(H.p_url || "")}" placeholder="login.html"></div>

                <input data-cfg="hero.signed_label" value="${esc(H.signed_label || "")}" placeholder="Vào học ngay →"></div>
              <div class="field"><label>Nút viền — nhãn</label>

                <textarea data-cfg="hero.chips" style="min-height:80px;" placeholder="🀄 Tiếng Trung HSK 3.0&#10;🎓 IELTS · VSTEP&#10;📊 Theo dõi tiến độ&#10;📲 Học như ứng dụng trên điện thoại">${esc(H.chips || "")}</textarea></div>
            </div>
            <div class="form-row" style="margin-top:.6rem;">
              <button data-act="cfgsave">💾 Lưu</button>
              <a class="ghost btn" style="text-decoration:none;" href="index.html?preview=1" target="_blank" rel="noopener">👁 Xem trước</a>
            </div>
            <p class="msg" id="lpm-cfgmsg"></p>
            </div>`;
        }

        /* header shown above the teacher list: section heading + carousel option */
        function teachersHeader() {
          const c = D.cfg || {}, t = c.titles || {};
          return `
            <p class="kind" style="text-transform:none; margin:.5rem 0;">Mỗi giáo viên là một thẻ trong băng chuyền 3D ở trang chủ. Chỉ hồ sơ <b>Published</b> mới hiện với khách; Draft chỉ thấy trong 👁 Xem trước.</p>
            <div class="form-row">
              <div class="field"><label>Tiêu đề phần</label>
                <input data-cfg="titles.teacher" value="${esc(t.teacher || "")}" placeholder="Đội ngũ giáo viên"></div>
              <div class="field"><label>Mô tả dưới tiêu đề</label>
                <input data-cfg="titles.teacher_lead" value="${esc(t.teacher_lead || "")}" placeholder="Những người trực tiếp giảng dạy…"></div>
              <label style="font-size:.85rem; color:var(--muted); align-self:center; white-space:nowrap;">
                <input type="checkbox" data-cfg="teachers_loop" ${c.teachers_loop !== false ? "checked" : ""}> băng chuyền chạy vòng tròn</label>
              <button data-act="cfgsave">💾 Lưu mục này</button>
            </div>
            <p class="msg" id="lpm-cfgmsg"></p>
            <hr style="border:none; border-top:1px solid var(--line); margin:.8rem 0;">`;
        }
        function listPanel(coll) {
          const rows = D[coll];
          return `
            ${coll === "teachers" ? teachersHeader() : ""}
            <div class="form-row" style="margin:0.4rem 0 0.6rem;">
              <button data-act="add" data-coll="${coll}">+ Thêm mới</button>
              ${coll === "gal" ? `<button class="ghost" data-act="multi">⬆ Tải nhiều ảnh cùng lúc</button>
                <input type="file" id="lpm-multi" accept="image/jpeg,image/png,image/webp" multiple hidden>` : ""}
              ${coll === "fb" ? `<span class="kind" style="align-self:center; text-transform:none;">⚠️ Chỉ đăng được khi đã tick "ĐÃ xin phép học viên".</span>` : ""}
            </div>
            ${editing && editing.coll === coll && !editing.id ? formHtml(coll, editing.draft || {}) : ""}
            ${rows.map((r, i) => `
              <div class="lesson" data-id="${r.id}">
                <div class="meta"><div class="title">${esc(TITLE_OF[coll](r) || "—")}</div>
                  <span class="kind">${statusPill(r.status)} · sửa ${fmtDate(r.updated_at)}</span></div>
                <select data-act="status" data-coll="${coll}" data-id="${r.id}" style="max-width:130px;">
                  <option value="draft" ${r.status === "draft" ? "selected" : ""}>Draft</option>
                  <option value="published" ${r.status === "published" ? "selected" : ""}>Published</option>
                  <option value="hidden" ${r.status === "hidden" ? "selected" : ""}>Hidden</option>
                </select>
                <button class="ghost" data-act="up" data-coll="${coll}" data-id="${r.id}" ${i === 0 ? "disabled" : ""}>↑</button>
                <button class="ghost" data-act="down" data-coll="${coll}" data-id="${r.id}" ${i === rows.length - 1 ? "disabled" : ""}>↓</button>
                <button class="ghost" data-act="edit" data-coll="${coll}" data-id="${r.id}">✏️</button>
                <button class="ghost" data-act="dup" data-coll="${coll}" data-id="${r.id}" title="Nhân bản">⧉</button>
                <button class="ghost" data-act="del" data-coll="${coll}" data-id="${r.id}"
                        style="color:var(--danger); border-color:var(--danger);">🗑</button>
              </div>
              ${editing && editing.coll === coll && editing.id === r.id ? formHtml(coll, editing.draft) : ""}`).join("")
              || `<p class="empty">Chưa có mục nào — bấm "+ Thêm mới" để tạo mục đầu tiên.</p>`}`;
        }
        function settingsPanel() {
          const c = D.cfg || {}; const t = c.trial || {};
          /* the editor works on the draft when one exists, otherwise on the
             published order; brand-new sections are appended automatically */
          const hasDraft = Array.isArray(c.sections_draft) && c.sections_draft.length > 0;
          const saved = hasDraft ? c.sections_draft
            : (Array.isArray(c.sections) && c.sections.length ? c.sections : []);
          const secs = saved.filter(s => SEC_DEFAULT.includes(s.id))
            .concat(SEC_DEFAULT.filter(id => !saved.some(s => s.id === id)).map(id => ({ id, show: true })));
          return `
            <h3 style="margin:0.6rem 0 0.3rem;">Thứ tự &amp; hiển thị các phần</h3>
            <p class="kind" style="text-transform:none;">Kéo–thả để đổi thứ tự (hoặc dùng ↑ ↓ trên điện thoại). Thay đổi được lưu thành <b>nháp</b> — khách chỉ thấy sau khi bạn bấm <b>Publish</b>.
              ${hasDraft ? '<b style="color:var(--warning);"> • Đang có bản nháp chưa publish.</b>' : ""}</p>
            <div id="lpm-secs">
              ${SEC_LOCKED.map(s => `
              <div class="lesson" style="opacity:.72;">
                <div class="meta"><div class="title">🔒 ${esc(s.name)}</div>
                  <span class="kind">Luôn ở đầu trang và luôn hiển thị — sửa nội dung ở tab "Hero (đầu trang)"</span></div>
                <label style="font-size:0.85rem; color:var(--muted);"><input type="checkbox" checked disabled/> hiện</label>
                <button class="ghost" disabled>↑</button><button class="ghost" disabled>↓</button>
              </div>`).join("")}
              ${secs.map((s, i) => `

                <div class="meta"><div class="title">⠿ ${esc(SEC_NAMES[s.id] || s.id)}</div></div>
                <label style="font-size:0.85rem; color:var(--muted);"><input type="checkbox" data-secshow="${s.id}" ${s.show !== false ? "checked" : ""}/> hiện</label>
                <button class="ghost" data-act="secup" data-i="${i}" ${i === 0 ? "disabled" : ""} aria-label="Chuyển lên">↑</button>
                <button class="ghost" data-act="secdown" data-i="${i}" ${i === secs.length - 1 ? "disabled" : ""} aria-label="Chuyển xuống">↓</button>
              </div>`).join("")}
            </div>
            <div class="form-row" style="margin-top:0.6rem;">
              <button data-act="secdraft">💾 Lưu nháp</button>
              <button data-act="secpublish">🚀 Publish bố cục</button>
              <a class="ghost btn" style="text-decoration:none;" href="index.html?preview=1" target="_blank" rel="noopener">👁 Xem trước bản nháp</a>
              <button class="ghost" data-act="seccancel" ${hasDraft ? "" : "disabled"}>↩ Hủy thay đổi chưa publish</button>
            </div>
            <p class="msg" id="lpm-secmsg"></p>
            <h3 style="margin:1rem 0 0.3rem;">Khối "Học thử miễn phí"</h3>
            <div class="form-row">

              <div class="field"><label>Huy hiệu (badge, tùy chọn)</label><input data-cfg="trial.badge" value="${esc(t.badge || "")}"></div>
              <div class="field" style="flex-basis:100%;"><label>Giới thiệu ngắn</label>
                <textarea data-cfg="trial.intro" style="min-height:56px;">${esc(t.intro || "")}</textarea></div>
              <div class="field"><label>Nút chính — nhãn</label><input data-cfg="trial.p_label" value="${esc(t.p_label || "Học thử miễn phí")}"></div>

              <label style="font-size:0.85rem; color:var(--muted); align-self:center;"><input type="checkbox" data-cfg="trial.p_new" ${t.p_new !== false ? "checked" : ""}> tab mới</label>
              <div class="field"><label>Nút phụ — nhãn</label><input data-cfg="trial.s_label" value="${esc(t.s_label || "Nhắn Zalo tư vấn")}"></div>
              <div class="field"><label>Nút phụ — liên kết</label><input data-cfg="trial.s_url" value="${esc(t.s_url || "")}"></div>
              <label style="font-size:0.85rem; color:var(--muted); align-self:center;"><input type="checkbox" data-cfg="trial.s_new" ${t.s_new !== false ? "checked" : ""}> tab mới</label>
              <label style="font-size:0.85rem; color:var(--muted); align-self:center;"><input type="checkbox" data-cfg="trial.primary_first" ${t.primary_first !== false ? "checked" : ""}> nút chính đứng trước</label>
              <div class="field"><label>Nhãn khi chưa có liên kết</label><input data-cfg="trial.soon_label" value="${esc(t.soon_label || "Sắp ra mắt")}"></div>
              <div class="field"><label>Ảnh nền khối (URL từ Thư viện ảnh, tùy chọn)</label><input data-cfg="trial.image" value="${esc(t.image || "")}"></div>
            </div>
            <h3 style="margin:1rem 0 0.3rem;">Băng chuyền khóa học</h3>
            <div class="form-row">
              <div class="field" style="max-width:260px;"><label>Khóa ở giữa mặc định</label>
                <select data-cfg="default_course"><option value="">— khóa đầu tiên —</option>${D.courses.map(cc =>
                  `<option value="${cc.id}" ${c.default_course === cc.id ? "selected" : ""}>${esc(cc.title)}</option>`).join("")}</select></div>
              <label style="font-size:0.85rem; color:var(--muted); align-self:center;">

                  `<option ${(c.ach_filter || "Tất cả") === x ? "selected" : ""}>${x}</option>`).join("")}</select></div>

              <button data-act="cfgsave">💾 Lưu cài đặt</button>
              <a class="ghost btn" style="text-decoration:none;" href="index.html?preview=1" target="_blank" rel="noopener">👁 Xem trước</a>

        /* ============ Thương hiệu & màu sắc (Phase 31) ============
           Logo, tên website, ảnh hero + ảnh nền hero, và bảng màu thương hiệu.
           Lưu vào cfg.brand (đã publish) và cfg.brand_draft (nháp) — cùng cơ
           chế draft/publish như phần bố cục. Trang chủ đọc cfg.brand; mở
           index.html?preview=1 để xem cfg.brand_draft. Ô nào để trống thì giữ
           nguyên thiết kế gốc, nên trang không bao giờ bị lỡ dở hay khó đọc. */

        function brandInit() {
          const src = (D.cfg && (D.cfg.brand_draft || D.cfg.brand)) || {};

        const bcol = k => (BW && BW.colors && BW.colors[k]) || "";

        // normalize any CSS colour (hex / rgb() / hsl() / name) to canonical, or "" if invalid
        function normColor(v) {
          v = String(v == null ? "" : v).trim(); if (!v) return "";
          try {
            const cx = document.createElement("canvas").getContext("2d");
            cx.fillStyle = "#010203"; cx.fillStyle = v; const a = cx.fillStyle;
            cx.fillStyle = "#fefdfc"; cx.fillStyle = v; const b = cx.fillStyle;
            return a === b ? a : "";              // stable across two seeds ⇒ browser accepted it
          } catch (e) { return ""; }
        }
        function pickerHex(v) {                    // a #rrggbb the <input type=color> can display
          const n = normColor(v); if (/^#[0-9a-f]{6}$/i.test(n)) return n;
          const m = n.match(/^rgba?\((\d+),\s*(\d+),\s*(\d+)/i);
          if (m) return "#" + [1, 2, 3].map(i => (+m[i]).toString(16).padStart(2, "0")).join("");
          return "#000000";
        }
        function toRGB(v) {
          const c = document.createElement("canvas").getContext("2d");
          c.fillStyle = normColor(v) || "#000"; const h = c.fillStyle;
          if (/^#/.test(h)) { const x = parseInt(h.slice(1), 16); return [(x >> 16) & 255, (x >> 8) & 255, x & 255]; }
          const m = h.match(/(\d+),\s*(\d+),\s*(\d+)/); return m ? [+m[1], +m[2], +m[3]] : [0, 0, 0];
        }
        function ratio(a, b) {
          const L = c => { const s = toRGB(c).map(v => { v /= 255; return v <= .03928 ? v / 12.92 : Math.pow((v + .055) / 1.055, 2.4); });
            return .2126 * s[0] + .7152 * s[1] + .0722 * s[2]; };
          const l1 = L(a), l2 = L(b), hi = Math.max(l1, l2), lo = Math.min(l1, l2);
          return (hi + .05) / (lo + .05);
        }
        function contrastPill(r) {
          const v = r.toFixed(1) + ":1";
          return r >= 4.5 ? `<span class="pill done">${v} ✓</span>`
               : r >= 3   ? `<span class="pill todo">${v} — chỉ đạt cho chữ lớn</span>`
                          : `<span class="pill bad">${v} ✕ khó đọc</span>`;
        }
        function optimizeImg(file, maxW, fmt) {
          return new Promise((res, rej) => {
            const img = new Image();
            img.onload = () => {
              try {
                const scale = Math.min(1, (maxW || 1200) / img.width);
                const w = Math.max(1, Math.round(img.width * scale)), h = Math.max(1, Math.round(img.height * scale));
                const cv = document.createElement("canvas"); cv.width = w; cv.height = h;
                cv.getContext("2d").drawImage(img, 0, 0, w, h);
                cv.toBlob(b => b ? res(b) : rej(new Error("resize failed")), fmt, 0.85);
              } catch (e) { rej(e); }
              URL.revokeObjectURL(img.src);
            };
            img.onerror = rej; img.src = URL.createObjectURL(file);
          });
        }

        function brandImgDrop(k, label, fmt, maxW, hint, hasPos) {
          const cur = BW[k] || "";

                <select data-bpos="${k}_pos" style="margin-left:.3rem;">${POS_OPTS.map(([ov, ol]) =>
                  `<option value="${ov}" ${(BW[k + "_pos"] || "center") === ov ? "selected" : ""}>${ol}</option>`).join("")}</select></label>` : ""}
              <button type="button" class="ghost" data-bdel ${cur ? "" : "hidden"} style="flex:none;">✕ Bỏ ảnh</button>
              <span class="msg bmsg" style="flex-basis:100%; margin:0;"></span>
              <input type="file" accept="image/jpeg,image/png,image/webp,.jpg,.jpeg,.png,.webp" hidden>
            </div>`;
        }

        function brandPanel() {
          if (!BW) brandInit();

          return `
            <p class="kind" style="text-transform:none; margin:.5rem 0;">

              ${hasDraft ? '<b style="color:var(--warning);"> • Đang có bản nháp chưa publish.</b>' : ""}</p>

            <div id="brand-form">
              <h3 style="margin:.6rem 0 .3rem;">Logo &amp; tên website</h3>

              <div class="form-row">
                ${brandImgDrop(...BRAND_IMGS[1])}
                ${brandImgDrop(...BRAND_IMGS[2])}
              </div>

              <h3 style="margin:1rem 0 .3rem;">Bảng màu thương hiệu</h3>
              <p class="kind" style="text-transform:none; letter-spacing:0; margin:0 0 .5rem;">
                Bấm ô màu để chọn trực quan, hoặc gõ mã <b>HEX</b> (#1e4f8f), <b>RGB</b> rgb(30,79,143) hay <b>HSL</b> hsl(212,50%,34%).
                Để trống một ô = dùng lại màu mặc định. Chế độ tối luôn giữ nền tối dễ đọc, chỉ mượn màu chính/phụ/nhấn của bạn.</p>
              <div style="display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:.5rem .9rem;">
                ${COLOR_ROLES.map(([k, label, def, hint]) => `
                  <div style="display:flex; gap:.5rem; align-items:center;">
                    <input type="color" data-bcol="${k}" value="${pickerHex(bcol(k) || def || "#888888")}"
                           style="width:44px; height:36px; padding:0; border:1px solid var(--line); border-radius:8px; flex:none; cursor:pointer;"
                           aria-label="${esc(label)}">
                    <div style="flex:1; min-width:0;"><b style="font-size:.88rem;">${esc(label)}</b>
                      ${hint ? `<br><span class="kind" style="text-transform:none; letter-spacing:0;">${esc(hint)}</span>` : ""}</div>
                    <input data-btext="${k}" value="${esc(bcol(k))}" placeholder="${esc(def || "—")}"
                           spellcheck="false" style="width:120px; flex:none; font-family:var(--mono); font-size:.82rem;">
                  </div>`).join("")}
              </div>
              <p id="brand-contrast" class="kind" style="text-transform:none; letter-spacing:0; margin:.7rem 0 0; display:flex; gap:.4rem 1rem; flex-wrap:wrap; align-items:center;"></p>
            </div>

            <h3 style="margin:1.1rem 0 .4rem;">Xem trước trực tiếp</h3>
            <style>
              #brand-preview { border:1px solid var(--line); border-radius:14px; overflow:hidden; background:var(--bp-bg); }
              #brand-preview .bpp-head { display:flex; align-items:center; gap:.5rem; padding:.6rem .9rem; background:var(--bp-hbg); color:var(--bp-htxt); }
              #brand-preview .bpp-head img { width:26px; height:26px; border-radius:6px; object-fit:contain; }

              #brand-preview .bpp-hero { color:#fff; text-align:center; padding:1.6rem 1rem; background-size:cover; background-position:center; }
              #brand-preview .bpp-hero h4 { font-family:var(--serif); font-size:1.35rem; margin:0 0 .4rem; color:#fff; }

              #brand-preview .ghost2 { background:transparent; color:#fff; border:1px solid rgba(255,255,255,.55); border-radius:9px; padding:.45rem .9rem; font-size:.85rem; }
              #brand-preview .bpp-body { padding:1.1rem; background:var(--bp-bg); }
              #brand-preview .bpp-body h5 { color:var(--bp-heading); font-family:var(--serif); margin:0 0 .3rem; font-size:1.1rem; }
              #brand-preview .bpp-body p { color:var(--bp-body); margin:0 0 .7rem; font-size:.9rem; }
              #brand-preview .bpp-body a { color:var(--bp-secondary); font-weight:600; }
              #brand-preview .bpp-card { background:var(--bp-card); border:1px solid color-mix(in srgb, var(--bp-heading) 12%, transparent); border-radius:12px; padding:.8rem; }

            </style>
            <div id="brand-preview">
              <div class="bpp-head">

                <span class="bpp-name">${esc(BW.site_name || "Learning Ecology")}</span>

                <button class="cta" type="button" tabindex="-1">Vào học ngay →</button>
              </div>
              <div class="bpp-hero">
                <h4>Học tiếng Anh &amp; tiếng Trung theo lộ trình</h4>
                <p>Mỗi bài học nằm trong một lộ trình rõ ràng, có quiz, bài tập và chứng nhận.</p>
                <span class="gold">Bắt đầu học →</span> <span class="ghost2">Học thử miễn phí</span>
                <img class="bpp-heroimg" src="" alt="" style="display:none;">
              </div>
              <div class="bpp-body">
                <div class="bpp-card">
                  <div class="tag">Khóa học</div>
                  <h5>HSK 1 (3.0)</h5>
                  <p>Chữ tiêu đề, chữ nội dung, thẻ và <a href="#" onclick="return false;">liên kết</a> đều theo màu bạn chọn.</p>

        function brandPreview() {
          const p = document.getElementById("brand-preview"); if (!p) return;
          const g = (k, d) => normColor(bcol(k)) || d;
          const primary = g("primary", BRAND_DEF.primary), secondary = g("secondary", BRAND_DEF.secondary),
                accent = g("accent", BRAND_DEF.accent), bg = g("bg", BRAND_DEF.bg), card = g("card", BRAND_DEF.card),
                heading = g("heading", BRAND_DEF.heading), body = g("body", BRAND_DEF.body),
                btn = g("btn", primary), btnh = g("btn_hover", secondary), btnt = g("btn_text", "#ffffff"),
                hbg = g("header_bg", "#17263e"), htxt = g("header_text", "#ffffff");
          const S = p.style, set = (n, v) => S.setProperty(n, v);
          set("--bp-bg", bg); set("--bp-card", card); set("--bp-heading", heading); set("--bp-body", body);
          set("--bp-primary", primary); set("--bp-secondary", secondary); set("--bp-accent", accent);
          set("--bp-btn", btn); set("--bp-btnt", btnt); set("--bp-hbg", hbg); set("--bp-htxt", htxt);
          const hero = p.querySelector(".bpp-hero");
          if (hero) {
            hero.style.backgroundImage = BW.hero_bg
              ? `linear-gradient(135deg,rgba(30,79,143,.86),rgba(19,39,67,.93)),url("${String(BW.hero_bg).replace(/["\\]/g, "")}")`
              : "linear-gradient(135deg,rgba(30,79,143,.91),rgba(19,39,67,.95))";
            hero.style.backgroundPosition = BW.hero_bg_pos || "center";
          }
          const fg = p.querySelector(".bpp-heroimg");
          if (fg) { if (BW.hero_image) { fg.src = BW.hero_image; fg.style.objectPosition = BW.hero_image_pos || "center"; fg.style.display = ""; } else fg.style.display = "none"; }
          const cc = document.getElementById("brand-contrast");
          if (cc) cc.innerHTML =
            "Chữ trên nền " + contrastPill(ratio(body, bg)) +
            " · Chữ nút trên nút " + contrastPill(ratio(btnt, btn)) +
            " · Chữ header trên header " + contrastPill(ratio(htxt, hbg));
        }

        function wireBrand() {
          const form = document.getElementById("brand-form"); if (!form) return;
          brandPreview();
          const nm = form.querySelector("[data-bname]");
          if (nm) nm.addEventListener("input", () => {
            BW.site_name = nm.value; dirty = true;
            const el = document.querySelector("#brand-preview .bpp-name"); if (el) el.textContent = nm.value || "Learning Ecology";
          });
          // colour picker ⇄ text field, both edit BW.colors[k]
          form.querySelectorAll("[data-bcol]").forEach(pick => {
            const k = pick.getAttribute("data-bcol");
            const txt = form.querySelector(`[data-btext="${k}"]`);
            pick.addEventListener("input", () => {
              BW.colors[k] = pick.value; if (txt) { txt.value = pick.value; txt.style.borderColor = ""; }
              dirty = true; brandPreview();
            });
            if (txt) txt.addEventListener("input", () => {
              const raw = txt.value.trim();
              if (raw === "") { BW.colors[k] = ""; txt.style.borderColor = ""; pick.value = pickerHex(k in BRAND_DEF ? BRAND_DEF[k] : "#888888"); dirty = true; return brandPreview(); }
              const n = normColor(raw);
              if (n) { BW.colors[k] = raw; txt.style.borderColor = ""; pick.value = pickerHex(n); dirty = true; brandPreview(); }
              else { txt.style.borderColor = "var(--danger)"; }
            });
          });
          // position selects
          form.querySelectorAll("[data-bpos]").forEach(sel =>
            sel.addEventListener("change", () => { BW[sel.getAttribute("data-bpos")] = sel.value; dirty = true; brandPreview(); }));
          // image drops (logo keeps PNG transparency; photos become optimised JPEG)
          form.querySelectorAll(".bdrop").forEach(drop => {
            const k = drop.getAttribute("data-bk");
            const isPng = drop.getAttribute("data-fmt") === "png";
            const fmt = isPng ? "image/png" : "image/jpeg", ext = isPng ? "png" : "jpg";
            const maxW = +drop.getAttribute("data-max");
            const file = drop.querySelector('input[type="file"]'), prev = drop.querySelector(".bprev");
            const del = drop.querySelector("[data-bdel]"), msg = drop.querySelector(".bmsg");
            const setMsg = (t, err) => { msg.textContent = t; msg.className = "msg bmsg" + (err ? " err" : ""); };
            async function take(f) {
              if (!f) return;
              if (!/^image\/(jpeg|png|webp)$/i.test(f.type || "") && !/\.(jpe?g|png|webp)$/i.test(f.name || ""))
                return setMsg('File "' + (f.name || "?") + '" không hỗ trợ — dùng JPG, PNG hoặc WebP.', 1);
              if (f.size > 10 * 1024 * 1024) return setMsg("Ảnh " + (f.size / 1048576).toFixed(1) + " MB — vượt mức 10 MB.", 1);
              try {
                setMsg("⏳ Đang tối ưu & tải lên…");
                const blob = await optimizeImg(f, maxW, fmt);
                const path = "brand-" + k + "-" + Date.now() + "." + ext;
                const { error } = await sb.storage.from("landing").upload(path, blob, { contentType: fmt, upsert: true });
                if (error) throw error;
                BW[k] = sb.storage.from("landing").getPublicUrl(path).data.publicUrl;
                prev.src = BW[k]; prev.style.display = ""; if (del) del.hidden = false;
                dirty = true; brandPreview();
                setMsg("✓ Đã tải lên — nhớ 💾 Lưu nháp rồi 🚀 Publish.");
              } catch (err) { setMsg("Không tải được: " + (err.message || err), 1); }
            }
            drop.addEventListener("click", e => { if (e.target.closest("[data-bdel]") || e.target.closest("select")) return; file.click(); });
            drop.addEventListener("keydown", e => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); file.click(); } });
            file.addEventListener("change", () => take(file.files[0]));
            ["dragenter", "dragover"].forEach(ev => drop.addEventListener(ev, e => { e.preventDefault(); drop.style.borderColor = "var(--accent-ink)"; }));
            ["dragleave", "drop"].forEach(ev => drop.addEventListener(ev, e => { e.preventDefault(); drop.style.borderColor = "var(--line)"; }));
            drop.addEventListener("drop", e => take(e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0]));
            if (del) del.addEventListener("click", () => {
              BW[k] = ""; prev.src = ""; prev.style.display = "none"; del.hidden = true; dirty = true; brandPreview();
              setMsg("Ảnh sẽ bị gỡ khi 💾 Lưu.");
            });
          });
        }

        async function saveBrand(mode) {
          const msg = document.getElementById("brand-msg");
          const say = (t, err) => { if (msg) { msg.textContent = t; msg.className = "msg" + (err ? " err" : ""); } };
          const colors = {};
          COLOR_ROLES.forEach(([k]) => { const v = normColor(bcol(k)); if (v) colors[k] = v; });
          const brand = {
            logo_url: BW.logo_url || "", site_name: BW.site_name || "",
            hero_image: BW.hero_image || "", hero_image_pos: BW.hero_image_pos || "center",
            hero_bg: BW.hero_bg || "", hero_bg_pos: BW.hero_bg_pos || "center", colors
          };
          const cfg = JSON.parse(JSON.stringify(D.cfg || {}));
          if (mode === "draft") cfg.brand_draft = brand;
          else { cfg.brand = brand; delete cfg.brand_draft; }
          try {
            const { error } = await sb.from("landing_settings").upsert({ id: 1, config: cfg });
            if (error) throw error;
            D.cfg = cfg; dirty = false; paint();
            UI.toast(mode === "publish" ? "🚀 Đã publish thương hiệu — khách thấy ngay lần tải kế tiếp"
                                        : "💾 Đã lưu nháp — bấm 👁 Xem trước để kiểm tra");
          } catch (err) { say("Không lưu được: " + (err.message || err), 1); }
        }
        function restoreBrand() {
          UI.confirmDialog({ title: "Khôi phục thương hiệu mặc định?", danger: true,
            okText: "Đặt lại",
            body: "Xóa logo/tên/ảnh hero và toàn bộ màu tùy chỉnh, đưa trang chủ về giao diện gốc. "
                + "Thay đổi chỉ áp dụng cho khách sau khi bạn bấm 🚀 Publish." }).then(ok => {
            if (!ok) return;
            BW = { colors: {} }; dirty = true; paint();
            UI.toast("↩ Đã đặt lại về mặc định — bấm 🚀 Publish để áp dụng cho khách");
          });
        }


        function paint() {
          if (failed) {
            root.innerHTML = `<p class="empty">Chạy <b>migration35_landing.sql</b> trong Supabase trước — sau đó mở lại tab này.</p>`;
            return;
          }
          if (!loaded) { root.innerHTML = `<p class="empty">Đang tải…</p>`; return; }
          root.innerHTML = `
            <div class="form-row" style="gap:0.4rem; margin-bottom:0.4rem;">
              ${Object.keys(NAMES).map(k =>
                `<button class="${k === cur ? "" : "ghost"}" data-lpmtab="${k}">${NAMES[k]}${T[k] ? " (" + D[k].length + ")" : ""}</button>`).join("")}
            </div>
            ${cur === "settings" ? settingsPanel() : cur === "hero" ? heroPanel()
              : cur === "brand" ? brandPanel() : cur === "previews" ? previewsPanel() : listPanel(cur)}`;
          wireImages();
          wireSectionDnD();
          if (cur === "brand") wireBrand();
          if (cur === "previews") wirePreviews();
        }

        /* ---------- Xem trước công khai (Phase 34) ----------
           Chọn khóa nào cho khách xem trước và đặt liên kết. Nút "Xem toàn bộ
           khoá học" trên trang chủ chỉ hiện khi khóa được BẬT và có liên kết
           hợp lệ. Lưu vào cfg.previews[<course_id>] = { on, url, new_tab }.
           Tắt KHÔNG xóa liên kết (giữ url để bật lại sau). */
        function previewsPanel() {
          const pv = (D.cfg || {}).previews || {};
          const list = courses || [];
          if (!list.length)
            return `<p class="empty">Chưa có khóa học nội bộ nào. Tạo khóa ở tab <b>Courses</b> trước, rồi quay lại đây.</p>`;
          return `
            <p class="kind" style="text-transform:none; margin:.5rem 0;">
              Chọn khóa cho khách <b>xem trước công khai</b> và đặt liên kết cho nút <b>“Xem toàn bộ khoá học”</b>
              trên trang chủ. Nút chỉ hiện khi khóa được <b>bật</b> và có liên kết hợp lệ. Tắt sẽ ẩn nút nhưng
              <b>không xóa</b> liên kết đã lưu. Dùng nút <b>“Dùng trang có sẵn”</b> để tự điền trang xem trước
              <code>course.html</code> tích hợp sẵn.</p>
            ${list.map(c => {
              const p = pv[c.id] || {};
              return `
              <div class="card">
                <div class="card-head">
                  <h2>${c.icon ? esc(c.icon) + " " : ""}${esc(c.title)}</h2>
                  <label style="font-size:.9rem; color:var(--muted); white-space:nowrap;">
                    <input type="checkbox" data-pvon="${c.id}" ${p.on ? "checked" : ""}> Bật xem trước công khai</label>
                </div>
                <div class="form-row" style="align-items:flex-end;">
                  <div class="field" style="flex:1 1 260px;"><label>Liên kết xem trước</label>
                    <input data-pvurl="${c.id}" value="${esc(p.url || "")}" placeholder="course.html?id=${c.id}"></div>
                  <button class="ghost" data-act="pv_usebuilt" data-cid="${c.id}">↩ Dùng trang có sẵn</button>
                  <label style="font-size:.85rem; color:var(--muted); align-self:center;">
                    <input type="checkbox" data-pvnew="${c.id}" ${p.new_tab ? "checked" : ""}> mở tab mới</label>
                </div>
              </div>`;
            }).join("")}
            <div class="form-row" style="margin-top:.6rem;">
              <button data-act="pv_save">💾 Lưu</button>
              <a class="ghost btn" style="text-decoration:none;" href="index.html?preview=1" target="_blank" rel="noopener">👁 Xem trước trang chủ</a>
            </div>
            <p class="msg" id="pv-msg"></p>`;
        }
        function wirePreviews() {
          root.querySelectorAll("[data-pvon],[data-pvurl],[data-pvnew]")
            .forEach(el => el.addEventListener("input", () => { dirty = true; }));
        }
        async function savePreviews() {
          const msg = document.getElementById("pv-msg");
          const say = (t, e) => { if (msg) { msg.textContent = t; msg.className = "msg" + (e ? " err" : ""); } };
          const cfg = JSON.parse(JSON.stringify(D.cfg || {}));
          const previews = {};
          let bad = null;
          (courses || []).forEach(c => {
            const on = root.querySelector(`[data-pvon="${c.id}"]`);
            const url = root.querySelector(`[data-pvurl="${c.id}"]`);
            const nt = root.querySelector(`[data-pvnew="${c.id}"]`);
            if (!on || !url) return;
            const u = url.value.trim();
            if (u && !okUrl(u)) { bad = u; return; }
            // keep the row if enabled OR a url is set (so disabling never loses the url)
            if (on.checked || u) previews[c.id] = { on: on.checked, url: u, new_tab: !!(nt && nt.checked) };
          });
          if (bad !== null) return say('Liên kết "' + bad + '" không hợp lệ — cần https://…, course.html?id=…, hoặc để trống.', 1);
          cfg.previews = previews;
          try {
            const { error } = await sb.from("landing_settings").upsert({ id: 1, config: cfg });
            if (error) throw error;
            D.cfg = cfg; dirty = false;
            say("✓ Đã lưu — trang chủ cập nhật ở lần tải kế tiếp.");
            UI.toast("✓ Đã lưu cài đặt xem trước công khai");
          } catch (err) { say("Không lưu được: " + (err.message || err), 1); }
        }

        /* ---------- image upload (drag-drop + picker, validated) ---------- */
        function wireImages() {
          root.querySelectorAll(".lpm-drop").forEach(drop => {
            const file = drop.querySelector('input[type="file"]');
            const hid = drop.querySelector('input[type="hidden"]');
            const prev = drop.querySelector("img");
            const del = drop.querySelector("[data-imgdel]");
            const msg = drop.querySelector("[data-imgmsg]");
            const setMsg = (t, err) => { msg.textContent = t; msg.className = "msg" + (err ? " err" : ""); };
            async function take(f) {
              if (!f) return;
              if (!/^image\/(jpeg|png|webp)$/i.test(f.type || "") && !/\.(jpe?g|png|webp)$/i.test(f.name || ""))
                return setMsg('File "' + (f.name || "?") + '" không được hỗ trợ — dùng JPG, PNG hoặc WebP.', 1);
              if (f.size > 10 * 1024 * 1024)
                return setMsg("Ảnh " + (f.size / 1048576).toFixed(1) + " MB — vượt mức 10 MB.", 1);
              try {
                setMsg("⏳ Đang xử lý & tải lên…");
                const blob = (window.UI && UI.resizeImage) ? await UI.resizeImage(f, 1600) : f;
                const path = cur + "-" + Date.now() + ".jpg";
                const { error } = await sb.storage.from("landing").upload(path, blob, { contentType: "image/jpeg", upsert: true });
                if (error) throw error;
                hid.value = sb.storage.from("landing").getPublicUrl(path).data.publicUrl;
                prev.src = hid.value; prev.style.display = ""; del.hidden = false;
                dirty = true;
                setMsg("✓ Đã tải lên — nhớ bấm 💾 Lưu.");
              } catch (err) { setMsg("Không tải được: " + (err.message || err), 1); }
            }
            drop.addEventListener("click", e => {
              if (e.target.closest("[data-imgdel]")) return;
              file.click();
            });
            drop.addEventListener("keydown", e => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); file.click(); } });
            file.addEventListener("change", () => take(file.files[0]));
            ["dragenter", "dragover"].forEach(ev => drop.addEventListener(ev, e => {
              e.preventDefault(); drop.style.borderColor = "var(--accent-ink)";
            }));
            ["dragleave", "drop"].forEach(ev => drop.addEventListener(ev, e => {
              e.preventDefault(); drop.style.borderColor = "var(--line)";
            }));
            drop.addEventListener("drop", e => take(e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0]));
            if (del) del.addEventListener("click", () => {
              hid.value = ""; prev.src = ""; prev.style.display = "none"; del.hidden = true; dirty = true;
              setMsg("Ảnh sẽ bị gỡ khi bấm 💾 Lưu.");
            });
          });
          root.querySelectorAll(".lpm-form input, .lpm-form textarea, .lpm-form select")
            .forEach(el => el.addEventListener("input", () => { dirty = true; }));
          /* "custom" focal point asks for an explicit "x% y%" position */
          root.querySelectorAll('select[data-k="focal"], select[data-k="photo_pos"]').forEach(sel =>
            sel.addEventListener("change", async () => {
              if (sel.value !== "custom") return;
              const v = await UI.promptDialog({ title: "Tâm ảnh tùy chỉnh",
                label: 'Nhập vị trí theo dạng "50% 30%" (ngang dọc)', placeholder: "50% 30%" });
              if (v && /^\d{1,3}% \d{1,3}%$/.test(v.trim())) {
                const o = document.createElement("option");
                o.value = v.trim(); o.textContent = v.trim(); o.selected = true;
                sel.appendChild(o);
              } else sel.value = "center";
            }));
        }

        /* ---------- storage cleanup: only delete files no other item uses ---------- */
        const IMG_KEYS = ["image_url", "cover_url", "avatar_url", "shot_url"];
        function urlUsedElsewhere(url, exceptId) {
          if (!url) return true;
          for (const k of Object.keys(T))
            for (const r of D[k])
              if (r.id !== exceptId && IMG_KEYS.some(f => r[f] === url)) return true;
          const t = (D.cfg || {}).trial || {};
          return t.image === url;
        }
        async function maybeRemoveFile(url, exceptId) {
          try {
            if (!url || urlUsedElsewhere(url, exceptId)) return;
            const path = String(url).split("/landing/")[1];
            if (path) await sb.storage.from("landing").remove([path.split("?")[0]]);
          } catch (e) { /* best effort */ }
        }

        /* ---------- CRUD ---------- */
        async function reload(coll) {
          const { data } = await sb.from(T[coll]).select("*").order("sort_order").order("updated_at");
          D[coll] = data || [];
        }
        async function saveForm(formEl) {
          const coll = formEl.getAttribute("data-coll");
          const id = formEl.getAttribute("data-id");
          const msgEl = formEl.querySelector(".lpm-msg");
          const say = (t, err) => { msgEl.textContent = t; msgEl.className = "msg" + (err ? " err" : ""); };
          const row = {};
          for (const f of F[coll]) {
            const el = formEl.querySelector(`[data-k="${f.k}"]`);
            if (!el) continue;
            let v = f.t === "check" ? el.checked : el.value.trim();
            if (f.t === "course") v = v || null;
            if (f.req && !v) return say('Thiếu "' + f.l.replace(" *", "") + '".', 1);
            if (f.t === "url" && !okUrl(v)) return say('Liên kết "' + v + '" không hợp lệ — cần bắt đầu bằng https:// (hoặc để trống).', 1);
            row[f.k] = v;
          }
          try {
            if (id) {
              const { error } = await sb.from(T[coll]).update(row).eq("id", id);
              if (error) throw error;
            } else {
              row.sort_order = D[coll].length;
              const { error } = await sb.from(T[coll]).insert(row);
              if (error) throw error;
            }
            dirty = false; editing = null;
            await reload(coll); paint();
            UI.toast("✓ Đã lưu — mục " + (id ? "đã cập nhật" : "mới ở trạng thái Draft"));
          } catch (err) { say("Không lưu được: " + (err.message || err), 1); }
        }
        async function persistOrder(coll) {
          for (const [i, r] of D[coll].entries())
            if (r.sort_order !== i) { await sb.from(T[coll]).update({ sort_order: i }).eq("id", r.id); r.sort_order = i; }
        }
        async function saveConfig() {
          const msgEl = document.getElementById("lpm-cfgmsg");
          const cfg = JSON.parse(JSON.stringify(D.cfg || {}));
          cfg.trial = cfg.trial || {}; cfg.titles = cfg.titles || {};
          /* section order has its own draft/publish flow — never touched here */
          let bad = null;
          root.querySelectorAll("[data-cfg]").forEach(el => {
            const path = el.getAttribute("data-cfg").split(".");
            let v = el.type === "checkbox" ? el.checked : el.value.trim();
            if (el.getAttribute("data-cfg") === "autoplay_ms") v = Math.min(15, Math.max(4, +v || 6)) * 1000;
            if (/url|image/.test(path[path.length - 1]) && typeof v === "string" && !okUrl(v)) bad = v;
            if (path.length === 2) { cfg[path[0]] = cfg[path[0]] || {}; cfg[path[0]][path[1]] = v; }
            else cfg[path[0]] = v;
          });
          if (bad !== null) { msgEl.textContent = 'Liên kết "' + bad + '" không hợp lệ (cần https://… hoặc để trống).'; msgEl.className = "msg err"; return; }
          try {
            const { error } = await sb.from("landing_settings").upsert({ id: 1, config: cfg });
            if (error) throw error;
            D.cfg = cfg; dirty = false;
            msgEl.textContent = "✓ Đã lưu — trang chủ cập nhật ngay lần tải tiếp theo."; msgEl.className = "msg";
          } catch (err) { msgEl.textContent = "Không lưu được: " + (err.message || err); msgEl.className = "msg err"; }
        }

        /* ---------- section order: draft → publish ---------- */
        function reindexSecs() {
          const rows = [...root.querySelectorAll("#lpm-secs .lpm-sec")];
          rows.forEach((el, k) => {
            const u = el.querySelector('[data-act="secup"]'), d = el.querySelector('[data-act="secdown"]');
            if (u) { u.setAttribute("data-i", k); u.disabled = k === 0; }
            if (d) { d.setAttribute("data-i", k); d.disabled = k === rows.length - 1; }
          });
        }
        /* drag-and-drop on desktop; the ↑ ↓ buttons stay for phones */
        function wireSectionDnD() {
          const box = document.getElementById("lpm-secs");
          if (!box) return;
          let dragEl = null;
          box.querySelectorAll(".lpm-sec").forEach(row => {
            row.addEventListener("dragstart", e => {
              dragEl = row; row.style.opacity = ".45";
              e.dataTransfer.effectAllowed = "move";
              try { e.dataTransfer.setData("text/plain", row.getAttribute("data-sec")); } catch (err) {}
            });
            row.addEventListener("dragend", () => {
              if (dragEl) dragEl.style.opacity = "";
              dragEl = null; reindexSecs(); dirty = true;
            });
            row.addEventListener("dragover", e => {
              e.preventDefault();
              if (!dragEl || dragEl === row) return;
              const rect = row.getBoundingClientRect();
              const after = (e.clientY - rect.top) > rect.height / 2;
              /* only ever reposition among the movable rows, so the locked
                 hero row can never be pushed out of first place */
              row.parentElement.insertBefore(dragEl, after ? row.nextSibling : row);
            });
          });
          box.addEventListener("dragover", e => e.preventDefault());
          box.addEventListener("drop", e => e.preventDefault());
        }
        async function saveSections(mode) {
          const msgEl = document.getElementById("lpm-secmsg");
          const say = (t, err) => { if (msgEl) { msgEl.textContent = t; msgEl.className = "msg" + (err ? " err" : ""); } };
          const cfg = JSON.parse(JSON.stringify(D.cfg || {}));
          if (mode === "cancel") {
            delete cfg.sections_draft;                    // fall back to the published order
          } else {
            const list = [...root.querySelectorAll("#lpm-secs .lpm-sec")].map(el => ({
              id: el.getAttribute("data-sec"),
              show: el.querySelector('input[type="checkbox"]').checked
            }));
            if (!list.length) return say("Không đọc được danh sách phần.", 1);
            if (mode === "draft") cfg.sections_draft = list;
            else { cfg.sections = list; delete cfg.sections_draft; }
          }
          try {
            const { error } = await sb.from("landing_settings").upsert({ id: 1, config: cfg });
            if (error) throw error;
            D.cfg = cfg; dirty = false; paint();
            UI.toast(mode === "publish" ? "🚀 Đã publish bố cục — khách thấy ngay"
                   : mode === "draft"   ? "💾 Đã lưu nháp — bấm Publish khi sẵn sàng"
                                        : "↩ Đã khôi phục bố cục đang publish");
          } catch (err) { say("Không lưu được: " + (err.message || err), 1); }
        }

        /* ---------- events ---------- */
        root.addEventListener("click", e => {
          const tabBtn = e.target.closest("[data-lpmtab]");
          if (tabBtn) return guardDirty(() => { cur = tabBtn.getAttribute("data-lpmtab"); if (cur === "brand") brandInit(); paint(); });
          const b = e.target.closest("[data-act]");
          if (!b) return;
          const act = b.getAttribute("data-act");
          const coll = b.getAttribute("data-coll");
          const id = b.getAttribute("data-id");
          if (act === "save") return saveForm(b.closest(".lpm-form"));
          if (act === "cancel") return guardDirty(paint);
          if (act === "add") return guardDirty(() => { editing = { coll, id: null, draft: {} }; paint(); });
          if (act === "edit") return guardDirty(() => {
            editing = { coll, id, draft: { ...D[coll].find(r => r.id === id) } }; paint();
          });
          if (act === "dup") {
            const src = D[coll].find(r => r.id === id); if (!src) return;
            const copy = { ...src }; delete copy.id; delete copy.updated_at;
            copy.status = "draft"; copy.sort_order = D[coll].length;
            const tk = TITLE_OF[coll](copy); if (copy.title) copy.title = tk + " (bản sao)";
            sb.from(T[coll]).insert(copy).then(async ({ error }) => {
              if (error) return UI.toast("Không nhân bản được: " + error.message, "err");
              await reload(coll); paint(); UI.toast("⧉ Đã tạo bản sao (Draft)");
            });
            return;
          }
          if (act === "del") {
            const r = D[coll].find(x => x.id === id); if (!r) return;
            UI.confirmDialog({ title: 'Xóa "' + (TITLE_OF[coll](r) || "mục này") + '"?', danger: true,
              okText: "Xóa vĩnh viễn",
              body: "Mục sẽ biến mất khỏi landing page ngay lập tức. Ảnh đính kèm chỉ bị xóa nếu không mục nào khác dùng chung. Không thể hoàn tác." })
              .then(async ok => {
                if (!ok) return;
                const { error } = await sb.from(T[coll]).delete().eq("id", id);
                if (error) return UI.toast("Không xóa được: " + error.message, "err");
                for (const k of IMG_KEYS) if (r[k]) await maybeRemoveFile(r[k], id);
                await reload(coll); paint(); UI.toast("🗑 Đã xóa");
              });
            return;
          }
          if (act === "up" || act === "down") {
            const i = D[coll].findIndex(r => r.id === id);
            const j = act === "up" ? i - 1 : i + 1;
            if (j < 0 || j >= D[coll].length) return;
            [D[coll][i], D[coll][j]] = [D[coll][j], D[coll][i]];
            persistOrder(coll).then(paint);
            return;
          }
          if (act === "secup" || act === "secdown") {
            const list = [...root.querySelectorAll("#lpm-secs .lpm-sec")];
            const i = +b.getAttribute("data-i");
            const j = act === "secup" ? i - 1 : i + 1;
            if (j < 0 || j >= list.length) return;
            const doSwap = () => {
              const parent = list[0].parentElement;
              if (act === "secup") parent.insertBefore(list[i], list[j]);
              else parent.insertBefore(list[j], list[i]);
              reindexSecs(); dirty = true;
            };
            if (list[i].getAttribute("data-sec") === "trial" && act === "secdown")
              UI.confirmDialog({ title: "Chuyển 'Học thử miễn phí' khỏi vị trí đầu?", danger: true,
                body: "Đây là khu vực chuyển đổi chính — nên luôn là phần đầu tiên khách nhìn thấy.",
                okText: "Vẫn chuyển xuống" }).then(ok => { if (ok) doSwap(); });
            else doSwap();
            return;
          }
          if (act === "secdraft") return saveSections("draft");
          if (act === "secpublish") return saveSections("publish");
          if (act === "seccancel") return saveSections("cancel");
          if (act === "cfgsave") return saveConfig();
          if (act === "brand_savedraft") return saveBrand("draft");
          if (act === "brand_publish") return saveBrand("publish");
          if (act === "brand_restore") return restoreBrand();
          if (act === "pv_save") return savePreviews();
          if (act === "pv_usebuilt") {
            const cid = b.getAttribute("data-cid");
            const inp = root.querySelector(`[data-pvurl="${cid}"]`);
            const on = root.querySelector(`[data-pvon="${cid}"]`);
            if (inp) { inp.value = "course.html?id=" + cid; dirty = true; }
            if (on && !on.checked) on.checked = true;   // filling the link implies enabling
            return;
          }
          if (act === "multi") return document.getElementById("lpm-multi").click();
        });
        root.addEventListener("change", async e => {
          const sel = e.target.closest('select[data-act="status"]');
          if (sel) {
            if (dirty) {
              UI.toast("Hãy 💾 Lưu hoặc Hủy biểu mẫu đang mở trước khi đổi trạng thái.", "err");
              paint(); return;
            }
            const coll = sel.getAttribute("data-coll"), id = sel.getAttribute("data-id");
            const { error } = await sb.from(T[coll]).update({ status: sel.value }).eq("id", id);
            if (error) {
              UI.toast(coll === "fb" && /permission/i.test(error.message)
                ? "Chưa đăng được: hãy mở ✏️ và tick 'ĐÃ xin phép học viên' trước."
                : "Không đổi được trạng thái: " + error.message, "err");
            } else UI.toast("✓ " + sel.value);
            await reload(coll); paint();
            return;
          }
          if (e.target.id === "lpm-multi") {
            const files = [...e.target.files];
            for (const f of files) {
              if (f.size > 10 * 1024 * 1024 || !/^image\/(jpeg|png|webp)$/i.test(f.type || "")) continue;
              try {
                const blob = (window.UI && UI.resizeImage) ? await UI.resizeImage(f, 1600) : f;
                const path = "gal-" + Date.now() + "-" + Math.random().toString(36).slice(2, 7) + ".jpg";
                const { error } = await sb.storage.from("landing").upload(path, blob, { contentType: "image/jpeg" });
                if (error) continue;
                await sb.from("landing_gallery").insert({
                  image_url: sb.storage.from("landing").getPublicUrl(path).data.publicUrl,
                  image_alt: f.name.replace(/\.[a-z]+$/i, ""), sort_order: D.gal.length
                });
              } catch (err) {}
            }
            await reload("gal"); paint();
            UI.toast("⬆ Đã tải " + files.length + " ảnh (Draft — thêm mô tả rồi Publish)");
          }
        });

        window.__lpmInit = async function () {
          if (loaded || failed) { paint(); return; }
          paint();
          await load();
          paint();
        };
      })();
      // =============== END LANDING PAGE CMS ===============

      document.getElementById("e-add").addEventListener("click", async () => {

      // ---- filtered, searchable, sortable lesson list ----

      const normA = s => String(s || "").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");

      function wireLessonRows(box) {
