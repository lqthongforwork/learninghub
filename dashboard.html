<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — Learning Ecology</title>
  <link rel="stylesheet" href="styles.css" />
  <script>
    /* apply dark mode before first paint: saved choice, else device preference */
    try { var __t = localStorage.getItem("hub_theme");
      if (__t === "dark" || (!__t && matchMedia("(prefers-color-scheme: dark)").matches))
        document.documentElement.setAttribute("data-theme", "dark");
    } catch (e) {}
  </script>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#17263e" />
  <link rel="icon" type="image/png" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" href="icons/icon-180.png" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Learning Ecology" />
</head>
<body>
  <header class="topbar">
    <span class="brand"><img src="icons/icon-192.png" alt="" />Learning Ecology</span>
    <div style="display:flex; align-items:center;">
      <span id="bell-slot" style="margin-right:0.5rem;"></span>
      <span class="badge" id="who-badge" style="display:none;"></span>
      <span class="who" id="who"></span>
      <button class="ghost" id="lang-btn" style="margin-right:0.5rem;"></button>
      <button class="ghost" id="signout" data-i18n="sign_out">Sign out</button>
    </div>
  </header>

  <main class="container" id="app">
    <p class="empty" data-i18n="loading">Loading…</p>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.454.0/dist/umd/lucide.min.js"></script>
  <script src="lang.js"></script>
  <script src="config.js"></script>
  <script src="ui.js"></script>
  <script>
    applyI18n();
    const langBtn = document.getElementById("lang-btn");
    langBtn.textContent = LANG === "en" ? "VI" : "EN";
    langBtn.title = t("lang_name");
    langBtn.addEventListener("click", () => setLang(otherLang()));

    const app = document.getElementById("app");
    const who = document.getElementById("who");
    let user = null;
    let adminTab = "lessons";

    document.getElementById("signout").addEventListener("click", async () => {
      await sb.auth.signOut();
      window.location.href = "login.html";
    });

    function esc(s) {
      return String(s ?? "").replace(/[&<>"']/g, c =>
        ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" }[c]));
    }

    // Wait for a pause in typing before rebuilding lists/tables —
    // keeps every keystroke instant even with hundreds of rows.
    function debounce(fn, ms) {
      let t;
      return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms || 200); };
    }

    // Shared by the account importer and the reading importer.
    // Handles quoted cells, "" escapes, and line breaks inside cells.
    function parseCSV(text) {
      const rows = []; let row = [], cell = "", q = false;
      for (let i = 0; i < text.length; i++) {
        const ch = text[i];
        if (q) {
          if (ch === '"') { if (text[i + 1] === '"') { cell += '"'; i++; } else q = false; }
          else cell += ch;
        } else if (ch === '"') q = true;
        else if (ch === ",") { row.push(cell); cell = ""; }
        else if (ch === "\n" || ch === "\r") {
          if (ch === "\r" && text[i + 1] === "\n") i++;
          row.push(cell); cell = "";
          if (row.some(c => c.trim() !== "")) rows.push(row);
          row = [];
        } else cell += ch;
      }
      row.push(cell);
      if (row.some(c => c.trim() !== "")) rows.push(row);
      return rows;
    }

    function loadXLSX() {
      return new Promise((res, rej) => {
        if (window.XLSX) return res(window.XLSX);
        const sc = document.createElement("script");
        sc.src = "https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js";
        sc.onload = () => res(window.XLSX);
        sc.onerror = () => rej(new Error("Could not load the Excel reader — check the internet connection, or save the file as CSV instead."));
        document.head.appendChild(sc);
      });
    }

    // Label a file/link by its extension.
    function kindOf(name) {
      const e = (String(name || "").split("?")[0].split(".").pop() || "").toLowerCase();
      return ({ pdf:"pdf", doc:"word", docx:"word", ppt:"powerpoint", pptx:"powerpoint",
                xls:"excel", xlsx:"excel", csv:"excel", html:"html", htm:"html",
                mp3:"audio", wav:"audio", m4a:"audio", mp4:"video",
                png:"image", jpg:"image", jpeg:"image", webp:"image", gif:"image",
                txt:"text" })[e] || null;
    }

    function stripHtml(s) {
      const d = document.createElement("div");
      d.innerHTML = String(s ?? "");
      return d.textContent || "";
    }

    function iconFor(kind) {
      return ({ pdf:"📄", word:"📝", powerpoint:"📊", excel:"📈", html:"🌐",
                audio:"🎧", video:"🎬", image:"🖼️", text:"📃", link:"🔗" })[kind] || "📄";
    }

    // Open an uploaded material via a short-lived signed link.
    // Supabase only grants the link if this user may access the file.
    function wireFileButtons(scope) {
      scope.querySelectorAll(".open-file").forEach(btn => {
        btn.addEventListener("click", async () => {
          btn.disabled = true;
          const { data, error } = await sb.storage
            .from("materials").createSignedUrl(btn.getAttribute("data-path"), 3600);
          btn.disabled = false;
          if (error) { alert(t("file_open_fail") + error.message); return; }
          window.open(data.signedUrl, "_blank", "noopener");
        });
      });
    }

    async function start() {
      const { data: { session } } = await sb.auth.getSession();
      if (!session) { window.location.href = "login.html"; return; }
      user = session.user;

      const { data: profile } = await sb
        .from("profiles")
        .select("full_name, role, avatar_url, active_session, multi_device, access_expires, suspended")
        .eq("id", user.id).single();

      // ---- access period enforcement (students only) ----
      const STAFF = ["owner", "admin", "teacher"];
      if (!STAFF.includes(profile?.role)) {
        const today = new Date(); today.setHours(0, 0, 0, 0);
        const expired = profile?.access_expires && new Date(profile.access_expires) < today;
        if (profile?.suspended || expired) {
          const name = profile?.full_name || user.email;
          who.textContent = name;
          app.innerHTML = `
            <div class="card" style="max-width:480px; margin:3rem auto; text-align:center; border-top:4px solid var(--danger);">
              <div style="font-size:2.4rem;">🔒</div>
              <h1 style="font-size:1.4rem;">${t("acc_expired_t")}</h1>
              <p style="color:var(--muted);">${profile?.suspended ? t("acc_susp_m") : t("acc_expired_m")}</p>
              <a class="btn" href="https://zalo.me/0961923983" target="_blank" rel="noopener"
                 style="text-decoration:none; display:inline-block; margin-top:0.5rem;">💬 ${t("contact_teacher")}</a>
            </div>`;
          return;
        }
      }

      // ---- one device per student account ----
      // (admins and accounts you've granted multi-device are exempt)
      if (!STAFF.includes(profile?.role) && !profile?.multi_device) {
        let device = null;
        try { device = localStorage.getItem("hub_device"); } catch (e) {}
        if (!device) {
          device = crypto.randomUUID();
          try { localStorage.setItem("hub_device", device); } catch (e) {}
        }
        const kick = async () => {
          try { await sb.auth.signOut({ scope: "local" }); } catch (e) {}
          window.location.href = "login.html?kicked=1";
        };
        if (!profile?.active_session) {
          // Legacy session from before this feature: claim this device.
          await sb.from("profiles").update({ active_session: device }).eq("id", user.id);
        } else if (profile.active_session !== device) {
          kick(); return;
        }
        // Re-check periodically: if another device logs in, leave.
        setInterval(async () => {
          const { data } = await sb.from("profiles")
            .select("active_session").eq("id", user.id).single();
          if (data?.active_session && data.active_session !== device) kick();
        }, 45000);
      }

      const name = profile?.full_name || user.email;
      who.textContent = name;
      const badge = document.getElementById("who-badge");
      badge.style.display = "inline-flex";
      badge.innerHTML = profile?.avatar_url
        ? `<img src="${esc(profile.avatar_url)}" alt="" />`
        : esc(String(name).charAt(0).toUpperCase());

      if (window.UI && UI.initBell) UI.initBell(document.getElementById("bell-slot"));
      if (profile?.role !== "owner" && window.UI && UI.applyBrand) {
        sb.from("organizations").select("brand_color").limit(1)
          .then(({ data }) => { if (data && data[0] && data[0].brand_color) UI.applyBrand(data[0].brand_color); });
      }

      // which optional modules are switched on for this installation
      // (migration38; if the table is absent everything stays enabled)
      try {
        const mr = await sb.from("app_modules").select("*").eq("id", 1).maybeSingle()
          .then(r => r, () => null);
        if (mr && !mr.error && mr.data) window.__modules = mr.data;
      } catch (e) { /* fail open */ }

      if (profile?.role === "owner") renderAdmin();
      else if (profile?.role === "admin") { window.location.href = "admin.html"; return; }
      else if (profile?.role === "teacher") { window.location.href = "teacher.html"; return; }
      else renderStudent();
    }

    // ---------- STUDENT VIEW ----------
    async function renderStudent() {
      const __scrollY = window.scrollY;
      const T2c = window.UI ? UI.t2 : (k => k);
      // First visit: show skeleton cards instead of a blank page.
      // (Re-renders keep the old content visible while data reloads.)
      if (!app.querySelector(".tabpane") && window.UI) app.innerHTML = UI.skeleton(3);

      // RLS already filters these to: my courses, their lessons,
      // plus any lesson that has no course. All queries run IN
      // PARALLEL — one network round trip instead of sixteen.
      const [
        { data: courses }, { data: lessons }, { data: mine }, { data: myActs },
        { data: anns }, { data: myAsgns }, { data: mySubs }, { data: mySessions },
        { data: myMats }, { data: mePlan }, { data: myCardsRaw }, { data: myRevsRaw },
        { data: lbRows }, lpRes, { data: teachers }, { data: me }
      ] = await Promise.all([
        sb.from("courses").select("*").order("sort_order").order("created_at"),
        sb.from("lessons").select("*").order("sort_order").order("created_at"),
        sb.from("progress").select("lesson_id, status, updated_at").eq("student_id", user.id),
        sb.from("lesson_activity")
          .select("lesson_id, kind, key, value, max_value, updated_at")
          .eq("student_id", user.id),
        sb.from("announcements").select("*")
          .order("created_at", { ascending: false }).limit(10),
        sb.from("assignments").select("*").order("due_on", { ascending: true, nullsFirst: false }),
        sb.from("submissions").select("*").eq("student_id", user.id),
        sb.from("sessions").select("*").order("starts_at", { ascending: true }),
        sb.from("teacher_materials").select("*").order("created_at", { ascending: false }),
        sb.from("profiles").select("plan, premium_until").eq("id", user.id).single(),
        // flashcards + leaderboard need migration 23 — empty until then
        sb.from("flashcards").select("*").order("sort_order").order("created_at"),
        sb.from("flashcard_reviews").select("*").eq("student_id", user.id),
        sb.rpc("class_leaderboard"),
        sb.from("profiles").select("show_on_leaderboard").eq("id", user.id).single(),
        sb.from("profiles").select("full_name, avatar_url, bio").neq("id", user.id).limit(1),
        sb.from("profiles").select("full_name, bio, avatar_url, access_expires, org_id").eq("id", user.id).single()
      ]);
      const myCards = myCardsRaw || [];
      const myRevs = myRevsRaw || [];
      let lbPref = null;   // null = column not there yet → hide the toggle
      if (!lpRes.error && lpRes.data) lbPref = lpRes.data.show_on_leaderboard !== false;

      // ---- Free vs Premium gating ----
      const __t0 = new Date().toISOString().slice(0, 10);
      const isPremUser = mePlan?.plan === "premium" && (!mePlan.premium_until || mePlan.premium_until >= __t0);
      const tierOf = l => l.tier || (courses || []).find(c => c.id === l.course_id)?.tier || "free";
      const premLocked = new Set((lessons || []).filter(l => !isPremUser && tierOf(l) === "premium").map(l => l.id));
      const logLock = lid => {
        sb.from("lock_events").insert({ student_id: user.id, lesson_id: lid || null }).then(() => {});
      };
      const showUpgrade = () => {
        const T = window.UI ? UI.t2 : (k => k);
        const old = document.querySelector(".cert-overlay"); if (old) old.remove();
        const plans = window.PREMIUM_PLANS || [];
        const ov = document.createElement("div");
        ov.className = "cert-overlay";
        ov.innerHTML = `
          <div class="modal" style="max-width:430px; text-align:center;">
            <div style="font-size:2.4rem;">👑</div>
            <h3 style="font-family:var(--serif); margin:0.3rem 0; font-size:1.3rem;">${T("upgrade_title")}</h3>
            <p style="color:var(--muted); font-size:0.92rem;">${T("upgrade_body")}</p>
            ${plans.map(p => `
              <div class="lesson"><div class="meta" style="text-align:left;"><div class="title">${esc(p.name)}</div>${p.note ? `<span class="kind">${esc(p.note)}</span>` : ""}</div>
                <span class="pill done">${esc(p.price)}</span></div>`).join("")}
            <a class="btn" href="https://zalo.me/0961923983" target="_blank" rel="noopener"
               style="text-decoration:none; display:inline-block; margin-top:0.8rem;">💬 ${T("contact_upgrade")}</a>
            <div style="margin-top:0.7rem;"><button class="ghost" id="upg-close">${T("close")}</button></div>
          </div>`;
        document.body.appendChild(ov);
        ov.addEventListener("click", e => { if (e.target === ov) ov.remove(); });
        ov.querySelector("#upg-close").addEventListener("click", () => ov.remove());
      };

      const done = new Set((mine || []).filter(p => p.status === "completed").map(p => p.lesson_id));

      const withLms = l => l.url + (l.url.includes("?") ? "&" : "?") + "lms=" + l.id;

      // A lesson as a modern card: thumbnail (or a type-colored
      // placeholder), title, type, duration, and status.
      const lessonRow = l => {
        const isDone = done.has(l.id);
        const isPrem = premLocked.has(l.id);
        return `
        <div class="lcard ${isDone ? "done" : ""} ${isPrem ? "prem" : ""}">
          <div class="lc-thumb lk-${esc(l.kind || "file")}"${l.image_url ? ` style="background-image:url('${esc(l.image_url)}');"` : ""}>
            ${l.image_url ? "" : iconFor(l.kind)}
            ${isDone ? `<span class="lc-state">✓</span>` : (isPrem ? `<span class="lc-state s-lock">🔒</span>` : "")}
          </div>
          <div class="lc-body">
            <div class="lc-title">${esc(l.title)}</div>
            <span class="lc-kind">${esc(l.kind)}${l.est_minutes ? " · ~" + l.est_minutes + " min" : ""}</span>
          </div>
          <div class="lc-foot">
            ${isPrem
              ? `<button class="ghost prem-btn lc-prem-btn" data-lesson="${l.id}">👑 Premium</button>`
              : l.storage_path
              ? `<button class="ghost open-file" data-lesson="${l.id}" data-path="${esc(l.storage_path)}">${t("open")}</button>`
              : `<a class="btn ghost open-link" data-lesson="${l.id}" href="${esc(withLms(l))}" target="_blank" rel="noopener">${t("open")}</a>`}
            ${isDone
              ? `<span class="pill done">${t("completed_pill")}</span>`
              : `<button data-lesson="${l.id}" class="mark">${t("mark_done")}</button>`}
          </div>
        </div>`;
      };

      // status filter chips (All / In progress / Completed)
      let chip = "all";
      try { chip = localStorage.getItem("hub_chip") || "all"; } catch (e) {}
      const chipPass = l => chip === "all" ? true
        : (chip === "done" ? done.has(l.id) : !done.has(l.id));

      // Which lessons are locked? In a "sequential" course, everything
      // after the first uncompleted lesson is locked.
      const lockedSet = new Set();
      for (const c of (courses || [])) {
        if (!c.sequential) continue;
        const ls = (lessons || []).filter(l => l.course_id === c.id);
        const fi = ls.findIndex(x => !done.has(x.id));
        if (fi === -1) continue;
        ls.forEach((l, i) => { if (i > fi) lockedSet.add(l.id); });
      }
      const fmtDur = m => m >= 60
        ? Math.floor(m / 60) + "h" + (m % 60 ? " " + (m % 60) + "m" : "")
        : m + " min";

      // Each course card can fold its lessons away (state remembered
      // per device, so students with many courses keep a short page).
      // DEFAULT: everything starts collapsed as a compact list, except
      // the course the student is currently working on (defaultOpenId,
      // decided below once "continue learning" is known). A student's
      // own open/close choices always win over the default.
      let collapsedCourses = {};
      try { collapsedCourses = JSON.parse(localStorage.getItem("hub_courses_closed") || "{}"); } catch (e) {}
      let defaultOpenId = null;

      // One roadmap card per course, grouped into collapsible categories.
      const courseCard = c => {
        const ls = (lessons || []).filter(l => l.course_id === c.id);
        const doneCount = ls.filter(l => done.has(l.id)).length;
        const pct = ls.length ? Math.round(doneCount / ls.length * 100) : 0;
        const complete = ls.length > 0 && doneCount === ls.length;
        const color = c.color || "#1e4f8f";
        const firstOpen = ls.findIndex(x => !done.has(x.id));
        const minsLeft = ls.filter(l => !done.has(l.id))
          .reduce((s, l) => s + (l.est_minutes || 0), 0);

        const BADGES = [["🌱", 25], ["⭐", 50], ["🏅", 75], ["🏆", 100]];
        const badgeRow = ls.length ? `
          <div class="badges">
            ${BADGES.map(([b, th]) =>
              `<span class="b ${pct >= th ? "earned" : ""}" title="${th}%">${b}</span>`).join("")}
          </div>` : "";

        const rows = ls.map((l, i) => {
          if (!chipPass(l)) return "";
          const isDone = done.has(l.id);
          const isLocked = lockedSet.has(l.id);
          const isPrem = premLocked.has(l.id);
          const isCurrent = !isDone && !isLocked && c.sequential && i === firstOpen;
          const state = isDone
            ? `<span class="lc-state" title="${t("completed_pill")}">✓</span>`
            : (isPrem || isLocked) ? `<span class="lc-state s-lock">🔒</span>` : "";
          const foot = isLocked
            ? `<span class="pill todo">🔒 ${t("locked")}</span>`
            : isPrem
            ? `<button class="ghost prem-btn lc-prem-btn" data-lesson="${l.id}">👑 Premium</button>`
            : `${l.storage_path
                ? `<button class="ghost open-file" data-lesson="${l.id}" data-path="${esc(l.storage_path)}">${t("open")}</button>`
                : `<a class="btn ghost open-link" data-lesson="${l.id}" href="${esc(withLms(l))}" target="_blank" rel="noopener">${t("open")}</a>`}
              ${isDone
                ? `<span class="pill done">${t("completed_pill")}</span>`
                : `<button data-lesson="${l.id}" class="mark">${t("mark_done")}</button>`}`;
          return `
            <div class="lcard ${isDone ? "done" : ""} ${isCurrent ? "current" : ""} ${isLocked ? "locked" : ""} ${isPrem ? "prem" : ""}">
              <div class="lc-thumb lk-${esc(l.kind || "file")}"${l.image_url ? ` style="background-image:url('${esc(l.image_url)}');"` : ""}>
                ${l.image_url ? "" : iconFor(l.kind)}
                <span class="lc-num ${isDone ? "n-done" : (isCurrent ? "n-current" : "")}">${i + 1}</span>
                ${state}
              </div>
              <div class="lc-body">
                <div class="lc-title">${esc(l.title)}</div>
                <span class="lc-kind">${esc(l.kind)}${l.est_minutes ? " · ~" + l.est_minutes + " min" : ""}${isLocked ? " · " + t("locked_hint") : ""}</span>
              </div>
              <div class="lc-foot">${foot}</div>
            </div>`;
        }).join("");

        // Hero banner: image (or color gradient + icon) with a gradient
        // shade and the course facts overlaid, Udemy/Coursera style.
        const isPremCourse = c.tier === "premium";
        const T4 = window.UI ? UI.t2 : (k => k);
        const banner = `
          <div class="course-banner">
            <div class="cb-bg" style="${c.banner_url
              ? `background-image:url('${esc(c.banner_url)}');`
              : `background:linear-gradient(120deg, ${esc(color)}, ${esc(color)}b3);`}">${c.banner_url ? "" : esc(c.icon || "📚")}</div>
            <div class="cb-shade"></div>
            ${c.category ? `<span class="cb-tag">${esc(c.category)}</span>` : ""}
            ${isPremCourse ? `<span class="cb-prem">👑 Premium</span>` : ""}
            <div class="cb-info">
              <div class="cb-title">${c.icon ? esc(c.icon) + " " : ""}${esc(c.title)}</div>
              <div class="cb-stats">
                <span>${pct}%</span>
                <span>${tf("done_count", { d: doneCount, t: ls.length })}</span>
                <span>${ls.length - doneCount} ${T4("lessons_left")}</span>
                ${minsLeft ? `<span>${tf("time_left", { t: fmtDur(minsLeft) })}</span>` : ""}
              </div>
              <div class="cb-bar"><span style="width:${pct}%;"></span></div>
            </div>
          </div>`;

        const isClosed = (c.id in collapsedCourses)
          ? !!collapsedCourses[c.id]
          : (c.id !== defaultOpenId);
        return `
          <div class="card course-card ${isClosed ? "collapsed" : ""}" id="course-${c.id}" style="border-top:4px solid ${esc(color)};">
            ${banner}
            <button class="course-toggle" type="button" data-course="${c.id}">
              <span class="chev">▸</span>
              <span style="flex:1; text-align:left;">${tf("done_count", { d: doneCount, t: ls.length })}</span>
              ${minsLeft ? `<span class="kind">${tf("time_left", { t: fmtDur(minsLeft) })}</span>` : ""}
            </button>
            <div class="course-body"><div>
              ${badgeRow}
              ${c.description ? `<p style="color:var(--muted); font-size:0.88rem; margin:0 0 0.5rem;">${esc(c.description)}</p>` : ""}
              ${rows ? `<div class="lesson-grid">${rows}</div>` : `<p class="empty">${t("no_lessons_course")}</p>`}
              ${complete ? `<div class="congrats">🎉 <span style="flex:1;">${esc(c.title)}${t("congrats")}</span>
                <button class="ghost cert-btn" data-course="${esc(c.title)}" style="flex:none;">🎓 ${T2c("cert_get")}</button>
                <button class="ghost cert-share" data-cid="${c.id}" style="flex:none;" title="${esc(t("cert_share"))}">📣 ${t("cert_share")}</button></div>` : ""}
            </div></div>
          </div>`;
      };

      // ---- study statistics ----
      const dloc = d => d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
      const lastNDays = n => { const out = []; for (let i = n - 1; i >= 0; i--) { const d = new Date(); d.setDate(d.getDate() - i); out.push(dloc(d)); } return out; };
      const dayMin = {}, activeDates = new Set();
      (myActs || []).forEach(r => {
        if (r.updated_at) activeDates.add(String(r.updated_at).slice(0, 10));
        if (r.kind === "time" && r.key && r.key.startsWith("d:")) {
          const d = r.key.slice(2);
          dayMin[d] = (dayMin[d] || 0) + Math.round((Number(r.value) || 0) / 60);

      (mine || []).forEach(p => { if (p.updated_at) activeDates.add(String(p.updated_at).slice(0, 10)); });
      const totalSecs = (myActs || []).filter(r => r.kind === "time" && r.key === "total")

      const weekMin = lastNDays(7).reduce((s, d) => s + (dayMin[d] || 0), 0);
      const monthMin = lastNDays(30).reduce((s, d) => s + (dayMin[d] || 0), 0);
      let curStreak = 0;
      { const d = new Date(); while (activeDates.has(dloc(d))) { curStreak++; d.setDate(d.getDate() - 1); } }
      let longestStreak = 0;
      { let run = 0, prev = null;
        [...activeDates].sort().forEach(x => {
          if (prev) { const p = new Date(prev); p.setDate(p.getDate() + 1); run = dloc(p) === x ? run + 1 : 1; }
          else run = 1;
          longestStreak = Math.max(longestStreak, run); prev = x;
        }); }
      // streak about to break? (studied yesterday and before, nothing today)
      let riskStreak = 0;
      if (!activeDates.has(dloc(new Date()))) {
        const rd = new Date(); rd.setDate(rd.getDate() - 1);
        while (activeDates.has(dloc(rd))) { riskStreak++; rd.setDate(rd.getDate() - 1); }

      const streakBar = riskStreak >= 2
        ? `<div class="alert-bar">${tf("streak_risk", { n: riskStreak })}</div>` : "";

      const doneAll = (mine || []).filter(p => p.status === "completed").length;
      const week7 = lastNDays(7);
      const weekDone = (mine || []).filter(p => p.status === "completed" && p.updated_at &&
        week7.includes(String(p.updated_at).slice(0, 10))).length;
      const GOAL = 3;
      const xp = doneAll * 50 + Math.round(totalSecs / 60);
      const level = 1 + Math.floor(xp / 500);
      let badgesEarned = 0;
      (courses || []).forEach(c => {
        const ls = (lessons || []).filter(l => l.course_id === c.id);
        if (!ls.length) return;
        const pct = Math.round(ls.filter(l => done.has(l.id)).length / ls.length * 100);
        [25, 50, 75, 100].forEach(th => { if (pct >= th) badgesEarned++; });

      const fmtHM = s => { const m = Math.round(s / 60); return m >= 60 ? Math.floor(m / 60) + "h " + (m % 60) + "m" : m + " min"; };
      const enc = curStreak >= 3 ? tf("enc_streak", { n: curStreak })

      const chartDays = lastNDays(7).map(d => ({
        d, m: dayMin[d] || 0,

      const reviewCard = reviewList.length ? `

        const cs = myCards.filter(k => k.course_id === courseId);

        const fresh = cs.filter(k => !revBy[k.id]).slice(0, NEW_PER_DAY);
        const queue = [...due, ...fresh].sort(() => Math.random() - 0.5);
        if (!queue.length) return;
        let doneN = 0;
        const ov = document.createElement("div");
        ov.className = "cert-overlay";
        document.body.appendChild(ov);
        const finish = () => { ov.remove(); renderStudent(); };

        function show() {
          if (!queue.length) {
            ov.innerHTML = `

              </div>`;
            ov.querySelector("#fr-close").addEventListener("click", finish);
            return;
          }
          const card = queue[0];
          ov.innerHTML = `
            <div class="modal" style="max-width:440px; text-align:center;">
              <div class="kind" style="text-align:right;">${queue.length} ${t("flash_left")}</div>
              <div style="font-family:var(--serif); font-size:2.3rem; line-height:1.3; margin:1.1rem 0 0.4rem; overflow-wrap:anywhere;">${esc(card.front)}</div>
              <div id="fr-back" style="display:none;">
                ${card.reading ? `<div style="color:var(--muted); font-size:1.08rem;">${esc(card.reading)}</div>` : ""}
                <div style="font-size:1.3rem; font-weight:700; margin-top:0.5rem;">${esc(card.back)}</div>
                ${card.example ? `<div style="color:var(--muted); font-size:0.92rem; margin-top:0.6rem; overflow-wrap:anywhere;">${esc(card.example)}</div>` : ""}
                <div style="display:flex; gap:0.45rem; justify-content:center; margin-top:1.3rem; flex-wrap:wrap;">
                  <button class="ghost fr-g" data-g="0" style="color:var(--danger); border-color:var(--danger);">${t("flash_again")}</button>
                  <button class="ghost fr-g" data-g="3">${t("flash_hard")}</button>
                  <button class="fr-g" data-g="4">${t("flash_good")}</button>
                  <button class="fr-g" data-g="5" style="background:var(--success); border-color:var(--success);">${t("flash_easy")}</button>
                </div>
              </div>
              <button id="fr-flip" style="margin-top:1.1rem;">${t("flash_show")}</button>
              <div style="margin-top:0.9rem;"><button class="ghost" id="fr-x" style="font-size:0.85rem;">✕</button></div>
            </div>`;
          ov.querySelector("#fr-flip").addEventListener("click", () => {
            ov.querySelector("#fr-back").style.display = "block";
            ov.querySelector("#fr-flip").style.display = "none";
          });
          ov.querySelector("#fr-x").addEventListener("click", finish);
          ov.querySelectorAll(".fr-g").forEach(b => b.addEventListener("click", async () => {
            ov.querySelectorAll(".fr-g").forEach(x => (x.disabled = true));
            const g = Number(b.getAttribute("data-g"));
            const prev = revBy[card.id] || { ease: 2.5, interval_days: 0, reps: 0 };
            let ease = Number(prev.ease) || 2.5;
            let interval = Number(prev.interval_days) || 0;
            let reps = Number(prev.reps) || 0;
            if (g < 3) { reps = 0; interval = 0; }
            else {
              reps += 1;
              interval = reps === 1 ? 1 : reps === 2 ? 6 : Math.max(1, Math.round(interval * ease));
              ease = Math.max(1.3, ease + (0.1 - (5 - g) * (0.08 + (5 - g) * 0.02)));
            }
            const dd = new Date(); dd.setDate(dd.getDate() + interval);
            const rec = { student_id: user.id, card_id: card.id, ease,
                          interval_days: interval, reps, due_on: dstrLoc(dd),
                          last_grade: g, updated_at: new Date().toISOString() };
            revBy[card.id] = rec;
            // save in the background — the next card appears instantly
            sb.from("flashcard_reviews")
              .upsert(rec, { onConflict: "student_id,card_id" }).then(() => {});
            queue.shift();
            if (g < 3) queue.push(card);   // failed → comes back this session
            else doneN++;
            show();
          }));
        }
        show();
      }

        try { localStorage.setItem("hub_courses_closed", JSON.stringify(collapsedCourses)); } catch (e) {}
      };
      app.querySelectorAll(".course-toggle").forEach(h =>
        h.addEventListener("click", () => toggleCourse(h.closest(".course-card"))));
      // a collapsed strip expands when tapped anywhere on the banner
      app.querySelectorAll(".course-card .course-banner").forEach(b =>
        b.addEventListener("click", () => {
          const cardEl = b.closest(".course-card");
          if (cardEl.classList.contains("collapsed")) toggleCourse(cardEl);
        }));

      // --- collapsible categories (state remembered per device) ---
      app.querySelectorAll(".cat-head").forEach(h => {
        h.addEventListener("click", () => {
          const catEl = h.parentElement;
          catEl.classList.toggle("collapsed");
          collapsedCats[catEl.getAttribute("data-cat")] = catEl.classList.contains("collapsed");
          try { localStorage.setItem("hub_cats", JSON.stringify(collapsedCats)); } catch (e) {}
        });
      });

      // --- instant search across courses and lessons ---
      const sInput = document.getElementById("hub-search");
      const sBox = document.getElementById("search-results");
      const normTxt = s => String(s || "").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
      const sIndex = [
        ...(anns || []).map(a => ({ type: "ann", title: stripHtml(a.body).slice(0, 70) || "🖼", sub: t("announcements"), obj: a })),
        ...(courses || []).map(c => ({ type: "course", title: c.title, sub: c.category || "", obj: c })),
        ...(lessons || []).map(l => ({
          type: "lesson", title: l.title,
          sub: (courses || []).find(c => c.id === l.course_id)?.title || t("other_lessons"), obj: l
        }))
      ];
      const hiLite = (text, q) => {
        const i = text.toLowerCase().indexOf(q.toLowerCase());
        if (i < 0) return esc(text);
        return esc(text.slice(0, i)) + "<mark>" + esc(text.slice(i, i + q.length)) + "</mark>" + esc(text.slice(i + q.length));
      };
      const logOpen = lid => {
        const ua = navigator.userAgent;
        const dtp = /iPad|Tablet/i.test(ua) ? "tablet"
          : (/Mobi|iPhone|Android.*Mobile/i.test(ua) ? "mobile" : "desktop");
        let dt = null; try { dt = localStorage.getItem("hub_device"); } catch (e) {}
        sb.from("access_events").insert({
          student_id: user.id, lesson_id: lid, event: "lesson_open",
          device: dt, device_type: dtp, agent: ""
        }).then(() => {});
      };
      const openLesson = l => {
        if (lockedSet.has(l.id)) { alert(t("locked_hint")); return; }
        if (premLocked.has(l.id)) { logLock(l.id); showUpgrade(); return; }
        if (l.storage_path) logOpen(l.id);   // tracked pages log themselves
        sb.from("lesson_activity").upsert({
          student_id: user.id, lesson_id: l.id, kind: "activity",
          key: "opened", value: 1, max_value: 1, updated_at: new Date().toISOString()
        }, { onConflict: "student_id,lesson_id,kind,key" }).then(() => {});
        if (l.storage_path) {
          sb.storage.from("materials").createSignedUrl(l.storage_path, 3600)
            .then(({ data, error }) => {
              if (error) alert(t("file_open_fail") + error.message);
              else window.open(data.signedUrl, "_blank", "noopener");
            });
        } else window.open(withLms(l), "_blank", "noopener");
      };
      app.querySelectorAll(".rev-open").forEach(btn => btn.addEventListener("click", () => {
        const l = findL(btn.getAttribute("data-id"));
        if (l) openLesson(l);
      }));

      const contBtn = document.getElementById("cont-open");
      if (contBtn && contLesson) contBtn.addEventListener("click", () => openLesson(contLesson));

      app.querySelectorAll(".chip").forEach(b => b.addEventListener("click", () => {
        try { localStorage.setItem("hub_chip", b.getAttribute("data-chip")); } catch (e) {}
        renderStudent();
      }));

      sInput.addEventListener("input", debounce(() => {
        const q = sInput.value.trim();
        if (!q) { sBox.style.display = "none"; sBox.innerHTML = ""; return; }
        const nq = normTxt(q);
        const hits = sIndex.filter(it => normTxt(it.title).includes(nq) || normTxt(it.sub).includes(nq)).slice(0, 8);
        sBox.innerHTML = hits.length
          ? hits.map(it => `
              <button class="res" data-i="${sIndex.indexOf(it)}">
                <span>${it.type === "course" ? "📚" : it.type === "ann" ? "📣" : iconFor(it.obj.kind)}</span>
                <span style="flex:1;">${hiLite(it.title, q)}<br><span class="kind">${esc(it.sub)}</span></span>
              </button>`).join("")
          : `<div class="res" style="cursor:default;">${t("no_results")}</div>`;
        sBox.style.display = "block";
        sBox.querySelectorAll("button.res").forEach(b => b.addEventListener("click", () => {
          const it = sIndex[Number(b.getAttribute("data-i"))];
          sBox.style.display = "none"; sInput.value = "";
          if (it.type === "lesson") { openLesson(it.obj); return; }
          const el = it.type === "ann"
            ? document.getElementById("ann-card")
            : document.getElementById("course-" + it.obj.id);
          if (el) {
            if (window.__stuShowTab) window.__stuShowTab(it.type === "ann" ? "home" : "courses");
            const catEl = el.closest(".cat");
            if (catEl) catEl.classList.remove("collapsed");
            if (el.classList.contains("course-card")) el.classList.remove("collapsed");
            el.scrollIntoView({ behavior: "smooth", block: "start" });
            el.classList.add("flash");
            setTimeout(() => el.classList.remove("flash"), 1400);
          }
        }));
      }, 150));
      sInput.addEventListener("keydown", e => { if (e.key === "Escape") sBox.style.display = "none"; });
      if (!window.__hubDocClick) {
        window.__hubDocClick = true;
        document.addEventListener("click", e => {
          const box = document.getElementById("search-results");
          if (box && !e.target.closest(".search-wrap")) box.style.display = "none";
        });
      }

      // Record that the student opened a lesson (any type).
      app.querySelectorAll(".open-link, .open-file").forEach(el => {
        el.addEventListener("click", () => {
          const lid = el.getAttribute("data-lesson");
          if (!lid) return;
          if (el.classList.contains("open-file")) logOpen(lid);  // tracked pages log themselves
          sb.from("lesson_activity").upsert({
            student_id: user.id, lesson_id: lid, kind: "activity",
            key: "opened", value: 1, max_value: 1,
            updated_at: new Date().toISOString()
          }, { onConflict: "student_id,lesson_id,kind,key" }).then(() => {});
        });
      });

      app.querySelectorAll(".mark").forEach(btn => {
        btn.addEventListener("click", async () => {
          btn.disabled = true;
          const lesson_id = btn.getAttribute("data-lesson");
          const { error } = await sb.from("progress").upsert(
            { student_id: user.id, lesson_id, status: "completed", updated_at: new Date().toISOString() },
            { onConflict: "student_id,lesson_id" }
          );
          if (error) { btn.disabled = false; alert(t("save_retry")); return; }
          renderStudent();
        });
      });
      window.scrollTo(0, __scrollY);
    }

    // ---------- ADMIN VIEW ----------
    async function renderAdmin() {
      const __scrollY = window.scrollY;

      // First visit: skeleton cards instead of a blank page.
      if (!app.querySelector(".tabpane") && window.UI) app.innerHTML = UI.skeleton(3);

      // All queries run IN PARALLEL — one round trip instead of thirteen.
      const [

        sb.from("profiles")
          .select("id, full_name, email, role, org_id, avatar_url, bio, multi_device, access_start, access_expires, suspended, plan, premium_until")
          .order("created_at"),
        sb.from("courses").select("*").order("sort_order").order("created_at"),
        // profiles must be joined via the student link explicitly: enrollments has
        // TWO links to profiles (student_id + teacher_id since migration14), and an
        // ambiguous join makes the whole query fail → the list showed "No enrollments yet"
        sb.from("enrollments")
          .select("id, student_id, course_id, profiles!student_id(full_name, email), courses(title)")
          .order("created_at"),
        sb.from("announcements").select("*").order("created_at", { ascending: false }),
        sb.from("share_keys").select("*").order("created_at", { ascending: false }),
        sb.from("organizations").select("id, name, kind").order("name"),
        sb.from("course_licenses").select("org_id, course_id, seats, expires_on"),
        sb.from("access_events")
          .select("student_id, lesson_id, event, device, device_type, agent, created_at")
          .order("created_at", { ascending: false })
          .limit(2000),
        sb.from("lesson_activity")
          .select("student_id, lesson_id, kind, key, value, max_value, updated_at")
          .order("updated_at", { ascending: false }),
        sb.from("lock_events").select("lesson_id, student_id, created_at")

        sb.from("flashcards").select("*").order("sort_order").order("created_at"),

      const courseOptions = (courses || []).map(c =>

      const courseList = (courses || []).map(c => `

               <tbody id="e-list">${enrollmentRows}</tbody></table>`

          ${(anns || []).length ? (anns || []).map(a => `

                <div class="title" style="font-weight:500;">${esc(stripHtml(a.body).slice(0, 140) || "🖼 (image)")}</div>

                  ? esc((courses || []).find(c => c.id === a.course_id)?.title || "?")
                  : "All students"} · ${new Date(a.created_at).toLocaleDateString()}</span>

        </div>`;

      // ---- rich text editor wiring ----
      const rte = document.getElementById("a-body");
      let savedRange = null;
      const saveSel = () => {
        const s = window.getSelection();
        if (s.rangeCount && rte.contains(s.anchorNode)) savedRange = s.getRangeAt(0);
      };
      const restoreSel = () => {
        if (!savedRange) return;
        const s = window.getSelection();
        s.removeAllRanges(); s.addRange(savedRange);
      };
      rte.addEventListener("keyup", saveSel);
      rte.addEventListener("mouseup", saveSel);
      try { document.execCommand("styleWithCSS", false, true); } catch (e) {}
      const exec = (cmd, val) => {
        rte.focus(); restoreSel();
        document.execCommand(cmd, false, val ?? null);
        saveSel();
      };

      document.querySelectorAll("#rte-bar button[data-cmd]").forEach(b => {
        b.addEventListener("mousedown", e => e.preventDefault());
        b.addEventListener("click", () => exec(b.getAttribute("data-cmd")));
      });
      document.getElementById("rte-block").addEventListener("change", e => {
        if (e.target.value) { exec("formatBlock", e.target.value); e.target.value = ""; }
      });
      document.getElementById("rte-size").addEventListener("change", e => {
        if (e.target.value) { exec("fontSize", e.target.value); e.target.value = ""; }
      });
      document.getElementById("rte-fore").addEventListener("input", e => exec("foreColor", e.target.value));
      document.getElementById("rte-back").addEventListener("input", e => exec("hiliteColor", e.target.value));
      document.getElementById("rte-link").addEventListener("click", () => {
        const url = prompt("Link URL:", "https://");
        if (url && url !== "https://") exec("createLink", url);
      });

      // image upload → announcements bucket → insert at cursor
      const rteFile = document.getElementById("rte-file");
      document.getElementById("rte-img").addEventListener("click", () => rteFile.click());
      rteFile.addEventListener("change", async e => {
        const f = e.target.files[0]; rteFile.value = "";
        if (!f) return;
        if (f.size > 3 * 1024 * 1024) { alert("Images must be under 3 MB."); return; }
        const path = Date.now() + "-" + f.name.replace(/[^a-zA-Z0-9._-]/g, "_");
        const { error } = await sb.storage.from("announcements")
          .upload(path, f, { contentType: f.type });
        if (error) { alert("Upload failed: " + error.message); return; }
        const { data } = sb.storage.from("announcements").getPublicUrl(path);
        exec("insertImage", data.publicUrl);
      });

      // click an image to select it → resize / align / alt / remove
      let selImg = null;
      const imgTools = document.getElementById("img-tools");
      rte.addEventListener("click", e => {
        rte.querySelectorAll("img.sel").forEach(i => i.classList.remove("sel"));
        if (e.target.tagName === "IMG") {
          selImg = e.target;
          selImg.classList.add("sel");
          imgTools.style.display = "flex";
        } else { selImg = null; imgTools.style.display = "none"; }
      });
      imgTools.querySelectorAll("[data-w]").forEach(b => b.addEventListener("click", () => {
        if (selImg) { selImg.style.width = b.getAttribute("data-w") + "%"; selImg.style.height = "auto"; }
      }));
      imgTools.querySelectorAll("[data-a]").forEach(b => b.addEventListener("click", () => {
        if (!selImg) return;
        const a = b.getAttribute("data-a");
        selImg.style.float = ""; selImg.style.display = ""; selImg.style.margin = "";
        if (a === "left")   { selImg.style.float = "left";  selImg.style.margin = "0 1rem 0.5rem 0"; }
        if (a === "right")  { selImg.style.float = "right"; selImg.style.margin = "0 0 0.5rem 1rem"; }
        if (a === "center") { selImg.style.display = "block"; selImg.style.margin = "0.5rem auto"; }
      }));
      document.getElementById("img-alt").addEventListener("click", () => {
        if (!selImg) return;
        const alt = prompt("Describe this image (alt text):", selImg.alt || "");
        if (alt !== null) selImg.alt = alt;
      });
      document.getElementById("img-del").addEventListener("click", () => {
        if (selImg) { selImg.remove(); selImg = null; imgTools.style.display = "none"; }
      });

      // preview toggle
      const prevBox = document.getElementById("rte-prevbox");
      document.getElementById("rte-preview").addEventListener("click", () => {
        if (prevBox.style.display !== "none") { prevBox.style.display = "none"; return; }
        rte.querySelectorAll("img.sel").forEach(i => i.classList.remove("sel"));
        document.getElementById("rte-prevbody").innerHTML = rte.innerHTML;
        prevBox.style.display = "block";
      });

      document.getElementById("a-add").addEventListener("click", async () => {
        rte.querySelectorAll("img.sel").forEach(i => i.classList.remove("sel"));
        const body = rte.innerHTML.trim();
        const course_id = document.getElementById("a-course").value || null;
        const m = document.getElementById("a-msg");
        if (!stripHtml(body).trim() && !/<img/i.test(body)) {
          m.textContent = "Write a message first."; m.className = "msg err"; return;
        }
        const { error } = await sb.from("announcements").insert({ body, course_id, author_id: user.id });
        if (error) { m.textContent = "Could not post: " + error.message; m.className = "msg err"; return; }
        renderAdmin();
      });

      app.querySelectorAll(".a-del").forEach(btn => {
        btn.addEventListener("click", async () => {
          if (!confirm("Delete this announcement?")) return;
          btn.disabled = true;
          const { error } = await sb.from("announcements").delete().eq("id", btn.getAttribute("data-id"));
          if (error) { btn.disabled = false; alert("Could not delete: " + error.message); return; }
          renderAdmin();
        });
      });

      // ---- share keys ----
      document.getElementById("sk-add").addEventListener("click", async () => {
        const label = document.getElementById("sk-label").value.trim();
        const course_id = document.getElementById("sk-course").value;
        const expires = document.getElementById("sk-exp").value || null;
        const m = document.getElementById("sk-msg");
        if (!label) { m.textContent = "Name the buyer so you can identify this key later."; m.className = "msg err"; return; }
        if (!course_id) { m.textContent = "Pick the course this key unlocks."; m.className = "msg err"; return; }
        const token = crypto.randomUUID().replace(/-/g, "");
        const { error } = await sb.from("share_keys").insert({ token, label, course_id, expires });
        if (error) { m.textContent = "Could not create: " + error.message; m.className = "msg err"; return; }
        renderAdmin();
      });

      app.querySelectorAll(".sk-toggle").forEach(btn => btn.addEventListener("click", async () => {
        const k = (skeys || []).find(x => x.id === btn.getAttribute("data-id"));
        if (k.active && !confirm("Revoke this key? All links using it stop working immediately.")) return;
        const { error } = await sb.from("share_keys").update({ active: !k.active }).eq("id", k.id);
        if (error) { alert("Could not update: " + error.message); return; }
        renderAdmin();
      }));

      app.querySelectorAll(".sk-del").forEach(btn => btn.addEventListener("click", async () => {
        if (!confirm("Delete this key permanently? Its links stop working and its usage history is lost.")) return;
        const { error } = await sb.from("share_keys").delete().eq("id", btn.getAttribute("data-id"));
        if (error) { alert("Could not delete: " + error.message); return; }
        renderAdmin();
      }));

      app.querySelectorAll(".sk-links").forEach(btn => btn.addEventListener("click", () => {
        const k = (skeys || []).find(x => x.id === btn.getAttribute("data-id"));
        const ls = (lessons || []).filter(l => l.course_id === k.course_id && l.url && !l.storage_path);
        const out = document.getElementById("sk-out");
        const links = ls.map(l =>
          l.title + "\n" + l.url + (l.url.includes("?") ? "&" : "?") + "lms=" + l.id + "&key=" + k.token);
        out.value = "Share links for: " + k.label + " (" + (courseName(k.course_id) || "") + ")\n" +
          (k.expires ? "Valid until " + k.expires : "No expiry") + "\n" +
          "Note: only linked HTML lessons can be shared this way (uploaded files are excluded).\n\n" +
          (links.join("\n\n") || "This course has no linked lessons yet.");
        out.style.display = "block";
        out.focus(); out.select();
        try { navigator.clipboard.writeText(out.value); } catch (e) {}
      }));


      // ================= LỚP HỌC — TOÀN HỆ THỐNG (Phase 29) =================
      // Chủ sở hữu xem lớp của MỌI trung tâm (chỉ đọc). Việc tạo/sửa lớp do
      // quản trị viên từng trung tâm làm trong admin.html — chủ sở hữu vẫn có
      // toàn quyền ở tầng cơ sở dữ liệu (policy "classes owner manage") nếu cần
      // can thiệp trực tiếp bằng SQL.
      (function () {
        let done = false;
        window.__ocInit = async function () {
          const box = document.getElementById("oc-root");
          if (!box || done) return;
          box.innerHTML = `<p class="empty">Đang tải…</p>`;
          const [cl, cs, orgs, crs, pe] = await Promise.all([
            sb.from("classes").select("*").order("created_at"),
            sb.from("class_students").select("class_id, student_id"),
            sb.from("organizations").select("id, name"),
            sb.from("courses").select("id, title"),
            sb.from("profiles").select("id, full_name, email").in("role", ["teacher", "admin"])
          ]);
          if (cl.error) {
            box.innerHTML = `<div class="card"><p class="empty">Chưa chạy <b>migration39_classes.sql</b>.
              Chạy migration đó trong SQL Editor rồi mở lại tab này.</p></div>`;
            return;
          }
          done = true;
          const classes = cl.data || [], mem = cs.data || [];
          if (!classes.length) {
            box.innerHTML = `<div class="card"><p class="empty">Chưa có trung tâm nào tạo lớp.</p></div>`;
            return;
          }
          const oName = id => ((orgs.data || []).find(o => o.id === id) || {}).name || "(không thuộc trung tâm)";
          const cTitle = id => ((crs.data || []).find(c => c.id === id) || {}).title || "—";
          const tName = id => {
            const p = (pe.data || []).find(x => x.id === id);
            return p ? (p.full_name || p.email) : "chưa phân công";
          };
          const nOf = id => mem.filter(m => m.class_id === id).length;
          const ST = { upcoming: "Sắp mở", active: "Đang học",
                       completed: "Kết thúc", archived: "Lưu trữ" };
          const PILL = { upcoming: "todo", active: "done", completed: "off", archived: "bad" };

          const byOrg = {};
          classes.forEach(c => { (byOrg[c.org_id] = byOrg[c.org_id] || []).push(c); });

          box.innerHTML = `
            <div class="card">
              <div class="card-head"><h2>🏫 Lớp học theo trung tâm</h2>
                <button class="ghost" id="oc-csv">Tải CSV</button></div>
              <div class="stat-grid">
                <div class="stat"><div class="k">Trung tâm</div><div class="v">${Object.keys(byOrg).length}</div></div>
                <div class="stat"><div class="k">Tổng số lớp</div><div class="v">${classes.length}</div></div>
                <div class="stat"><div class="k">Đang học</div><div class="v">${classes.filter(c => c.status === "active").length}</div></div>
                <div class="stat"><div class="k">Lượt học viên</div><div class="v">${mem.length}</div></div>
              </div>
            </div>
            ${Object.entries(byOrg).map(([oid, list]) => `
              <div class="card">
                <div class="card-head"><h2>${esc(oName(oid))}</h2>
                  <span class="pill">${list.length} lớp</span></div>
                <table class="stackable">
                  <thead><tr><th>Lớp</th><th>Khóa</th><th>Giáo viên</th>
                    <th>Học viên</th><th>Lịch</th><th>Trạng thái</th></tr></thead>
                  <tbody>${list.map(c => `
                    <tr>
                      <td data-th="Lớp">${esc(c.name)}</td>
                      <td data-th="Khóa">${esc(cTitle(c.course_id))}</td>
                      <td data-th="Giáo viên">${esc(tName(c.teacher_id))}</td>
                      <td data-th="Học viên">${nOf(c.id)}${c.max_students != null ? " / " + c.max_students : ""}</td>
                      <td data-th="Lịch">${esc(c.schedule || "—")}</td>
                      <td data-th="Trạng thái"><span class="pill ${PILL[c.status] || ""}">${ST[c.status] || ""}</span></td>
                    </tr>`).join("")}</tbody>
                </table>
              </div>`).join("")}`;

          document.getElementById("oc-csv").addEventListener("click", () => {
            const rows = [["Trung tâm", "Lớp", "Khóa", "Giáo viên", "Học viên", "Sĩ số tối đa",
                           "Lịch", "Bắt đầu", "Kết thúc", "Trạng thái"]];
            classes.forEach(c => rows.push([oName(c.org_id), c.name, cTitle(c.course_id),
              tName(c.teacher_id), nOf(c.id), c.max_students == null ? "" : c.max_students,
              c.schedule || "", c.starts_on || "", c.ends_on || "", ST[c.status] || ""]));
            const body = rows.map(r => r.map(v => `"${String(v).replace(/"/g, '""')}"`).join(",")).join("\n");
            const a = document.createElement("a");
            a.href = URL.createObjectURL(new Blob(["﻿" + body], { type: "text/csv;charset=utf-8" }));
            a.download = "lop-hoc.csv"; a.click(); URL.revokeObjectURL(a.href);
          });
        };
      })();
      // =============== HẾT LỚP HỌC TOÀN HỆ THỐNG ===============

      /* ================= KẾT QUẢ BÀI THI (Phase 36) =================
         Đọc bảng test_attempts (RLS đã giới hạn theo quyền). Mỗi lần học viên
         nộp là MỘT dòng — giữ toàn bộ lịch sử. Chấm điểm ở máy chủ, nên bảng
         này chỉ hiển thị, không chứa đáp án nào lộ ra trước khi nộp. */
      (function () {
        const root = document.getElementById("tests-root");
        if (!root) return;

        if (!document.getElementById("tq-css")) {
          const st = document.createElement("style"); st.id = "tq-css";
          st.textContent = `
            .tq-ov{position:fixed;inset:0;background:rgba(15,23,37,.55);display:flex;align-items:flex-start;justify-content:center;z-index:200;padding:2rem 1rem;overflow:auto;}
            .tq-modal{background:var(--card);border-radius:16px;max-width:680px;width:100%;padding:1.2rem;box-shadow:var(--shadow-pop);}
            .tq-legend{display:flex;gap:1rem;flex-wrap:wrap;font-size:.8rem;color:var(--muted);margin:.2rem 0 .7rem;}
            .tq-legend i{display:inline-block;width:11px;height:11px;border-radius:3px;vertical-align:-1px;margin-right:4px;}
            .tq-q{border:1px solid var(--line);border-left-width:5px;border-radius:9px;padding:.5rem .7rem;margin-bottom:.4rem;font-size:.92rem;}
            .tq-q .n{font-weight:800;margin-right:.5rem;}
            .tq-q.ok{border-left-color:var(--success);background:var(--success-bg);}
            .tq-q.bad{border-left-color:var(--danger);background:rgba(164,68,47,.08);}
            .tq-q.none{border-left-color:#94a3b8;background:rgba(90,101,119,.07);}
            .tq-chip{font-weight:800;padding:.03rem .45rem;border-radius:6px;border:1px solid var(--line);background:var(--card);}
            .tq-q.ok .tq-chip.stu{background:var(--success);color:#fff;border-color:var(--success);}
            .tq-q.bad .tq-chip.stu{background:var(--danger);color:#fff;border-color:var(--danger);}
            .tq-chip.cor{background:var(--success-bg);color:var(--success);border-color:transparent;}
            .tq-q .expl{display:block;color:var(--muted);font-size:.84rem;margin-top:.25rem;}`;
          document.head.appendChild(st);
        }

        let loaded = false, failed = false, A = [], NM = {}, q = "";
        const openHist = {};   // groupKey → expanded?

        const norm = s => (s || "").toLowerCase().normalize("NFD").replace(/[̀-ͯ]/g, "").replace(/đ/g, "d");
        const neOf = id => NM[id] || "—";
        const pct = a => a.max_score ? Math.round(a.score / a.max_score * 100) : 0;
        const fmtDT = s => { if (!s) return "—"; try { return new Date(s).toLocaleString("vi-VN", { dateStyle: "short", timeStyle: "short" }); } catch (e) { return String(s); } };
        const fmtDur = sec => { if (sec == null) return "—"; const m = Math.floor(sec / 60), s = Math.round(sec % 60); return m + "′" + String(s).padStart(2, "0") + "″"; };

        async function load() {
          const a = await sb.from("test_attempts").select("*").order("submitted_at", { ascending: false });
          if (a.error) { failed = true; return; }
          A = a.data || [];
          const ids = [...new Set(A.map(x => x.student_id))];
          if (ids.length) {
            const p = await sb.from("profiles").select("id, full_name, email").in("id", ids);
            (p.data || []).forEach(r => { NM[r.id] = r.full_name || r.email; });
          }
          loaded = true;
        }

        // group by student + test; keep every attempt
        function groups() {
          const g = {};
          A.forEach(a => {
            const k = a.student_id + "|" + a.test_key;
            (g[k] = g[k] || { key: k, sid: a.student_id, test: a.test_name, list: [] }).list.push(a);
          });
          return Object.values(g).map(grp => {
            grp.list.sort((x, y) => (y.submitted_at || "").localeCompare(x.submitted_at || ""));
            grp.latest = grp.list[0];
            grp.first = grp.list.reduce((a, b) => (a.attempt_no <= b.attempt_no ? a : b));
            grp.best = grp.list.reduce((a, b) => (b.score > a.score ? b : a));
            return grp;
          }).filter(grp => !q || norm(neOf(grp.sid)).includes(norm(q)) || norm(grp.test).includes(norm(q)))
            .sort((a, b) => (b.latest.submitted_at || "").localeCompare(a.latest.submitted_at || ""));
        }

        const statusPill = a => a.unanswered === 0
          ? '<span class="pill done">Hoàn thành</span>'
          : `<span class="pill todo">Nộp thiếu ${a.unanswered}</span>`;

        function attemptRow(a, grp) {
          const tags = [];
          if (a.id === grp.latest.id) tags.push('<span class="pill">mới nhất</span>');
          if (a.id === grp.best.id) tags.push('<span class="pill done">điểm cao nhất</span>');
          if (a.id === grp.first.id) tags.push('<span class="pill off">lần đầu</span>');
          return `
            <tr>
              <td data-th="Lần">#${a.attempt_no} ${tags.join(" ")}</td>
              <td data-th="Điểm"><b>${a.score}/${a.max_score}</b> · ${pct(a)}%</td>
              <td data-th="Đúng/Sai/Trống">${a.correct} / ${a.incorrect} / ${a.unanswered}</td>
              <td data-th="Thời gian">${fmtDur(a.seconds_spent)}</td>
              <td data-th="Nộp lúc">${fmtDT(a.submitted_at)}</td>
              <td>
                <button class="ghost" data-act="view" data-id="${a.id}">Xem chi tiết</button>
                <button class="ghost" data-act="link" data-id="${a.id}">🔗 Liên kết</button>
              </td>
            </tr>`;
        }

        function paint() {
          if (failed) {
            root.innerHTML = `<div class="card"><div class="card-head"><h2>📝 Kết quả bài thi</h2></div>
              <p class="empty">Chạy <b>migration44_test_results.sql</b> trong Supabase, rồi mở lại tab này.</p></div>`;
            return;
          }
          if (!loaded) { root.innerHTML = `<div class="card"><p class="empty">Đang tải kết quả bài thi…</p></div>`; return; }
          const gs = groups();
          const totalAttempts = A.length;
          const students = new Set(A.map(a => a.student_id)).size;
          root.innerHTML = `
            <div class="card">
              <div class="card-head">
                <h2>📝 Kết quả bài thi <span class="kind">${students} học viên · ${totalAttempts} lượt nộp</span></h2>
              </div>
              <div class="form-row" style="margin-bottom:.4rem;">
                <div class="field" style="min-width:220px;"><label>Tìm theo học viên hoặc đề</label>
                  <input id="tq" value="${esc(q)}" placeholder="gõ tên…"></div>
                ${q ? `<button class="ghost" data-act="tclear">✕ Xóa</button>` : ""}
              </div>
              ${!A.length ? `<p class="empty">Chưa có bài thi nào được nộp. Khi học viên nộp bài (mở từ Learning Hub, đã đăng nhập), kết quả sẽ hiện ở đây.</p>`
                : !gs.length ? `<p class="empty">Không có kết quả khớp "${esc(q)}".</p>`
                : gs.map(grp => {
                  const a = grp.latest, open = !!openHist[grp.key];
                  return `
                  <div style="border:1px solid var(--line); border-radius:12px; padding:.7rem .9rem; margin-bottom:.6rem;">
                    <div class="form-row" style="justify-content:space-between; align-items:center; gap:.6rem;">
                      <div style="min-width:0;">
                        <b>${esc(neOf(grp.sid))}</b> · ${esc(grp.test)} ${statusPill(a)}
                        <div class="kind" style="text-transform:none; letter-spacing:0; margin-top:2px;">
                          Mới nhất: <b>${a.score}/${a.max_score}</b> (${pct(a)}%) · Cao nhất: <b>${grp.best.score}/${grp.best.max_score}</b>
                          · ${grp.list.length} lần làm · ${fmtDT(a.submitted_at)}</div>
                      </div>
                      <div class="form-row" style="gap:.35rem;">
                        <button class="ghost" data-act="view" data-id="${a.id}">Xem chi tiết</button>
                        <button class="ghost" data-act="link" data-id="${a.id}">🔗 Liên kết</button>
                        ${grp.list.length > 1 ? `<button class="ghost" data-act="hist" data-key="${esc(grp.key)}">${open ? "▾" : "▸"} ${grp.list.length} lần</button>` : ""}
                      </div>
                    </div>
                    ${open && grp.list.length > 1 ? `
                      <table class="stackable" style="margin-top:.6rem;">
                        <thead><tr><th>Lần</th><th>Điểm</th><th>Đúng/Sai/Trống</th><th>Thời gian</th><th>Nộp lúc</th><th></th></tr></thead>
                        <tbody>${grp.list.map(x => attemptRow(x, grp)).join("")}</tbody>
                      </table>` : ""}
                  </div>`;
                }).join("")}
            </div>`;
          const box = document.getElementById("tq");
          if (box && q) { box.focus(); box.setSelectionRange(q.length, q.length); }
        }

        /* ---- detailed answer review modal ---- */
        function reviewModal(a) {
          const rows = (a.detail || []).map(qd => {
            const cls = qd.student == null ? "none" : (qd.ok ? "ok" : "bad");
            const stu = qd.student == null
              ? `<span class="tq-chip" style="color:var(--muted);">Bỏ trống</span>`
              : `<span class="tq-chip stu">${esc(qd.student)}</span>`;
            return `<div class="tq-q ${cls}">
                <span class="n">Câu ${qd.n}</span>
                <span>Chọn: ${stu}</span>
                <span style="margin-left:.8rem;">Đúng: <span class="tq-chip cor">${esc(qd.correct)}</span></span>
                ${qd.explanation ? `<span class="expl">💡 ${esc(qd.explanation)}</span>` : ""}
              </div>`;
          }).join("");
          const wrap = document.createElement("div");
          wrap.className = "tq-ov"; wrap.id = "tq-ov";
          wrap.innerHTML = `
            <div class="tq-modal">
              <div class="card-head" style="position:sticky; top:0; background:var(--card); padding-bottom:.4rem;">
                <h2 style="font-size:1.1rem;">${esc(neOf(a.student_id))} · ${esc(a.test_name)}</h2>
                <button class="ghost" data-act="close">✕</button>
              </div>
              <p class="kind" style="text-transform:none; letter-spacing:0;">
                Điểm <b>${a.score}/${a.max_score}</b> (${pct(a)}%) · Đúng ${a.correct} · Sai ${a.incorrect} · Bỏ trống ${a.unanswered}
                · Lần #${a.attempt_no} · ${fmtDur(a.seconds_spent)} · ${fmtDT(a.submitted_at)}</p>
              <div class="tq-legend">
                <span><i style="background:var(--success)"></i>Đúng</span>
                <span><i style="background:var(--danger)"></i>Sai</span>
                <span><i style="background:#94a3b8"></i>Bỏ trống</span>
              </div>
              ${rows || `<p class="empty">Không có chi tiết.</p>`}
              <div class="form-row" style="margin-top:.8rem;">
                <button data-act="openlink" data-id="${a.id}">🔗 Mở liên kết chỉ-đọc</button>
                <button class="ghost" data-act="close">Đóng</button>
              </div>
            </div>`;
          document.body.appendChild(wrap);
          wrap.addEventListener("click", e => {
            if (e.target === wrap || e.target.closest('[data-act="close"]')) wrap.remove();
            const lk = e.target.closest('[data-act="openlink"]'); if (lk) openLink(lk.getAttribute("data-id"));
          });
        }
        function openLink(id) {
          const a = A.find(x => x.id === id); if (!a) return;
          window.open("results.html?t=" + encodeURIComponent(a.share_token), "_blank", "noopener");
        }

        root.addEventListener("click", e => {
          const b = e.target.closest("[data-act]"); if (!b) return;
          const act = b.getAttribute("data-act");
          if (act === "tclear") { q = ""; return paint(); }
          if (act === "hist") { const k = b.getAttribute("data-key"); openHist[k] = !openHist[k]; return paint(); }
          if (act === "view") { const a = A.find(x => x.id === b.getAttribute("data-id")); if (a) reviewModal(a); return; }
          if (act === "link") { return openLink(b.getAttribute("data-id")); }
        });
        root.addEventListener("input", e => { if (e.target.id === "tq") { q = e.target.value; paint(); } });

        window.__testsInit = async function () {
          if (loaded || failed) { paint(); return; }
          paint(); await load(); paint();
        };
      })();
      // =============== HẾT KẾT QUẢ BÀI THI ===============

      function showTab(t) {
        adminTab = t;
        if (t === "landing" && window.__lpmInit) window.__lpmInit();
        if (t === "progress" && window.__testsInit) window.__testsInit();
        if (t === "modules" && window.__modInit) window.__modInit();
        if (t === "classes" && window.__ocInit) window.__ocInit();
        app.querySelectorAll(".tabpane").forEach(p =>
          p.classList.toggle("show", p.getAttribute("data-tab") === t));
        document.querySelectorAll("#subnav .sn-item[data-id]").forEach(b =>
          b.classList.toggle("on", b.getAttribute("data-id") === t));
        const lbl = document.querySelector(`#subnav .sn-item[data-id="${t}"] span`);
        const eb = app.querySelector(".eyebrow");
        if (eb && lbl) eb.textContent = "Admin / " + lbl.textContent;
      }
      if (window.UI && UI.initNav) UI.initNav({
        items: [
          { id: "lessons", label: "Lessons (" + (lessons || []).length + ")", icon: "book-open", group: "Content" },
          { id: "courses", label: "Courses (" + (courses || []).length + ")", icon: "layers", group: "Content" },
          { id: "flash", label: "Flashcards" + (cards.length ? " (" + cards.length + ")" : ""), icon: "wallet-cards", group: "Content" },
          { id: "reading", label: "Reading" + ((rtRes.data || []).length ? " (" + rtRes.data.length + ")" : ""), icon: "library", group: "Content" },
          { id: "shadow", label: "Shadowing" + ((svRes.data || []).length ? " (" + svRes.data.length + ")" : ""), icon: "video", group: "Content" },
          { id: "dict", label: "Dictation", icon: "headphones", group: "Content" },
          { id: "landing", label: "Landing Page", icon: "globe", group: "Content" },
          { id: "modules", label: "Tính năng", icon: "toggle-right", group: "Settings" },
          { id: "students", label: "Students (" + onlyStudents.length + ")" + (stuWarn ? " ⚠️" : ""), icon: "users", group: "Users" },
          { id: "classes", label: "Lớp học", icon: "layers", group: "Users" },
          { id: "progress", label: "Analytics", icon: "bar-chart-3", group: "Analytics" },
          { id: "announce", label: "Announce" + ((anns || []).length ? " (" + anns.length + ")" : ""), icon: "megaphone", group: "Community" },
          { href: "organizations.html", label: "Organizations & licenses", icon: "building-2", group: "Settings" },
        ],
        active: adminTab,
        onSelect: showTab,
        actions: [
          { label: "+ Lesson", icon: "plus",
            onClick: () => { showTab("lessons"); document.getElementById("l-title")?.focus(); } },
          { label: "+ Course", icon: "plus",
            onClick: () => { showTab("courses"); document.getElementById("c-title")?.focus(); } },
          { label: "+ User", icon: "user-plus",
            onClick: () => { showTab("students"); document.getElementById("nu-email")?.focus(); } },
        ]
      });
      showTab(adminTab);

      // --- drag & drop upload zone ---
      const drop = document.getElementById("l-drop");
      const fileInput = document.getElementById("l-file");
      const dropText = document.getElementById("l-drop-text");
      const dropDefault = dropText.innerHTML;
      const allowedExt = ["pdf","doc","docx","ppt","pptx","xls","xlsx","csv","txt",
                          "png","jpg","jpeg","webp","gif","mp3","wav","m4a","mp4","html"];

      function refreshDrop() {
        const f = fileInput.files[0];
        if (!f) { dropText.innerHTML = dropDefault; return; }
        dropText.innerHTML =
          `📄 <span class="file-picked">${esc(f.name)}</span>` +
          ` <span class="kind">(${(f.size / 1024 / 1024).toFixed(1)} MB)</span>` +
          `<span class="file-remove" id="l-file-remove">remove</span>`;
        // Autofill the title from the file name if it's still empty.
        const titleBox = document.getElementById("l-title");
        if (!titleBox.value.trim()) {
          titleBox.value = f.name.replace(/\.[^.]+$/, "").replace(/[_-]+/g, " ").trim();
        }
      }

      drop.addEventListener("click", (e) => {
        if (e.target.id === "l-file-remove") {
          fileInput.value = ""; refreshDrop(); return;
        }
        fileInput.click();
      });
      fileInput.addEventListener("change", refreshDrop);

      ["dragover", "dragenter"].forEach(ev =>
        drop.addEventListener(ev, (e) => { e.preventDefault(); drop.classList.add("dragover"); }));
      ["dragleave", "dragend"].forEach(ev =>
        drop.addEventListener(ev, () => drop.classList.remove("dragover")));
      drop.addEventListener("drop", (e) => {
        e.preventDefault();
        drop.classList.remove("dragover");
        const f = e.dataTransfer.files[0];
        if (!f) return;
        const ext = (f.name.split(".").pop() || "").toLowerCase();
        const m = document.getElementById("l-msg");
        if (!allowedExt.includes(ext)) {
          m.textContent = "That file type isn't supported. Use PDF, Word, PowerPoint, Excel, image, audio, video, text, or HTML.";
          m.className = "msg err"; return;
        }
        m.textContent = ""; m.className = "msg";
        fileInput.files = e.dataTransfer.files;
        refreshDrop();
      });

      document.getElementById("l-add").addEventListener("click", async () => {
        const title = document.getElementById("l-title").value.trim();
        const url = document.getElementById("l-url").value.trim();
        const file = document.getElementById("l-file").files[0] || null;
        const sort_order = parseInt(document.getElementById("l-order").value, 10) || 0;
        const est_minutes = parseInt(document.getElementById("l-min").value, 10) || null;
        const course_id = document.getElementById("l-course").value || null;
        const m = document.getElementById("l-msg");
        m.className = "msg";

        if (!title || (!url && !file)) {
          m.textContent = "Add a title, plus either a link or a file."; m.className = "msg err"; return;
        }
        if (file && file.size > 50 * 1024 * 1024) {
          m.textContent = "Files must be under 50 MB."; m.className = "msg err"; return;
        }

        let storage_path = null;
        let kind = kindOf(file ? file.name : url) || (file ? "file" : "link");

        if (file) {
          m.textContent = "Uploading…";
          const folder = course_id || "shared";
          const safe = file.name.replace(/[^a-zA-Z0-9._-]/g, "_");
          storage_path = folder + "/" + Date.now() + "-" + safe;
          const { error: upErr } = await sb.storage.from("materials")
            .upload(storage_path, file, { contentType: file.type || undefined });
          if (upErr) { m.textContent = "Upload failed: " + upErr.message; m.className = "msg err"; return; }
        }

        const tierV = document.getElementById("l-tier").value || null;
        const { data: newLesson, error } = await sb.from("lessons")
          .insert({ title, kind, url: url || null, sort_order, course_id, storage_path, est_minutes, tier: tierV })
          .select().single();
        if (error) { m.textContent = "Could not add: " + error.message; m.className = "msg err"; return; }
        const coverFile = document.getElementById("l-img-new").files[0] || null;
        if (coverFile && newLesson) {
          try {
            m.textContent = "Uploading cover image…";
            await uploadLessonImage(newLesson.id, coverFile);
          } catch (e) { /* the cover is optional — the lesson is already saved */ }
        }
        renderAdmin();
      });

      // predefined swatches for quick color choice
      const SWATCHES = ["#1e4f8f","#0e7c66","#b7823f","#a4442f","#6d28d9","#c026d3","#0891b2","#374151"];
      const swWrap = document.getElementById("c-swatches");
      swWrap.innerHTML = SWATCHES.map(col =>
        `<button type="button" data-col="${col}" style="background:${col};" title="${col}"></button>`).join("");
      swWrap.querySelectorAll("button").forEach(b =>
        b.addEventListener("click", () => { document.getElementById("c-color").value = b.getAttribute("data-col"); }));

      document.getElementById("c-add").addEventListener("click", async () => {
        const title = document.getElementById("c-title").value.trim();
        const description = document.getElementById("c-desc").value.trim() || null;
        const category = document.getElementById("c-cat").value.trim() || null;
        const color = document.getElementById("c-color").value || null;
        const m = document.getElementById("c-msg");
        if (!title) { m.textContent = "Give the course a title."; m.className = "msg err"; return; }
        if ((courses || []).some(c => c.title.trim().toLowerCase() === title.toLowerCase())) {
          m.textContent = "A course with this name already exists."; m.className = "msg err"; return;
        }
        const iconV = document.getElementById("c-icon").value.trim() || null;
        const bannerFile = document.getElementById("c-banner").files[0] || null;
        const { data: newCourse, error } = await sb.from("courses")
          .insert({ title, description, category, color, icon: iconV,
                    tier: document.getElementById("c-tier").value,
                    sort_order: (courses?.length || 0) + 1 }).select().single();
        if (error) { m.textContent = "Could not add: " + error.message; m.className = "msg err"; return; }
        if (bannerFile && window.UI && UI.resizeImage) {
          try {
            m.textContent = "Uploading banner…";
            const blob = await UI.resizeImage(bannerFile, 1200);
            const path = newCourse.id + "-" + Date.now() + ".jpg";
            const { error: upErr } = await sb.storage.from("banners")
              .upload(path, blob, { contentType: "image/jpeg", upsert: true });
            if (!upErr) {
              const { data: pub } = sb.storage.from("banners").getPublicUrl(path);
              await sb.from("courses").update({ banner_url: pub.publicUrl }).eq("id", newCourse.id);
            }
          } catch (e) { /* banner is optional */ }
        }
        renderAdmin();
      });

      app.querySelectorAll(".c-edit").forEach(btn => {
        btn.addEventListener("click", () => {
          const row = app.querySelector(`.c-editrow[data-id="${btn.getAttribute("data-id")}"]`);
          row.style.display = row.style.display === "none" ? "block" : "none";
        });
      });
      app.querySelectorAll(".ce-cancel").forEach(btn => {
        btn.addEventListener("click", () => {
          app.querySelector(`.c-editrow[data-id="${btn.getAttribute("data-id")}"]`).style.display = "none";
        });
      });
      app.querySelectorAll(".ce-save").forEach(btn => {
        btn.addEventListener("click", async () => {
          const id = btn.getAttribute("data-id");
          const m = app.querySelector(`.ce-msg[data-id="${id}"]`);
          const title = app.querySelector(`.ce-title[data-id="${id}"]`).value.trim();
          const description = app.querySelector(`.ce-desc[data-id="${id}"]`).value.trim() || null;
          const category = app.querySelector(`.ce-cat[data-id="${id}"]`).value.trim() || null;
          const color = app.querySelector(`.ce-color[data-id="${id}"]`).value || null;
          const sequential = app.querySelector(`.ce-seq[data-id="${id}"]`).checked;

        const rtiFile = document.getElementById("rti-file");
        const rtiBox = document.getElementById("rti-preview");
        const RTI_HEADS = {
          title: "title", tieude: "title",
          vietnamesetitle: "title_vi", titlevi: "title_vi", title_vi: "title_vi", tieudetiengviet: "title_vi",

          theme: "theme", chudelon: "theme",
          subtopics: "subtopics", subtopic: "subtopics", chudenho: "subtopics",
          category: "category", chude: "category",
          tags: "tags", the: "tags",
          tier: "tier", access: "tier",
          audience: "audience", visibleto: "audience", visible: "audience",
          published: "published", status: "published", trangthai: "published",
          content: "content", text: "content", chinesetext: "content", noidung: "content",

          coveralt: "cover_alt", cover_alt: "cover_alt", motaanh: "cover_alt", alt: "cover_alt",

        };
        const paras = v => String(v || "")
          .replace(/\s*\|\|\s*/g, "\n").replace(/\\n/g, "\n").trim();

        rtiFile.addEventListener("change", async () => {

            if (/\.xlsx$/i.test(f.name)) {
              const X = await loadXLSX();
