      // ---- filtered, searchable, sortable lesson list ----
      let lf = { course: "all", sort: "order" };
      try { lf = Object.assign(lf, JSON.parse(localStorage.getItem("hub_lfilter") || "{}")); } catch (e) {}
      const lfCourse = document.getElementById("lf-course");
      const lfQ = document.getElementById("lf-q");
      const lfSort = document.getElementById("lf-sort");
      lfCourse.value = lf.course;
      if (lfCourse.value !== lf.course) { lf.course = "all"; lfCourse.value = "all"; }  // saved course was deleted
      lfSort.value = lf.sort;
      const saveLf = () => {
        try { localStorage.setItem("hub_lfilter", JSON.stringify({ course: lf.course, sort: lf.sort })); } catch (e) {}
      };
      const normA = s => String(s || "").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");

      function wireLessonRows(box) {
        box.querySelectorAll(".l-save").forEach(btn => {
          btn.addEventListener("click", async () => {
            const id = btn.getAttribute("data-id");
            const sel = box.querySelector(`.l-move[data-id="${id}"]`);
            const lesson = (lessons || []).find(x => x.id === id);
            btn.disabled = true;

            let newPath = lesson?.storage_path || null;
            // If this lesson is an uploaded file, move it to the new
            // course's folder so student access follows the course.
            if (lesson?.storage_path) {
              const folder = sel.value || "shared";
              const fname = lesson.storage_path.split("/").pop();
              const target = folder + "/" + fname;
              if (target !== lesson.storage_path) {
                const { error: mvErr } = await sb.storage.from("materials")
                  .move(lesson.storage_path, target);
                if (mvErr) { btn.disabled = false; alert("Could not move the file: " + mvErr.message); return; }
                newPath = target;
              }
            }

            const est_minutes = parseInt(box.querySelector(`.l-min-edit[data-id="${id}"]`).value, 10) || null;
            const tierSel = box.querySelector(`.l-tier[data-id="${id}"]`);
            const { error } = await sb.from("lessons")
              .update({ course_id: sel.value || null, storage_path: newPath, est_minutes,
                        tier: tierSel ? (tierSel.value || null) : null }).eq("id", id);
            btn.disabled = false;
            if (error) { alert("Could not move the lesson: " + error.message); return; }
            btn.textContent = "Saved ✓";
            setTimeout(() => renderAdmin(), 600);
          });
        });

        box.querySelectorAll(".l-del").forEach(btn => {
          btn.addEventListener("click", async () => {
            if (!confirm("Delete this lesson? Its uploaded file (if any) and student progress records will also be removed. This cannot be undone.")) return;
            const id = btn.getAttribute("data-id");
            const lesson = (lessons || []).find(x => x.id === id);
            btn.disabled = true;
            const { error } = await sb.from("lessons").delete().eq("id", id);
            if (error) { btn.disabled = false; alert("Could not delete: " + error.message); return; }
            if (lesson?.storage_path) {
              await sb.storage.from("materials").remove([lesson.storage_path]);
            }
            renderAdmin();
          });
        });

        wireFileButtons(box);
      }

      function renderLessonList() {
        const box = document.getElementById("lesson-list");
        const q = normA(lfQ.value.trim());
        let list = (lessons || []).slice();
        if (lf.course === "none") list = list.filter(l => !l.course_id);
        else if (lf.course !== "all") list = list.filter(l => l.course_id === lf.course);
        if (q) list = list.filter(l => normA(l.title).includes(q) || normA(l.url).includes(q));
        if (lf.sort === "title") list.sort((a, b) => a.title.localeCompare(b.title));
        else if (lf.sort === "new") list.sort((a, b) => String(b.created_at || "").localeCompare(String(a.created_at || "")));
        document.getElementById("l-count").textContent =
          "(" + list.length + (list.length !== (lessons || []).length ? " of " + (lessons || []).length : "") + ")";
        box.innerHTML = list.map(lessonRowHtml).join("") ||
          `<p class="empty">${lf.course === "all" && !q
            ? "No lessons yet — add your first one above."
            : "No lessons have been assigned to this course yet."}</p>`;
        wireLessonRows(box);
      }

      // ================= PROGRESS ANALYTICS ENGINE =================
      const sById = id => (students || []).find(s => s.id === id);
      const lById = id => (lessons || []).find(l => l.id === id);
      const cTitle = id => (courses || []).find(c => c.id === id)?.title || "";
      const sName = id => { const s = sById(id); return s ? (s.full_name || s.email || "—") : "—"; };
      const fmtTime = s => !s ? "—" : (s < 60 ? "<1 min" : Math.round(s / 60) + " min");
      const K = (s, l) => s + "|" + l;

      // Aggregate raw activity per student × lesson
      const agg = {};
      (activity || []).forEach(a => {
        const k = K(a.student_id, a.lesson_id);
        const e = agg[k] || (agg[k] = { sid: a.student_id, lid: a.lesson_id,
          time: 0, sections: [], scores: [], opened: false, last: a.updated_at });
        if (a.kind === "time") e.time = Number(a.value) || 0;
        else if (a.kind === "section") e.sections.push(a.key);
        else if (a.key === "opened") e.opened = true;
        else e.scores.push({ key: a.key, v: Number(a.value), m: a.max_value ? Number(a.max_value) : null });
        if (a.updated_at > e.last) e.last = a.updated_at;
      });
      const progMap = {};
      (prog || []).forEach(p => { progMap[K(p.student_id, p.lesson_id)] = p; });

      // access-event rollups: open counts and per-pair timelines
      const evOpens = {}, evBy = {};
      (events || []).forEach(ev => {
        if (ev.event !== "lesson_open" || !ev.lesson_id) return;
        const k = K(ev.student_id, ev.lesson_id);
        evOpens[k] = (evOpens[k] || 0) + 1;
        (evBy[k] = evBy[k] || []).push(ev);
      });

      // Unified records: every enrolled student × lesson (incl. NOT STARTED),
      // plus any stray progress/activity on course-less lessons.
      const records = [];
      const seenR = new Set();
      (enrollments || []).forEach(en => {
        (lessons || []).filter(l => l.course_id === en.course_id).forEach(l => {
          const k = K(en.student_id, l.id);
          seenR.add(k);
          const p = progMap[k], a = agg[k];
          records.push({ sid: en.student_id, lid: l.id, cid: l.course_id,
            status: p ? p.status : ((a && (a.opened || a.time)) ? "opened" : "not_started"),
            date: p?.updated_at || a?.last || null });
        });
      });
      Object.keys(progMap).forEach(k => {
        if (seenR.has(k)) return; seenR.add(k);
        const p = progMap[k], l = lById(p.lesson_id);
        records.push({ sid: p.student_id, lid: p.lesson_id, cid: l?.course_id || null,
          status: p.status, date: p.updated_at });
      });
      Object.values(agg).forEach(a => {
        const k = K(a.sid, a.lid);
        if (seenR.has(k)) return; seenR.add(k);
        const l = lById(a.lid);
        records.push({ sid: a.sid, lid: a.lid, cid: l?.course_id || null,
          status: "opened", date: a.last });
      });

      // ---- top analytics (computed on ALL data, unaffected by filters) ----
      (function renderAnalytics() {
        const stuIds = onlyStudents.map(s => s.id);
        const now = Date.now(), D = 24 * 3600 * 1000;
        const lastBy = {};
        records.forEach(r => { if (r.date && (!lastBy[r.sid] || r.date > lastBy[r.sid])) lastBy[r.sid] = r.date; });
        const active7 = stuIds.filter(id => lastBy[id] && now - new Date(lastBy[id]).getTime() <= 7 * D);
        const timeBy = {};
        Object.values(agg).forEach(a => { timeBy[a.sid] = (timeBy[a.sid] || 0) + a.time; });
        const ranked = stuIds.slice().sort((a, b) => (timeBy[b] || 0) - (timeBy[a] || 0));
        const atRisk = stuIds.filter(id => !lastBy[id] || now - new Date(lastBy[id]).getTime() > 14 * D);

        const doneCountBy = {}, accessBy = {}, scoreBy = {}, assignedBy = {}, doneLessonBy = {};
        records.forEach(r => {
          accessBy[r.lid] = (accessBy[r.lid] || 0) + (r.status !== "not_started" ? 1 : 0);
          assignedBy[r.lid] = (assignedBy[r.lid] || 0) + 1;
          if (r.status === "completed") doneLessonBy[r.lid] = (doneLessonBy[r.lid] || 0) + 1;
        });
        Object.values(agg).forEach(a => a.scores.forEach(s => {
          if (s.m > 1) (scoreBy[a.lid] = scoreBy[a.lid] || []).push(s.v / s.m);
        }));
        const lessonIds = (lessons || []).map(l => l.id);
        const maxBy = (ids, f) => ids.length ? ids.reduce((a, b) => f(b) > f(a) ? b : a) : null;
        const minBy = (ids, f) => ids.length ? ids.reduce((a, b) => f(b) < f(a) ? b : a) : null;
        const popular = maxBy(lessonIds, id => accessBy[id] || 0);
        const leastAcc = minBy(lessonIds.filter(id => assignedBy[id]), id => accessBy[id] || 0);
        const scoredIds = lessonIds.filter(id => (scoreBy[id] || []).length);
        const avgOf = arr => arr.reduce((a, b) => a + b, 0) / arr.length;
        const bestScore = maxBy(scoredIds, id => avgOf(scoreBy[id]));
        const assignedIds = lessonIds.filter(id => assignedBy[id]);
        const lowestComp = minBy(assignedIds, id => (doneLessonBy[id] || 0) / assignedBy[id]);

        const totalCompleted = (prog || []).filter(p => p.status === "completed").length;
        const totalSecs = Object.values(agg).reduce((s, a) => s + a.time, 0);
        const engEntries = Object.values(agg).filter(a => a.time > 0);
        const allScores = Object.values(agg).flatMap(a => a.scores.filter(s => s.m > 1).map(s => s.v / s.m));
        const totalActs = (activity || []).filter(a => a.kind === "activity" && a.key !== "opened").length;

        const stat = (k, v, sub) =>
          `<div class="stat"><div class="k">${k}</div><div class="v">${v}</div>${sub ? `<div class="sub">${sub}</div>` : ""}</div>`;
        document.getElementById("p-analytics").innerHTML =
          stat("Students", onlyStudents.length, active7.length + " active this week") +
          stat("Most active", ranked.length ? esc(sName(ranked[0])) : "—",
               ranked.length ? fmtTime(timeBy[ranked[0]] || 0) + " total" : "") +
          stat("At risk", atRisk.length,
               atRisk.length ? esc(atRisk.slice(0, 3).map(sName).join(", ")) + (atRisk.length > 3 ? "…" : "") : "quiet 14+ days") +
          stat("Lessons completed", totalCompleted, "across all students") +
          stat("Most popular lesson", popular && accessBy[popular] ? esc(lById(popular)?.title || "—") : "—",
               popular && accessBy[popular] ? accessBy[popular] + " students accessed" : "") +
          stat("Least accessed", leastAcc ? esc(lById(leastAcc)?.title || "—") : "—",
               leastAcc ? (accessBy[leastAcc] || 0) + " of " + assignedBy[leastAcc] + " accessed" : "") +
          stat("Best avg score", bestScore ? esc(lById(bestScore)?.title || "—") : "—",
               bestScore ? Math.round(avgOf(scoreBy[bestScore]) * 100) + "%" : "no scored quizzes yet") +
          stat("Lowest completion", lowestComp ? esc(lById(lowestComp)?.title || "—") : "—",
               lowestComp ? Math.round((doneLessonBy[lowestComp] || 0) / assignedBy[lowestComp] * 100) + "% completed" : "") +
          stat("Learning hours", (totalSecs / 3600).toFixed(1) + "h",
               engEntries.length ? "avg " + fmtTime(totalSecs / engEntries.length) + " per lesson" : "") +
          stat("Avg quiz score", allScores.length ? Math.round(avgOf(allScores) * 100) + "%" : "—",
               totalActs + " activities completed") +
          (function () {
            const freeN = onlyStudents.filter(s => s.plan !== "premium").length;
            const premN = onlyStudents.filter(s => s.plan === "premium").length;
            const rate = (freeN + premN) ? Math.round(premN / (freeN + premN) * 100) : 0;
            const lockBy = {};
            (lockEvents || []).forEach(ev => { if (ev.lesson_id) lockBy[ev.lesson_id] = (lockBy[ev.lesson_id] || 0) + 1; });
            const topLock = Object.entries(lockBy).sort((a, b) => b[1] - a[1])[0];
            return stat("👑 Premium students", premN, freeN + " free · " + rate + "% upgraded") +
                   stat("Locked-lesson attempts", (lockEvents || []).length,
                        topLock ? "top: " + esc(lById(topLock[0])?.title || "?") + " (" + topLock[1] + "×)" : "no attempts yet");
          })();
      })();

      // ---- filters (persisted) ----
      let pf = { q: "", student: "all", course: "all", lesson: "all",
                 status: "all", date: "all", d1: "", d2: "",
                 psort: "date", pdir: "desc", esort: "last", edir: "desc" };
      try { pf = Object.assign(pf, JSON.parse(localStorage.getItem("hub_pfilter") || "{}")); } catch (e) {}
      const $id = x => document.getElementById(x);
      const pfEls = { q: $id("pf-q"), student: $id("pf-student"), course: $id("pf-course"),
                      lesson: $id("pf-lesson"), status: $id("pf-status"), date: $id("pf-date"),
                      d1: $id("pf-d1"), d2: $id("pf-d2") };
      Object.entries(pfEls).forEach(([k, el]) => { el.value = pf[k]; if (el.value !== pf[k]) { pf[k] = el.tagName === "SELECT" ? "all" : ""; el.value = pf[k]; } });
      $id("p-sort").value = pf.psort; $id("e-sort").value = pf.esort;
      const savePf = () => { try { localStorage.setItem("hub_pfilter", JSON.stringify(pf)); } catch (e) {} };
      const dirLabel = d => d === "desc" ? "↓ desc" : "↑ asc";
      $id("p-dir").textContent = dirLabel(pf.pdir);
      $id("e-dir").textContent = dirLabel(pf.edir);
      const showCustom = () => {
        const on = pf.date === "custom" ? "" : "none";
        $id("pf-d1w").style.display = on; $id("pf-d2w").style.display = on;
      };
      showCustom();

      const inDate = d => {
        if (pf.date === "all") return true;
        if (!d) return false;
        const ts = new Date(d).getTime(), now = new Date();
        if (pf.date === "today") { const t0 = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime(); return ts >= t0; }
        if (pf.date === "7") return now.getTime() - ts <= 7 * 24 * 3600 * 1000;
        if (pf.date === "30") return now.getTime() - ts <= 30 * 24 * 3600 * 1000;
        if (pf.date === "custom") {
          if (pf.d1 && ts < new Date(pf.d1).getTime()) return false;
          if (pf.d2 && ts > new Date(pf.d2).getTime() + 24 * 3600 * 1000) return false;
          return true;
        }
        return true;
      };
      const matches = r => {
        if (pf.student !== "all" && r.sid !== pf.student) return false;
        if (pf.course !== "all" && r.cid !== pf.course) return false;
        if (pf.lesson !== "all" && r.lid !== pf.lesson) return false;
        if (!inDate(r.date)) return false;
        const q = normA(pf.q.trim());
        if (q) {
          const s = sById(r.sid), l = lById(r.lid);
          const hay = normA((s?.full_name || "") + " " + (s?.email || "") + " " +
                            (l?.title || "") + " " + cTitle(r.cid));
          if (!hay.includes(q)) return false;
        }
        return true;
      };

      const STATUS_PILL = {
        completed: '<span class="pill done">completed</span>',
        in_progress: '<span class="pill todo">in progress</span>',
        opened: '<span class="pill todo">opened</span>',
        not_started: '<span class="kind">not started</span>'
      };

      function renderProgressTables() {
        // ----- student progress table -----
        let list = records.filter(r => matches(r) && (pf.status === "all" || r.status === pf.status));
        const dir = pf.pdir === "asc" ? 1 : -1;
        list.sort((a, b) => {
          if (pf.psort === "student") return dir * sName(a.sid).localeCompare(sName(b.sid));
          if (pf.psort === "lesson") return dir * (lById(a.lid)?.title || "").localeCompare(lById(b.lid)?.title || "");
          return dir * String(a.date || "").localeCompare(String(b.date || ""));
        });
        $id("p-count").textContent = "Showing " + list.length + " of " + records.length + " records";
        const done = list.filter(r => r.status === "completed").length;
        const inp = list.filter(r => r.status === "in_progress").length;
        const ns = list.filter(r => r.status === "not_started").length;
        const op = list.filter(r => r.status === "opened").length;
        const stuCount = new Set(list.map(r => r.sid)).size;
        const stat = (k, v) => `<div class="stat"><div class="k">${k}</div><div class="v">${v}</div></div>`;
        $id("p-summary").innerHTML =
          stat("Students", stuCount) + stat("Records", list.length) +
          stat("Completed", done) + stat("In progress", inp + op) +
          stat("Not started", ns) +
          stat("Completion rate", list.length ? Math.round(done / list.length * 100) + "%" : "—");
        $id("p-table").innerHTML = list.length ? `
          <table><thead><tr><th>Student</th><th>Lesson</th><th>Course</th><th>Status</th><th>Updated</th></tr></thead>
          <tbody>${list.map(r => `
            <tr>
              <td><a class="pf-link" data-f="student" data-v="${r.sid}">${esc(sName(r.sid))}</a></td>
              <td><a class="pf-link" data-f="lesson" data-v="${r.lid}">${esc(lById(r.lid)?.title || "—")}</a></td>
              <td>${esc(cTitle(r.cid) || "—")}</td>
              <td>${STATUS_PILL[r.status] || esc(r.status)}</td>
              <td>${r.date ? new Date(r.date).toLocaleDateString() : "—"}</td>
            </tr>`).join("")}</tbody></table>`
          : `<p class="empty">No progress records found.</p>`;

        // ----- engagement table -----
        let eng = Object.values(agg).filter(a =>
          matches({ sid: a.sid, lid: a.lid, cid: lById(a.lid)?.course_id || null, date: a.last }));
        const best = a => a.scores.length ? Math.max(...a.scores.map(s => s.m > 1 ? s.v / s.m : 0)) : -1;
        const ed = pf.edir === "asc" ? 1 : -1;
        eng.sort((a, b) => {
          if (pf.esort === "student") return ed * sName(a.sid).localeCompare(sName(b.sid));
          if (pf.esort === "lesson") return ed * (lById(a.lid)?.title || "").localeCompare(lById(b.lid)?.title || "");
          if (pf.esort === "time") return ed * (a.time - b.time);
          if (pf.esort === "score") return ed * (best(a) - best(b));
          return ed * String(a.last || "").localeCompare(String(b.last || ""));
        });
        $id("e-count").textContent = "Showing " + eng.length + " of " + Object.keys(agg).length + " records";
        $id("e-table").innerHTML = eng.length ? `
          <table><thead><tr><th></th><th>Student</th><th>Lesson</th><th>Time</th><th>Opens</th><th>Sections</th><th>Activities & scores</th><th>Last active</th></tr></thead>
          <tbody>${eng.map((a, i) => {
            const acts = a.scores.map(s => s.m > 1 ? `${esc(s.key)}: ${s.v}/${s.m}` : `${esc(s.key)} ✓`);
            return `
            <tr>
              <td><button class="ghost e-exp" data-k="${i}" style="padding:0.15rem 0.5rem;">▸</button></td>
              <td><a class="pf-link" data-f="student" data-v="${a.sid}">${esc(sName(a.sid))}</a></td>
              <td><a class="pf-link" data-f="lesson" data-v="${a.lid}">${esc(lById(a.lid)?.title || "—")}</a></td>
              <td>${fmtTime(a.time)}</td>
              <td>${evOpens[K(a.sid, a.lid)] || "—"}</td>
              <td>${a.sections.length || "—"}</td>
              <td>${acts.join(", ") || (a.opened ? "opened" : "—")}</td>
              <td>${a.last ? new Date(a.last).toLocaleDateString() : "—"}</td>
            </tr>
            <tr class="e-det" data-k="${i}" style="display:none;"><td></td><td colspan="7">
              <div class="eng-detail">
                <b>${esc(sName(a.sid))} · ${esc(lById(a.lid)?.title || "")}</b>
                <span class="kind">Total time: ${fmtTime(a.time)} · ${a.opened ? "opened via hub · " : ""}last active ${a.last ? new Date(a.last).toLocaleString() : "—"}</span>
                <span class="kind">Sections viewed (${a.sections.length}): ${a.sections.map(esc).join(", ") || "—"}</span>
                <span class="kind">Activities: ${a.scores.map(s => s.m > 1
                  ? `${esc(s.key)} — ${s.v}/${s.m} (${Math.round(s.v / s.m * 100)}%)`
                  : `${esc(s.key)} — completed`).join(" · ") || "—"}</span>
                <span class="kind">Access history (${evOpens[K(a.sid, a.lid)] || 0} opens): ${
                  (evBy[K(a.sid, a.lid)] || []).slice(0, 8).map(ev =>
                    new Date(ev.created_at).toLocaleString() + (ev.device_type ? " · " + ev.device_type : "") +
                    (ev.agent ? " · " + esc(ev.agent) : "")).join("<br>") || "—"}</span>
              </div>
            </td></tr>`;
          }).join("")}</tbody></table>`
          : `<p class="empty">No engagement records found.</p>`;

        // wiring inside tables
        document.querySelectorAll(".pf-link").forEach(el => el.addEventListener("click", e => {
          e.preventDefault();
          const f = el.getAttribute("data-f");
          pf[f] = el.getAttribute("data-v");
          pfEls[f].value = pf[f];
          savePf(); renderProgressTables();
        }));
        document.querySelectorAll(".e-exp").forEach(btn => btn.addEventListener("click", () => {
          const det = document.querySelector(`.e-det[data-k="${btn.getAttribute("data-k")}"]`);
          const open = det.style.display !== "none";
          det.style.display = open ? "none" : "";
          btn.textContent = open ? "▸" : "▾";
        }));
      }

      Object.entries(pfEls).forEach(([k, el]) =>
        el.addEventListener(el.tagName === "SELECT" ? "change" : "input", () => {
          pf[k] = el.value; if (k === "date") showCustom(); savePf(); renderProgressTables();
        }));
      $id("pf-reset").addEventListener("click", () => {
        pf = Object.assign(pf, { q: "", student: "all", course: "all", lesson: "all",
                                 status: "all", date: "all", d1: "", d2: "" });
        Object.entries(pfEls).forEach(([k, el]) => { el.value = pf[k]; });
        showCustom(); savePf(); renderProgressTables();
      });
      $id("p-sort").addEventListener("change", e => { pf.psort = e.target.value; savePf(); renderProgressTables(); });
      $id("e-sort").addEventListener("change", e => { pf.esort = e.target.value; savePf(); renderProgressTables(); });
      $id("p-dir").addEventListener("click", () => {
        pf.pdir = pf.pdir === "desc" ? "asc" : "desc";
        $id("p-dir").textContent = dirLabel(pf.pdir); savePf(); renderProgressTables();
      });
      $id("e-dir").addEventListener("click", () => {
        pf.edir = pf.edir === "desc" ? "asc" : "desc";
        $id("e-dir").textContent = dirLabel(pf.edir); savePf(); renderProgressTables();
      });
      renderProgressTables();
      // =============== END PROGRESS ANALYTICS ENGINE ===============

      // ================= STUDENT MANAGEMENT ENGINE =================
      const dstr = d => d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
      const addDaysStr = (base, n) => { const d = base ? new Date(base) : new Date(); d.setDate(d.getDate() + n); return dstr(d); };
      const coursesOf = sid => (enrollments || []).filter(e => e.student_id === sid)
        .map(e => cTitle(e.course_id)).filter(Boolean);

      const STU_PILL = {
        active:    d => `<span class="pill done">Active${d != null ? " · " + d + "d left" : ""}</span>`,
        unlimited: () => `<span class="pill done">Active · unlimited</span>`,
        expiring:  d => `<span class="pill todo">⚠️ Expiring · ${d === 0 ? "today" : d + "d left"}</span>`,
        expired:   () => `<span class="pill bad">Expired</span>`,
        suspended: () => `<span class="pill off">Suspended</span>`
      };
      const stuBadge = s => {
        const st = accStatus(s);
        if (st.key === "active" && st.unlimited) return STU_PILL.unlimited();
        return STU_PILL[st.key](st.days);
      };

      // expiring/expired alert banner
      (function () {
        const soon = onlyStudents.filter(s => accStatus(s).key === "expiring");
        const dead = onlyStudents.filter(s => accStatus(s).key === "expired");
        const urgent = soon.filter(s => accStatus(s).days <= 3);
        document.getElementById("stu-alert").innerHTML = (soon.length || dead.length) ? `
          <div class="alert-bar">⚠️ <b>Attention:</b>
            ${dead.length ? dead.length + " expired (" + esc(dead.map(x => studentName(x)).join(", ")) + ")" : ""}
            ${dead.length && soon.length ? " · " : ""}
            ${soon.length ? soon.length + " expiring within 7 days (" + esc(soon.map(x => studentName(x) + (accStatus(x).days <= 3 ? " — " + accStatus(x).days + "d!" : "")).join(", ")) + ")" : ""}
          </div>` : "";
        void urgent;
      })();

      let sf = { q: "", status: "all", access: "all", role: "all", multi: "all" };
      try { sf = Object.assign(sf, JSON.parse(localStorage.getItem("hub_sfilter") || "{}")); } catch (e) {}
      const sfEls = { q: $id("sf-q"), status: $id("sf-status"), access: $id("sf-access"),
                      role: $id("sf-role"), multi: $id("sf-multi") };
      Object.entries(sfEls).forEach(([k, el]) => { el.value = sf[k]; });
      const saveSf = () => { try { localStorage.setItem("hub_sfilter", JSON.stringify(sf)); } catch (e) {} };

      async function updStudent(id, patch, msgEl, okText) {
        const { error } = await sb.from("profiles").update(patch).eq("id", id);
        if (msgEl) {
          msgEl.className = "msg" + (error ? " err" : "");
          msgEl.textContent = error ? "Could not save: " + error.message : okText;
        } else if (error) alert("Could not save: " + error.message);
        if (!error) setTimeout(() => renderAdmin(), 650);
      }

      function renderStudentTable() {
        const q = normA(sf.q.trim());
        let list = (students || []).filter(s => {
          const st = accStatus(s);
          if (sf.role !== "all" && s.role !== sf.role) return false;
          if (sf.status !== "all" && st.key !== sf.status) return false;
          if (sf.access === "unlimited" && (s.role === "student" && s.access_expires)) return false;
          if (sf.access === "limited" && !s.access_expires) return false;
          if (sf.access === "expired" && st.key !== "expired") return false;
          if (sf.multi === "on" && !(s.multi_device || s.role !== "student")) return false;
          if (sf.multi === "off" && (s.multi_device || s.role !== "student")) return false;
          if (q) {
            const hay = normA((s.full_name || "") + " " + (s.email || "") + " " +
                              coursesOf(s.id).join(" ") + " " + st.key);
            if (!hay.includes(q)) return false;
          }
          return true;
        });

        $id("stu-count").textContent = "Showing " + list.length + " of " + (students || []).length;
        const stOf = s => accStatus(s).key;
        const stu = list.filter(s => s.role === "student");
        const stat = (k, v) => `<div class="stat"><div class="k">${k}</div><div class="v">${v}</div></div>`;
        $id("stu-summary").innerHTML =
          stat("Students", stu.length) +
          stat("Active", stu.filter(s => stOf(s) === "active").length) +
          stat("Expiring soon", stu.filter(s => stOf(s) === "expiring").length) +
          stat("Expired", stu.filter(s => stOf(s) === "expired").length) +
          stat("Suspended", stu.filter(s => stOf(s) === "suspended").length) +
          stat("Unlimited", stu.filter(s => !s.access_expires && !s.suspended).length);

        const box = $id("stu-table");
        box.innerHTML = list.length ? `
          <table><thead><tr><th>Name</th><th>Email · courses</th><th>Role</th><th>Access</th><th>Multi-device</th><th></th></tr></thead>
          <tbody>${list.map(s => {
            const st = accStatus(s);
            const off = ["expired", "suspended"].includes(st.key) ? "row-off" : "";
            const compl = (prog || []).filter(p => p.student_id === s.id && p.status === "completed").length;
            const time = Object.values(agg).filter(a => a.sid === s.id).reduce((x, a) => x + a.time, 0);
            const lastAct = records.filter(r => r.sid === s.id && r.date)
              .map(r => r.date).sort().pop();
            return `
            <tr class="${off}">
              <td style="min-width:170px;">
                <div style="display:flex; gap:0.5rem; align-items:center;">
                  ${s.avatar_url ? `<img src="${esc(s.avatar_url)}" alt="" style="width:28px;height:28px;border-radius:50%;object-fit:cover;flex:none;" />` : ""}
                  <input class="s-name" data-id="${s.id}" value="${esc(s.full_name || "")}" placeholder="Type a name…" />
                </div>
              </td>
              <td>${esc(s.email || "—")}
                <div class="kind">${esc(coursesOf(s.id).join(", ") || "no courses")}</div>
                ${s.bio ? `<div class="kind">${esc(s.bio)}</div>` : ""}</td>
              <td>${s.role === "student" ? "student" : `<span class="pill done">${esc(s.role)}</span>`}</td>
              <td>${stuBadge(s)}
                ${s.access_expires ? `<div class="kind">${esc(s.access_start || "…")} → ${esc(s.access_expires)}</div>` : ""}</td>
              <td>${s.role !== "student" ? `<span class="kind">always</span>`
                : `<label style="font-size:0.82rem; color:var(--muted); cursor:pointer; white-space:nowrap;">
                     <input type="checkbox" class="s-multi" data-id="${s.id}" ${s.multi_device ? "checked" : ""} /> allow</label>`}</td>
              <td style="white-space:nowrap;">
                <button class="ghost s-save" data-id="${s.id}">Save</button>
                ${s.role !== "student" ? "" : `<button class="ghost st-manage" data-id="${s.id}">Manage ▸</button>`}
              </td>
            </tr>
            ${s.role !== "student" ? "" : `
            <tr class="st-panel" data-id="${s.id}" style="display:none;"><td colspan="6">
              <div class="eng-detail">
                <b>Access control — ${esc(studentName(s))}</b>
                <div class="form-row" style="margin-top:0.5rem;">
                  <span class="kind" style="align-self:center;">Extend:</span>
                  ${[7, 30, 60, 90, 180, 365].map(d =>
                    `<button class="ghost st-ext" data-id="${s.id}" data-d="${d}">+${d}d</button>`).join("")}
                  <button class="ghost st-unlim" data-id="${s.id}">∞ Unlimited</button>
                  <button class="ghost st-susp" data-id="${s.id}"
                    style="${s.suspended ? "" : "color:var(--danger); border-color:var(--danger);"}">
                    ${s.suspended ? "▶ Reactivate" : "⏸ Suspend"}</button>
                </div>
                <div class="form-row" style="margin-top:0.4rem;">
                  <span class="kind" style="align-self:center;">👑 ${s.plan === "premium" ? "Premium" + (s.premium_until ? " → " + esc(s.premium_until) : " · ∞") : "Free"}:</span>
                  ${[30, 90, 365].map(d =>
                    `<button class="ghost pm-ext" data-id="${s.id}" data-d="${d}">👑 +${d}d</button>`).join("")}
                  <button class="ghost pm-unlim" data-id="${s.id}">👑 ∞</button>
                  <button class="ghost pm-free" data-id="${s.id}">→ Free</button>
                </div>
                <div class="form-row" style="margin-top:0.4rem;">
                  <div class="field" style="max-width:160px;"><label>Start</label>
                    <input type="date" class="st-d1" data-id="${s.id}" value="${esc(s.access_start || "")}" /></div>
                  <div class="field" style="max-width:160px;"><label>Expires</label>
                    <input type="date" class="st-d2" data-id="${s.id}" value="${esc(s.access_expires || "")}" /></div>
                  <button class="ghost st-dates" data-id="${s.id}">Save dates</button>
                  <div class="field" style="max-width:100px;"><label>Days</label>
                    <input type="number" class="st-rdays" data-id="${s.id}" value="30" min="1" /></div>
                  <button class="ghost st-renew" data-id="${s.id}">Renew from today</button>
                </div>
                <p class="msg st-msg" data-id="${s.id}"></p>
                <span class="kind">Courses: ${esc(coursesOf(s.id).join(", ") || "—")} ·
                  Completed: ${compl} lessons · Total learning time: ${fmtTime(time)} ·
                  Last active: ${lastAct ? new Date(lastAct).toLocaleDateString() : "never"}</span>
                ${(() => {
                  const myEv = (events || []).filter(e => e.student_id === s.id);
                  const devs = new Set(myEv.map(e => e.device).filter(Boolean));
                  const types = [...new Set(myEv.map(e => e.device_type).filter(Boolean))];
                  const opens = myEv.filter(e => e.event === "lesson_open").length;
                  const logins = myEv.filter(e => e.event === "login").slice(0, 3);
                  return `
                <span class="kind">Devices used: ${devs.size || "—"}${types.length ? " (" + types.join(", ") + ")" : ""} ·
                  Lesson opens: ${opens}</span>
                <span class="kind">Recent logins: ${logins.map(l =>
                  new Date(l.created_at).toLocaleString() +
                  (l.device_type ? " · " + l.device_type : "") +
                  (l.agent ? " · " + esc(l.agent) : "")).join("<br>") || "—"}</span>`;
                })()}
              </div>
            </td></tr>`}`;
          }).join("")}</tbody></table>`
          : `<p class="empty">No students match these filters.</p>`;

        // --- wiring ---
        box.querySelectorAll(".s-save").forEach(btn => btn.addEventListener("click", async () => {
          const id = btn.getAttribute("data-id");
          const input = box.querySelector(`.s-name[data-id="${id}"]`);
          btn.disabled = true;
          const { error } = await sb.from("profiles")
            .update({ full_name: input.value.trim() || null }).eq("id", id);
          btn.disabled = false;
          if (error) { alert("Could not save the name: " + error.message); return; }
          btn.textContent = "Saved ✓";
          setTimeout(() => (btn.textContent = "Save"), 1500);
        }));
        box.querySelectorAll(".s-multi").forEach(cb => cb.addEventListener("change", async () => {
          cb.disabled = true;
          const { error } = await sb.from("profiles")
            .update({ multi_device: cb.checked }).eq("id", cb.getAttribute("data-id"));
          cb.disabled = false;
          if (error) { cb.checked = !cb.checked; alert("Could not save: " + error.message); }
        }));
        box.querySelectorAll(".st-manage").forEach(btn => btn.addEventListener("click", () => {
          const p = box.querySelector(`.st-panel[data-id="${btn.getAttribute("data-id")}"]`);
          const open = p.style.display !== "none";
          p.style.display = open ? "none" : "";
          btn.textContent = open ? "Manage ▸" : "Manage ▾";
        }));
        const msgOf = id => box.querySelector(`.st-msg[data-id="${id}"]`);
        box.querySelectorAll(".st-ext").forEach(btn => btn.addEventListener("click", () => {
          const id = btn.getAttribute("data-id"), d = parseInt(btn.getAttribute("data-d"), 10);
          const s = (students || []).find(x => x.id === id);
          const today = dstr(new Date());
          const base = (s.access_expires && s.access_expires >= today) ? s.access_expires : null;
          updStudent(id, {
            access_expires: addDaysStr(base, d),
            access_start: s.access_start || today,
            suspended: false
          }, msgOf(id), "Access extended ✓");
        }));
        box.querySelectorAll(".st-unlim").forEach(btn => btn.addEventListener("click", () => {
          updStudent(btn.getAttribute("data-id"),
            { access_start: null, access_expires: null, suspended: false },
            msgOf(btn.getAttribute("data-id")), "Unlimited access granted ✓");
        }));
        box.querySelectorAll(".st-susp").forEach(btn => btn.addEventListener("click", () => {
          const id = btn.getAttribute("data-id");
          const s = (students || []).find(x => x.id === id);
          if (!s.suspended && !confirm("Suspend this account? The student will be blocked from all lessons until reactivated.")) return;
          updStudent(id, { suspended: !s.suspended }, msgOf(id),
            s.suspended ? "Account reactivated ✓" : "Account suspended ✓");
        }));
        box.querySelectorAll(".st-dates").forEach(btn => btn.addEventListener("click", () => {
          const id = btn.getAttribute("data-id");
          const d1 = box.querySelector(`.st-d1[data-id="${id}"]`).value || null;
          const d2 = box.querySelector(`.st-d2[data-id="${id}"]`).value || null;
          if (d1 && d2 && d2 < d1) { const m = msgOf(id); m.className = "msg err"; m.textContent = "Expiry must be after start."; return; }
          updStudent(id, { access_start: d1, access_expires: d2 }, msgOf(id), "Dates saved ✓");
        }));
        box.querySelectorAll(".st-renew").forEach(btn => btn.addEventListener("click", () => {
          const id = btn.getAttribute("data-id");
          const days = parseInt(box.querySelector(`.st-rdays[data-id="${id}"]`).value, 10) || 30;
          const today = dstr(new Date());
          updStudent(id, {
            access_start: today, access_expires: addDaysStr(today, days), suspended: false
          }, msgOf(id), "Renewed for " + days + " days from today ✓");
        }));
        box.querySelectorAll(".pm-ext").forEach(btn => btn.addEventListener("click", () => {
          const id = btn.getAttribute("data-id"), d = parseInt(btn.getAttribute("data-d"), 10);
          const st = (students || []).find(x => x.id === id);
          const today = dstr(new Date());
          const base = (st.plan === "premium" && st.premium_until && st.premium_until >= today) ? st.premium_until : null;
          updStudent(id, { plan: "premium", premium_until: addDaysStr(base, d) }, msgOf(id), "Premium extended ✓");
        }));
        box.querySelectorAll(".pm-unlim").forEach(btn => btn.addEventListener("click", () => {
          updStudent(btn.getAttribute("data-id"), { plan: "premium", premium_until: null },
            msgOf(btn.getAttribute("data-id")), "Premium (no end date) ✓");
        }));
        box.querySelectorAll(".pm-free").forEach(btn => btn.addEventListener("click", () => {
          updStudent(btn.getAttribute("data-id"), { plan: "free", premium_until: null },
            msgOf(btn.getAttribute("data-id")), "Set to Free ✓");
        }));
      }

      Object.entries(sfEls).forEach(([k, el]) =>
        el.addEventListener(el.tagName === "SELECT" ? "change" : "input", () => {
          sf[k] = el.value; saveSf(); renderStudentTable();
        }));
      renderStudentTable();
      document.getElementById("stu-csv")?.addEventListener("click", () => {
        if (!window.UI) return;
        UI.csv("students.csv", (students || []).map(s => ({
          name: s.full_name || "", email: s.email || "", role: s.role,
          access_start: s.access_start || "", access_expires: s.access_expires || "",
          suspended: s.suspended ? "yes" : "no",
          courses: coursesOf(s.id).join("; ")
        })));
      });
      // =============== END STUDENT MANAGEMENT ENGINE ===============

      lfCourse.addEventListener("change", () => { lf.course = lfCourse.value; saveLf(); renderLessonList(); });
      lfSort.addEventListener("change", () => { lf.sort = lfSort.value; saveLf(); renderLessonList(); });
      lfQ.addEventListener("input", renderLessonList);
      renderLessonList();

      wireFileButtons(app);
      window.scrollTo(0, __scrollY);
    }

    start();
  </script>
</body>
</html>
