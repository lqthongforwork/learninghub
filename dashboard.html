<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — Thong's Learning Hub</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <span class="brand">Thong's Learning Hub</span>
    <div style="display:flex; align-items:center;">
      <span id="bell-slot" style="margin-right:0.5rem;"></span>
      <span class="badge" id="who-badge" style="display:none;"></span>
      <span class="who" id="who"></span>
      <button class="ghost" id="lang-btn" style="margin-right:0.5rem;"></button>
      <button class="ghost" id="signout" data-i18n="sign_out">Sign out</button>
    </div>
  </header>

  <main class="container" id="app">
    <p class="empty" data-i18n="loading">Loading…</p>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="lang.js"></script>
  <script src="config.js"></script>
  <script src="ui.js"></script>
  <script>
    applyI18n();
    const langBtn = document.getElementById("lang-btn");
    langBtn.textContent = LANG === "en" ? "VI" : "EN";
    langBtn.title = t("lang_name");
    langBtn.addEventListener("click", () => setLang(otherLang()));

    const app = document.getElementById("app");
    const who = document.getElementById("who");
    let user = null;
    let adminTab = "lessons";

    document.getElementById("signout").addEventListener("click", async () => {
      await sb.auth.signOut();
      window.location.href = "index.html";
    });

    function esc(s) {
      return String(s ?? "").replace(/[&<>"']/g, c =>
        ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" }[c]));
    }

    // Label a file/link by its extension.
    function kindOf(name) {
      const e = (String(name || "").split("?")[0].split(".").pop() || "").toLowerCase();
      return ({ pdf:"pdf", doc:"word", docx:"word", ppt:"powerpoint", pptx:"powerpoint",
                xls:"excel", xlsx:"excel", csv:"excel", html:"html", htm:"html",
                mp3:"audio", wav:"audio", m4a:"audio", mp4:"video",
                png:"image", jpg:"image", jpeg:"image", webp:"image", gif:"image",
                txt:"text" })[e] || null;
    }

    function stripHtml(s) {
      const d = document.createElement("div");
      d.innerHTML = String(s ?? "");
      return d.textContent || "";
    }

    function iconFor(kind) {
      return ({ pdf:"📄", word:"📝", powerpoint:"📊", excel:"📈", html:"🌐",
                audio:"🎧", video:"🎬", image:"🖼️", text:"📃", link:"🔗" })[kind] || "📄";
    }

    // Open an uploaded material via a short-lived signed link.
    // Supabase only grants the link if this user may access the file.
    function wireFileButtons(scope) {
      scope.querySelectorAll(".open-file").forEach(btn => {
        btn.addEventListener("click", async () => {
          btn.disabled = true;
          const { data, error } = await sb.storage
            .from("materials").createSignedUrl(btn.getAttribute("data-path"), 3600);
          btn.disabled = false;
          if (error) { alert(t("file_open_fail") + error.message); return; }
          window.open(data.signedUrl, "_blank", "noopener");
        });
      });
    }

    async function start() {
      const { data: { session } } = await sb.auth.getSession();
      if (!session) { window.location.href = "index.html"; return; }
      user = session.user;

      const { data: profile } = await sb
        .from("profiles")
        .select("full_name, role, avatar_url, active_session, multi_device, access_expires, suspended")
        .eq("id", user.id).single();

      // ---- access period enforcement (students only) ----
      const STAFF = ["owner", "admin", "teacher"];
      if (!STAFF.includes(profile?.role)) {
        const today = new Date(); today.setHours(0, 0, 0, 0);
        const expired = profile?.access_expires && new Date(profile.access_expires) < today;
        if (profile?.suspended || expired) {
          const name = profile?.full_name || user.email;
          who.textContent = name;
          app.innerHTML = `
            <div class="card" style="max-width:480px; margin:3rem auto; text-align:center; border-top:4px solid var(--danger);">
              <div style="font-size:2.4rem;">🔒</div>
              <h1 style="font-size:1.4rem;">${t("acc_expired_t")}</h1>
              <p style="color:var(--muted);">${profile?.suspended ? t("acc_susp_m") : t("acc_expired_m")}</p>
              <a class="btn" href="https://zalo.me/0961923983" target="_blank" rel="noopener"
                 style="text-decoration:none; display:inline-block; margin-top:0.5rem;">💬 ${t("contact_teacher")}</a>
            </div>`;
          return;
        }
      }

      // ---- one device per student account ----
      // (admins and accounts you've granted multi-device are exempt)
      if (!STAFF.includes(profile?.role) && !profile?.multi_device) {
        let device = null;
        try { device = localStorage.getItem("hub_device"); } catch (e) {}
        if (!device) {
          device = crypto.randomUUID();
          try { localStorage.setItem("hub_device", device); } catch (e) {}
        }
        const kick = async () => {
          try { await sb.auth.signOut({ scope: "local" }); } catch (e) {}
          window.location.href = "index.html?kicked=1";
        };
        if (!profile?.active_session) {
          // Legacy session from before this feature: claim this device.
          await sb.from("profiles").update({ active_session: device }).eq("id", user.id);
        } else if (profile.active_session !== device) {
          kick(); return;
        }
        // Re-check periodically: if another device logs in, leave.
        setInterval(async () => {
          const { data } = await sb.from("profiles")
            .select("active_session").eq("id", user.id).single();
          if (data?.active_session && data.active_session !== device) kick();
        }, 45000);
      }

      const name = profile?.full_name || user.email;
      who.textContent = name;
      const badge = document.getElementById("who-badge");
      badge.style.display = "inline-flex";
      badge.innerHTML = profile?.avatar_url
        ? `<img src="${esc(profile.avatar_url)}" alt="" />`
        : esc(String(name).charAt(0).toUpperCase());

      if (window.UI && UI.initBell) UI.initBell(document.getElementById("bell-slot"));
      if (profile?.role !== "owner" && window.UI && UI.applyBrand) {
        sb.from("organizations").select("brand_color").limit(1)
          .then(({ data }) => { if (data && data[0] && data[0].brand_color) UI.applyBrand(data[0].brand_color); });
      }

      if (profile?.role === "owner") renderAdmin();
      else if (profile?.role === "admin") { window.location.href = "admin.html"; return; }
      else if (profile?.role === "teacher") { window.location.href = "teacher.html"; return; }
      else renderStudent();
    }

    // ---------- STUDENT VIEW ----------
    async function renderStudent() {
      const __scrollY = window.scrollY;
      const T2c = window.UI ? UI.t2 : (k => k);
      // RLS already filters these to: my courses, their lessons,
      // plus any lesson that has no course.
      const { data: courses } = await sb
        .from("courses").select("*").order("sort_order").order("created_at");
      const { data: lessons } = await sb
        .from("lessons").select("*").order("sort_order").order("created_at");
      const { data: mine } = await sb
        .from("progress").select("lesson_id, status, updated_at").eq("student_id", user.id);
      const { data: myActs } = await sb
        .from("lesson_activity")
        .select("lesson_id, kind, key, value, max_value, updated_at")
        .eq("student_id", user.id);
      const { data: anns } = await sb
        .from("announcements").select("*")
        .order("created_at", { ascending: false }).limit(10);
      const { data: myAsgns } = await sb
        .from("assignments").select("*").order("due_on", { ascending: true, nullsFirst: false });
      const { data: mySubs } = await sb
        .from("submissions").select("*").eq("student_id", user.id);
      const { data: mySessions } = await sb
        .from("sessions").select("*").order("starts_at", { ascending: true });
      const { data: myMats } = await sb
        .from("teacher_materials").select("*").order("created_at", { ascending: false });
      const { data: mePlan } = await sb
        .from("profiles").select("plan, premium_until").eq("id", user.id).single();

      // ---- Free vs Premium gating ----
      const __t0 = new Date().toISOString().slice(0, 10);
      const isPremUser = mePlan?.plan === "premium" && (!mePlan.premium_until || mePlan.premium_until >= __t0);
      const tierOf = l => l.tier || (courses || []).find(c => c.id === l.course_id)?.tier || "free";
      const premLocked = new Set((lessons || []).filter(l => !isPremUser && tierOf(l) === "premium").map(l => l.id));
      const logLock = lid => {
        sb.from("lock_events").insert({ student_id: user.id, lesson_id: lid || null }).then(() => {});
      };
      const showUpgrade = () => {
        const T = window.UI ? UI.t2 : (k => k);
        const old = document.querySelector(".cert-overlay"); if (old) old.remove();
        const plans = window.PREMIUM_PLANS || [];
        const ov = document.createElement("div");
        ov.className = "cert-overlay";
        ov.innerHTML = `
          <div class="modal" style="max-width:430px; text-align:center;">
            <div style="font-size:2.4rem;">👑</div>
            <h3 style="font-family:var(--serif); margin:0.3rem 0; font-size:1.3rem;">${T("upgrade_title")}</h3>
            <p style="color:var(--muted); font-size:0.92rem;">${T("upgrade_body")}</p>
            ${plans.map(p => `
              <div class="lesson"><div class="meta" style="text-align:left;"><div class="title">${esc(p.name)}</div>${p.note ? `<span class="kind">${esc(p.note)}</span>` : ""}</div>
                <span class="pill done">${esc(p.price)}</span></div>`).join("")}
            <a class="btn" href="https://zalo.me/0961923983" target="_blank" rel="noopener"
               style="text-decoration:none; display:inline-block; margin-top:0.8rem;">💬 ${T("contact_upgrade")}</a>
            <div style="margin-top:0.7rem;"><button class="ghost" id="upg-close">${T("close")}</button></div>
          </div>`;
        document.body.appendChild(ov);
        ov.addEventListener("click", e => { if (e.target === ov) ov.remove(); });
        ov.querySelector("#upg-close").addEventListener("click", () => ov.remove());
      };

      const done = new Set((mine || []).filter(p => p.status === "completed").map(p => p.lesson_id));

      const withLms = l => l.url + (l.url.includes("?") ? "&" : "?") + "lms=" + l.id;

      const lessonRow = l => `
        <div class="lesson">
          <span class="icon">${iconFor(l.kind)}</span>
          <div class="meta">
            <div class="title">${esc(l.title)}</div>
            <span class="kind">${esc(l.kind)}</span>
          </div>
          ${premLocked.has(l.id)
            ? `<button class="ghost prem-btn" data-lesson="${l.id}">👑 Premium</button>`
            : l.storage_path
            ? `<button class="ghost open-file" data-lesson="${l.id}" data-path="${esc(l.storage_path)}">${t("open")}</button>`
            : `<a class="btn ghost open-link" data-lesson="${l.id}" href="${esc(withLms(l))}" target="_blank" rel="noopener">${t("open")}</a>`}
          ${done.has(l.id)
            ? `<span class="pill done">${t("completed_pill")}</span>`
            : `<button data-lesson="${l.id}" class="mark">${t("mark_done")}</button>`}
        </div>`;

      // status filter chips (All / In progress / Completed)
      let chip = "all";
      try { chip = localStorage.getItem("hub_chip") || "all"; } catch (e) {}
      const chipPass = l => chip === "all" ? true
        : (chip === "done" ? done.has(l.id) : !done.has(l.id));

      // Which lessons are locked? In a "sequential" course, everything
      // after the first uncompleted lesson is locked.
      const lockedSet = new Set();
      for (const c of (courses || [])) {
        if (!c.sequential) continue;
        const ls = (lessons || []).filter(l => l.course_id === c.id);
        const fi = ls.findIndex(x => !done.has(x.id));
        if (fi === -1) continue;
        ls.forEach((l, i) => { if (i > fi) lockedSet.add(l.id); });
      }
      const fmtDur = m => m >= 60
        ? Math.floor(m / 60) + "h" + (m % 60 ? " " + (m % 60) + "m" : "")
        : m + " min";

      // One roadmap card per course, grouped into collapsible categories.
      const courseCard = c => {
        const ls = (lessons || []).filter(l => l.course_id === c.id);
        const doneCount = ls.filter(l => done.has(l.id)).length;
        const pct = ls.length ? Math.round(doneCount / ls.length * 100) : 0;
        const complete = ls.length > 0 && doneCount === ls.length;
        const color = c.color || "#1e4f8f";
        const firstOpen = ls.findIndex(x => !done.has(x.id));
        const minsLeft = ls.filter(l => !done.has(l.id))
          .reduce((s, l) => s + (l.est_minutes || 0), 0);

        const BADGES = [["🌱", 25], ["⭐", 50], ["🏅", 75], ["🏆", 100]];
        const badgeRow = ls.length ? `
          <div class="badges">
            ${BADGES.map(([b, th]) =>
              `<span class="b ${pct >= th ? "earned" : ""}" title="${th}%">${b}</span>`).join("")}
            ${minsLeft ? `<span class="kind" style="margin-left:auto;">${tf("time_left", { t: fmtDur(minsLeft) })}</span>` : ""}
          </div>` : "";

        const rows = ls.map((l, i) => {
          if (!chipPass(l)) return "";
          const isDone = done.has(l.id);
          const isLocked = lockedSet.has(l.id);
          const isCurrent = !isDone && !isLocked && c.sequential && i === firstOpen;
          const nodeStyle = isDone
            ? `style="background:${esc(color)};border-color:${esc(color)};"`
            : (isCurrent ? `style="border-color:${esc(color)};"` : "");
          const node = `<span class="node ${isDone ? "done" : ""} ${isCurrent ? "current" : ""}" ${nodeStyle}>${isDone ? "✓" : i + 1}</span>`;
          const meta = `
            <div class="meta">
              <div class="title">${esc(l.title)}</div>
              <span class="kind">${esc(l.kind)}${l.est_minutes ? " · ~" + l.est_minutes + " min" : ""}${isLocked ? " · " + t("locked_hint") : ""}</span>
            </div>`;
          const actions = isLocked
            ? `<span class="pill todo">🔒 ${t("locked")}</span>`
            : premLocked.has(l.id)
            ? `<button class="ghost prem-btn" data-lesson="${l.id}">👑 Premium</button>`
            : `${l.storage_path
                ? `<button class="ghost open-file" data-lesson="${l.id}" data-path="${esc(l.storage_path)}">${t("open")}</button>`
                : `<a class="btn ghost open-link" data-lesson="${l.id}" href="${esc(withLms(l))}" target="_blank" rel="noopener">${t("open")}</a>`}
              ${isDone
                ? `<span class="pill done">${t("completed_pill")}</span>`
                : `<button data-lesson="${l.id}" class="mark">${t("mark_done")}</button>`}`;
          return `<div class="lesson ${isLocked ? "locked" : ""}">${node}${meta}${actions}</div>`;
        }).join("");

        return `
          <div class="card course-card" id="course-${c.id}" style="border-top:4px solid ${esc(color)};">
            ${c.banner_url
              ? `<div class="course-banner" style="background-image:url('${esc(c.banner_url)}');"></div>`
              : `<div class="course-banner" style="background:linear-gradient(120deg, ${esc(color)}, ${esc(color)}b3);">${esc(c.icon || "📚")}</div>`}
            <h2>${c.icon ? esc(c.icon) + " " : ""}${esc(c.title)}
              <span class="kind" style="float:right;">${tf("done_count", { d: doneCount, t: ls.length })}</span></h2>
            <div class="progress"><span style="width:${pct}%; background:${esc(color)};"></span></div>
            ${badgeRow}
            ${c.description ? `<p style="color:var(--muted); font-size:0.88rem; margin:0 0 0.5rem;">${esc(c.description)}</p>` : ""}
            <div class="roadmap">${rows || `<p class="empty">${t("no_lessons_course")}</p>`}</div>
            ${complete ? `<div class="congrats">🎉 <span style="flex:1;">${esc(c.title)}${t("congrats")}</span>
              <button class="ghost cert-btn" data-course="${esc(c.title)}" style="flex:none;">🎓 ${T2c("cert_get")}</button></div>` : ""}
          </div>`;
      };

      // ---- study statistics ----
      const dloc = d => d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
      const lastNDays = n => { const out = []; for (let i = n - 1; i >= 0; i--) { const d = new Date(); d.setDate(d.getDate() - i); out.push(dloc(d)); } return out; };
      const dayMin = {}, activeDates = new Set();
      (myActs || []).forEach(r => {
        if (r.updated_at) activeDates.add(String(r.updated_at).slice(0, 10));
        if (r.kind === "time" && r.key && r.key.startsWith("d:")) {
          const d = r.key.slice(2);
          dayMin[d] = (dayMin[d] || 0) + Math.round((Number(r.value) || 0) / 60);
          activeDates.add(d);
        }
      });
      (mine || []).forEach(p => { if (p.updated_at) activeDates.add(String(p.updated_at).slice(0, 10)); });
      const totalSecs = (myActs || []).filter(r => r.kind === "time" && r.key === "total")
        .reduce((s, r) => s + (Number(r.value) || 0), 0);
      const weekMin = lastNDays(7).reduce((s, d) => s + (dayMin[d] || 0), 0);
      const monthMin = lastNDays(30).reduce((s, d) => s + (dayMin[d] || 0), 0);
      let curStreak = 0;
      { const d = new Date(); while (activeDates.has(dloc(d))) { curStreak++; d.setDate(d.getDate() - 1); } }
      let longestStreak = 0;
      { let run = 0, prev = null;
        [...activeDates].sort().forEach(x => {
          if (prev) { const p = new Date(prev); p.setDate(p.getDate() + 1); run = dloc(p) === x ? run + 1 : 1; }
          else run = 1;
          longestStreak = Math.max(longestStreak, run); prev = x;
        }); }
      const doneAll = (mine || []).filter(p => p.status === "completed").length;
      const week7 = lastNDays(7);
      const weekDone = (mine || []).filter(p => p.status === "completed" && p.updated_at &&
        week7.includes(String(p.updated_at).slice(0, 10))).length;
      const GOAL = 3;
      const xp = doneAll * 50 + Math.round(totalSecs / 60);
      const level = 1 + Math.floor(xp / 500);
      let badgesEarned = 0;
      (courses || []).forEach(c => {
        const ls = (lessons || []).filter(l => l.course_id === c.id);
        if (!ls.length) return;
        const pct = Math.round(ls.filter(l => done.has(l.id)).length / ls.length * 100);
        [25, 50, 75, 100].forEach(th => { if (pct >= th) badgesEarned++; });
      });
      const fmtHM = s => { const m = Math.round(s / 60); return m >= 60 ? Math.floor(m / 60) + "h " + (m % 60) + "m" : m + " min"; };
      const enc = curStreak >= 3 ? tf("enc_streak", { n: curStreak })
        : ((weekMin > 0 || weekDone > 0) ? t("enc_keep") : t("enc_start"));
      const chartDays = lastNDays(7).map(d => ({
        d, m: dayMin[d] || 0,
        wd: new Date(d + "T12:00:00").toLocaleDateString(LANG === "vi" ? "vi-VN" : "en-US", { weekday: "short" })
      }));
      const maxM = Math.max(1, ...chartDays.map(x => x.m));
      const chart = `<div class="mini-chart">${chartDays.map(x =>
        `<div class="bar" title="${x.d}: ${x.m} min"><span style="height:${Math.max(4, Math.round(x.m / maxM * 100))}%; ${x.m ? "" : "background:var(--line);"}"></span><i>${esc(x.wd)}</i></div>`).join("")}</div>`;
      const statx = (k, v, sub) =>
        `<div class="stat"><div class="k">${k}</div><div class="v">${v}</div>${sub ? `<div class="sub">${sub}</div>` : ""}</div>`;
      const gPct = Math.min(100, Math.round(weekDone / GOAL * 100));
      const statsCard = `
        <div class="card">
          <h2>${t("my_progress")} <span class="kind" style="float:right;">Lv ${level} · ${xp} XP</span></h2>
          <div class="stat-grid" style="margin-bottom:0.5rem;">
            ${statx("🔥 " + t("streak"), curStreak, longestStreak > curStreak ? "max " + longestStreak : "")}
            ${statx(t("total_time"), fmtHM(totalSecs))}
            ${statx(t("this_week"), weekMin + " min", monthMin + " min " + t("this_month"))}
            ${statx(t("lessons_done"), doneAll)}
            ${statx(t("weekly_goal"), weekDone + "/" + GOAL,
              `<div class="progress" style="margin:0.35rem 0 0;"><span style="width:${gPct}%;"></span></div>`)}
            ${statx("🏅 " + t("badges_earned"), badgesEarned)}
          </div>
          <span class="kind">${t("last7")}</span>
          ${chart}
          <p class="kind" style="margin:0.3rem 0 0;">${enc}</p>
        </div>`;

      // ---- continue learning / next up ----
      const findL = id => (lessons || []).find(x => x.id === id);
      const lastByLesson = {};
      (myActs || []).forEach(r => {
        if (!r.updated_at || !r.lesson_id) return;
        if (!lastByLesson[r.lesson_id] || r.updated_at > lastByLesson[r.lesson_id])
          lastByLesson[r.lesson_id] = r.updated_at;
      });
      let contLesson = null, contIsNext = false;
      const cands = Object.entries(lastByLesson)
        .map(([id, ts]) => ({ l: findL(id), ts }))
        .filter(x => x.l && !done.has(x.l.id) && !lockedSet.has(x.l.id))
        .sort((a, b) => b.ts.localeCompare(a.ts));
      if (cands.length) contLesson = cands[0].l;
      else {
        for (const c of (courses || [])) {
          const ls = (lessons || []).filter(l => l.course_id === c.id);
          const nxt = ls.find(l => !done.has(l.id) && !lockedSet.has(l.id));
          if (nxt) { contLesson = nxt; contIsNext = true; break; }
        }
      }
      const contCourse = contLesson
        ? ((courses || []).find(c => c.id === contLesson.course_id)?.title || t("other_lessons")) : "";
      const heroCard = contLesson ? `
        <div class="card" style="background:linear-gradient(135deg,#1e4f8f,#153a6b); color:#fff; border:none;">
          <p class="eyebrow" style="color:rgba(255,255,255,0.72);">${contIsNext ? t("next_up") : t("continue_learning")}</p>
          <div style="display:flex; gap:1rem; align-items:center; flex-wrap:wrap;">
            <div style="flex:1; min-width:200px;">
              <div style="font-family:var(--serif); font-size:1.3rem; font-weight:600;">${esc(contLesson.title)}</div>
              <span style="opacity:0.78; font-size:0.85rem;">${esc(contCourse)}${contLesson.est_minutes ? " · ~" + contLesson.est_minutes + " min" : ""}</span>
            </div>
            <button id="cont-open" style="background:#fff; color:#153a6b; border-color:#fff;">
              ${contIsNext ? t("start_learning") : t("continue_learning")} →</button>
          </div>
        </div>` : "";

      const chipRow = `
        <div class="chip-row">

      const hubFooter = `<footer class="hub-footer">Designed by Thầy Lê Quốc Thông · 📞 Zalo: 0961 923 983</footer>`;

      const { data: me } = await sb
        .from("profiles").select("full_name, bio, avatar_url, access_expires, org_id").eq("id", user.id).single();

      const discCard = (courses || []).length ? `

              ${(courses || []).map(c => `<option value="${c.id}">${esc(c.title)}</option>`).join("")}
            </select></h2>
          <div id="dc-body"></div>
        </div>` : "";

      // upcoming class sessions (next hour onwards, max 5)
      const upSess = (mySessions || []).filter(s =>

      const schedCard = upSess.length ? `
        <div class="card" style="border-top:4px solid var(--tone-cyan);">
          <h2>🗓️ ${T2c("upcoming")}</h2>
          ${upSess.map(s => `

              <div class="meta">
                <div class="title">${esc(s.title)}</div>
                <span class="kind">${new Date(s.starts_at).toLocaleString()} · ${s.duration_min || 60} min${
                  s.course_id ? " · " + esc((courses || []).find(c => c.id === s.course_id)?.title || "") : ""}${
                  s.notes ? " · " + esc(s.notes) : ""}</span>
              </div>
              ${s.location ? (/^https?:\/\//.test(s.location)

            </div>`).join("")}
        </div>` : "";

      const matsCard = (myMats || []).length ? `
        <div class="card" style="border-top:4px solid var(--tone-amber);">

          ${(myMats || []).map(m => `
            <div class="lesson">
              <span class="icon">${m.storage_path ? "📎" : "🔗"}</span>
              <div class="meta">
                <div class="title">${esc(m.title)}</div>
                <span class="kind">${esc((courses || []).find(c => c.id === m.course_id)?.title || "")}</span>
              </div>
              <button class="ghost mat-open" data-id="${m.id}">${T2c("open_btn")}</button>
            </div>`).join("")}
        </div>` : "";

      // suggested review: lessons whose best quiz score is under 70%
      const bestScore = {};
      (myActs || []).forEach(r => {
        if (r.kind === "activity" && r.key !== "opened" && Number(r.max_value) > 1) {
          const ratio = (Number(r.value) || 0) / Number(r.max_value);
          if (!(r.lesson_id in bestScore) || ratio > bestScore[r.lesson_id])
            bestScore[r.lesson_id] = ratio;
        }
      });
      const reviewList = Object.entries(bestScore)
        .filter(([lid, rt]) => rt < 0.7 && findL(lid))
        .sort((a, b) => a[1] - b[1]).slice(0, 3);
      const reviewCard = reviewList.length ? `
        <div class="card" style="border-top:4px solid var(--tone-rose);">
          <h2>💡 ${T2c("review_title")}</h2>
          <p class="kind" style="margin:0 0 0.4rem;">${T2c("review_hint")}</p>
          ${reviewList.map(([lid, rt]) => `
            <div class="lesson">
              <div class="meta">
                <div class="title">${esc(findL(lid).title)}</div>
                <span class="kind">${Math.round(rt * 100)}%</span>
              </div>
              <button class="ghost rev-open" data-id="${lid}">${T2c("review_go")}</button>
            </div>`).join("")}
        </div>` : "";

      const T2p = window.UI ? UI.t2 : (k => k);

      const premBar = isPremUser
        ? `<p class="kind" style="margin:-0.4rem 0 0.9rem;">👑 ${T2p("premium_active")}${mePlan?.premium_until ? " → " + esc(mePlan.premium_until) : ""}</p>`
        : (anyPremiumContent ? `
          <div class="alert-bar" style="display:flex; gap:0.6rem; align-items:center; flex-wrap:wrap;">
            <span style="flex:1;">👑 ${T2p("upgrade_hint")}</span>
            <button id="upg-open" class="ghost" style="flex:none;">${T2p("upgrade")}</button>
          </div>` : "");

      app.innerHTML = `
        <p class="eyebrow">${t("my_lessons")}</p>
        <h1>${t("welcome")}${me?.full_name ? ", " + esc(me.full_name) : ""}</h1>
        ${accessNote}
        ${premBar}
        ${heroCard}
        ${schedCard}
        ${statsCard}
        <div class="search-wrap">
          <input id="hub-search" placeholder="${esc(t("search_ph"))}" autocomplete="off" />
          <div id="search-results" class="search-results" style="display:none;"></div>
        </div>
        ${annCard}
        ${asgnCard}
        ${discCard}
        ${matsCard}
        ${reviewCard}
        ${chipRow}
        ${catSections || `<div class="card"><p class="empty">${t("not_enrolled")}</p></div>`}
        ${looseCard}
        ${instructorCard}
        ${profileCard}
        ${hubFooter}`;

      document.getElementById("p-save").addEventListener("click", async () => {
        const m = document.getElementById("p-msg");
        const full_name = document.getElementById("p-name").value.trim() || null;
        const bio = document.getElementById("p-bio").value.trim() || null;
        const { error } = await sb.from("profiles").update({ full_name, bio }).eq("id", user.id);
        m.className = "msg" + (error ? " err" : "");
        m.textContent = error ? t("err_save") + error.message : t("saved");
        if (!error) who.textContent = full_name || user.email;
      });

      document.getElementById("p-pick").addEventListener("click", () =>
        document.getElementById("p-file").click());

      document.getElementById("p-file").addEventListener("change", async (e) => {
        const file = e.target.files[0];
        const m = document.getElementById("p-msg");
        if (!file) return;
        if (file.size > 2 * 1024 * 1024) {
          m.textContent = t("img_too_big"); m.className = "msg err"; return;
        }
        m.textContent = t("uploading"); m.className = "msg";
        const path = user.id + "/avatar";
        const { error: upErr } = await sb.storage.from("avatars")
          .upload(path, file, { upsert: true, contentType: file.type });
        if (upErr) { m.textContent = t("upload_failed") + upErr.message; m.className = "msg err"; return; }
        const { data } = sb.storage.from("avatars").getPublicUrl(path);
        const avatar_url = data.publicUrl + "?v=" + Date.now();
        const { error } = await sb.from("profiles").update({ avatar_url }).eq("id", user.id);
        if (error) { m.textContent = t("err_save") + error.message; m.className = "msg err"; return; }
        renderStudent();
      });

      // --- premium locks + upgrade ---
      app.querySelectorAll(".prem-btn").forEach(btn => btn.addEventListener("click", () => {
        logLock(btn.getAttribute("data-lesson"));
        showUpgrade();

      document.getElementById("upg-open")?.addEventListener("click", showUpgrade);

      // --- assignment submissions ---
      app.querySelectorAll(".as-submit").forEach(btn => btn.addEventListener("click", async () => {
        const aid = btn.getAttribute("data-id");
        const body = app.querySelector(`.as-body[data-id="${aid}"]`).value.trim();
        const T = window.UI ? UI.t2 : (k => k);
        if (!body) {
          if (window.UI) UI.toast(T("write_answer"), "err"); else alert(T("write_answer"));
          return;
        }
        btn.disabled = true;
        const { error } = await sb.from("submissions").upsert({
          assignment_id: aid, student_id: user.id, body,
          status: "submitted", submitted_at: new Date().toISOString()
        }, { onConflict: "assignment_id,student_id" });
        btn.disabled = false;
        if (error) {
          if (window.UI) UI.toast(T("err_save") + error.message, "err");
          else alert(T("err_save") + error.message);
          return;
        }
        if (window.UI) UI.toast(T("answer_saved"));
        renderStudent();
      }));

      // --- teacher materials (signed links) ---
      app.querySelectorAll(".mat-open").forEach(btn => btn.addEventListener("click", async () => {
        const m = (myMats || []).find(x => x.id === btn.getAttribute("data-id"));
        if (!m) return;
        if (m.storage_path) {
          btn.disabled = true;
          const { data, error } = await sb.storage.from("teacher-materials")
            .createSignedUrl(m.storage_path, 3600);

          window.open(data.signedUrl, "_blank", "noopener");

      app.querySelectorAll(".cert-btn").forEach(btn => btn.addEventListener("click", () => {

          <div style="max-width:680px; width:100%;">

              <p style="margin:0;">${T2c("cert_awarded")}</p>
              <div class="c-name">${esc(studentName)}</div>
              <p style="margin:0.3rem 0 0;">${T2c("cert_completed")}</p>
              <div class="c-course">${esc(courseTitle)}</div>
              <div class="c-foot">
                <span>${T2c("cert_date")}: ${new Date().toLocaleDateString()}</span>
                <span>Thầy Lê Quốc Thông · Master of TESOL</span>
              </div>

            </div>

        document.getElementById("cert-print").addEventListener("click", () => {
          document.body.classList.add("print-cert");

          setTimeout(() => document.body.classList.remove("print-cert"), 600);

      // --- course discussions ---

        const myName2 = me?.full_name || user.email;
        if (window.__dcC && [...sel.options].some(o => o.value === window.__dcC)) sel.value = window.__dcC;

        async function renderDisc() {
          const box = document.getElementById("dc-body");
          if (!box) return;
          const cid = sel.value;
          window.__dcC = cid;

          if (!window.__dcT) {
            const [{ data: threads }, { data: pc }] = await Promise.all([
              sb.from("discussion_threads").select("*").eq("course_id", cid)
                .order("pinned", { ascending: false }).order("created_at", { ascending: false }),
              sb.from("discussion_posts").select("id, thread_id")
            ]);
            const nP = id => (pc || []).filter(p => p.thread_id === id).length;

              <div class="form-row" style="margin-bottom:0.8rem;">
                <div class="field"><input id="dq-title" placeholder="${esc(T("question_ph"))}" /></div>
                <div class="field"><input id="dq-body" placeholder="${esc(T("first_msg"))}" /></div>
                <button id="dq-ask">${T("ask")}</button>
              </div>
              ${(threads || []).map(th => `
                <div class="lesson thread-row" data-id="${th.id}" style="cursor:pointer;">
                  <span class="icon">${th.pinned ? "📌" : "💬"}</span>
                  <div class="meta">
                    <div class="title">${esc(th.title)}</div>
                    <span class="kind">${esc(th.author_name || "—")} · ${new Date(th.created_at).toLocaleDateString()} ·
                      ${nP(th.id)} ${T("replies")}${th.locked ? " · 🔒" : ""}</span>
                  </div>
                </div>`).join("") || `<p class="empty">${T("no_threads")}</p>`}`;

              window.__dcT = r.getAttribute("data-id"); renderDisc();
            }));
            document.getElementById("dq-ask").addEventListener("click", async () => {
              const title = document.getElementById("dq-title").value.trim();
              const bodyTxt = document.getElementById("dq-body").value.trim();
              if (!title || !bodyTxt) { if (window.UI) UI.toast(T("need_q"), "err"); return; }
              const { data: th, error } = await sb.from("discussion_threads").insert({
                course_id: cid, org_id: me?.org_id || null, author_id: user.id,
                author_name: myName2, title }).select().single();
              if (error) { if (window.UI) UI.toast(T("err_post") + error.message, "err"); return; }

                thread_id: th.id, author_id: user.id, author_name: myName2, body: bodyTxt });

              renderDisc();
            });
          } else {
            const [{ data: th }, { data: posts }] = await Promise.all([
              sb.from("discussion_threads").select("*").eq("id", window.__dcT).single(),
              sb.from("discussion_posts").select("*").eq("thread_id", window.__dcT).order("created_at")

            if (!th) { window.__dcT = null; renderDisc(); return; }
            box.innerHTML = `
              <button class="ghost" id="dc-back" style="margin-bottom:0.7rem;">${T("back_list")}</button>

              ${(posts || []).map(p => `
                <div class="post">
                  <span class="kind">${esc(p.author_name || "—")} · ${new Date(p.created_at).toLocaleString()}</span>
                  <p>${esc(p.body)}</p>
                </div>`).join("")}

      });

      const sIndex = [
        ...(anns || []).map(a => ({ type: "ann", title: stripHtml(a.body).slice(0, 70) || "🖼", sub: t("announcements"), obj: a })),
        ...(courses || []).map(c => ({ type: "course", title: c.title, sub: c.category || "", obj: c })),
        ...(lessons || []).map(l => ({
          type: "lesson", title: l.title,
          sub: (courses || []).find(c => c.id === l.course_id)?.title || t("other_lessons"), obj: l
        }))
      ];
      const hiLite = (text, q) => {
        const i = text.toLowerCase().indexOf(q.toLowerCase());
        if (i < 0) return esc(text);
        return esc(text.slice(0, i)) + "<mark>" + esc(text.slice(i, i + q.length)) + "</mark>" + esc(text.slice(i + q.length));
      };
      const logOpen = lid => {
        const ua = navigator.userAgent;
        const dtp = /iPad|Tablet/i.test(ua) ? "tablet"
          : (/Mobi|iPhone|Android.*Mobile/i.test(ua) ? "mobile" : "desktop");
        let dt = null; try { dt = localStorage.getItem("hub_device"); } catch (e) {}
        sb.from("access_events").insert({
          student_id: user.id, lesson_id: lid, event: "lesson_open",
          device: dt, device_type: dtp, agent: ""
        }).then(() => {});
      };
      const openLesson = l => {
        if (lockedSet.has(l.id)) { alert(t("locked_hint")); return; }

        if (l.storage_path) logOpen(l.id);   // tracked pages log themselves
        sb.from("lesson_activity").upsert({
          student_id: user.id, lesson_id: l.id, kind: "activity",
          key: "opened", value: 1, max_value: 1, updated_at: new Date().toISOString()
        }, { onConflict: "student_id,lesson_id,kind,key" }).then(() => {});
        if (l.storage_path) {
          sb.storage.from("materials").createSignedUrl(l.storage_path, 3600)

        } else window.open(withLms(l), "_blank", "noopener");

      app.querySelectorAll(".rev-open").forEach(btn => btn.addEventListener("click", () => {

      sInput.addEventListener("input", () => {
        const q = sInput.value.trim();
        if (!q) { sBox.style.display = "none"; sBox.innerHTML = ""; return; }
        const nq = normTxt(q);
        const hits = sIndex.filter(it => normTxt(it.title).includes(nq) || normTxt(it.sub).includes(nq)).slice(0, 8);
        sBox.innerHTML = hits.length

      // ---- rich text editor wiring ----
      const rte = document.getElementById("a-body");
      let savedRange = null;
      const saveSel = () => {
        const s = window.getSelection();
        if (s.rangeCount && rte.contains(s.anchorNode)) savedRange = s.getRangeAt(0);
      };
      const restoreSel = () => {
        if (!savedRange) return;
        const s = window.getSelection();
        s.removeAllRanges(); s.addRange(savedRange);
      };
      rte.addEventListener("keyup", saveSel);
      rte.addEventListener("mouseup", saveSel);
      try { document.execCommand("styleWithCSS", false, true); } catch (e) {}
      const exec = (cmd, val) => {
        rte.focus(); restoreSel();
        document.execCommand(cmd, false, val ?? null);
        saveSel();
      };

      document.querySelectorAll("#rte-bar button[data-cmd]").forEach(b => {
        b.addEventListener("mousedown", e => e.preventDefault());
        b.addEventListener("click", () => exec(b.getAttribute("data-cmd")));
      });
      document.getElementById("rte-block").addEventListener("change", e => {
        if (e.target.value) { exec("formatBlock", e.target.value); e.target.value = ""; }
      });
      document.getElementById("rte-size").addEventListener("change", e => {
        if (e.target.value) { exec("fontSize", e.target.value); e.target.value = ""; }
      });
      document.getElementById("rte-fore").addEventListener("input", e => exec("foreColor", e.target.value));
      document.getElementById("rte-back").addEventListener("input", e => exec("hiliteColor", e.target.value));
      document.getElementById("rte-link").addEventListener("click", () => {
        const url = prompt("Link URL:", "https://");
        if (url && url !== "https://") exec("createLink", url);
      });

      // image upload → announcements bucket → insert at cursor
      const rteFile = document.getElementById("rte-file");
      document.getElementById("rte-img").addEventListener("click", () => rteFile.click());
      rteFile.addEventListener("change", async e => {
        const f = e.target.files[0]; rteFile.value = "";
        if (!f) return;
        if (f.size > 3 * 1024 * 1024) { alert("Images must be under 3 MB."); return; }
        const path = Date.now() + "-" + f.name.replace(/[^a-zA-Z0-9._-]/g, "_");
        const { error } = await sb.storage.from("announcements")
          .upload(path, f, { contentType: f.type });
        if (error) { alert("Upload failed: " + error.message); return; }
        const { data } = sb.storage.from("announcements").getPublicUrl(path);
        exec("insertImage", data.publicUrl);
      });

      // click an image to select it → resize / align / alt / remove
      let selImg = null;
      const imgTools = document.getElementById("img-tools");
      rte.addEventListener("click", e => {
        rte.querySelectorAll("img.sel").forEach(i => i.classList.remove("sel"));
        if (e.target.tagName === "IMG") {
          selImg = e.target;
          selImg.classList.add("sel");
          imgTools.style.display = "flex";
        } else { selImg = null; imgTools.style.display = "none"; }
      });
      imgTools.querySelectorAll("[data-w]").forEach(b => b.addEventListener("click", () => {
        if (selImg) { selImg.style.width = b.getAttribute("data-w") + "%"; selImg.style.height = "auto"; }
      }));
      imgTools.querySelectorAll("[data-a]").forEach(b => b.addEventListener("click", () => {
        if (!selImg) return;
        const a = b.getAttribute("data-a");
        selImg.style.float = ""; selImg.style.display = ""; selImg.style.margin = "";
        if (a === "left")   { selImg.style.float = "left";  selImg.style.margin = "0 1rem 0.5rem 0"; }
        if (a === "right")  { selImg.style.float = "right"; selImg.style.margin = "0 0 0.5rem 1rem"; }
        if (a === "center") { selImg.style.display = "block"; selImg.style.margin = "0.5rem auto"; }
      }));
      document.getElementById("img-alt").addEventListener("click", () => {
        if (!selImg) return;
        const alt = prompt("Describe this image (alt text):", selImg.alt || "");
        if (alt !== null) selImg.alt = alt;
      });
      document.getElementById("img-del").addEventListener("click", () => {
        if (selImg) { selImg.remove(); selImg = null; imgTools.style.display = "none"; }

      // preview toggle

        rte.querySelectorAll("img.sel").forEach(i => i.classList.remove("sel"));
        document.getElementById("rte-prevbody").innerHTML = rte.innerHTML;
        prevBox.style.display = "block";
      });

      document.getElementById("a-add").addEventListener("click", async () => {
        rte.querySelectorAll("img.sel").forEach(i => i.classList.remove("sel"));
        const body = rte.innerHTML.trim();
        const course_id = document.getElementById("a-course").value || null;

        const { error } = await sb.from("announcements").insert({ body, course_id, author_id: user.id });

        renderAdmin();

      app.querySelectorAll(".a-del").forEach(btn => {

          if (error) { btn.disabled = false; alert("Could not delete: " + error.message); return; }
          renderAdmin();

      // ---- share keys ----
      document.getElementById("sk-add").addEventListener("click", async () => {
        const label = document.getElementById("sk-label").value.trim();
        const course_id = document.getElementById("sk-course").value;
        const expires = document.getElementById("sk-exp").value || null;
        const m = document.getElementById("sk-msg");

        if (!course_id) { m.textContent = "Pick the course this key unlocks."; m.className = "msg err"; return; }
        const token = crypto.randomUUID().replace(/-/g, "");
        const { error } = await sb.from("share_keys").insert({ token, label, course_id, expires });
        if (error) { m.textContent = "Could not create: " + error.message; m.className = "msg err"; return; }

      app.querySelectorAll(".sk-toggle").forEach(btn => btn.addEventListener("click", async () => {

        const { error } = await sb.from("share_keys").update({ active: !k.active }).eq("id", k.id);
        if (error) { alert("Could not update: " + error.message); return; }
        renderAdmin();
      }));

      app.querySelectorAll(".sk-del").forEach(btn => btn.addEventListener("click", async () => {

        out.value = "Share links for: " + k.label + " (" + (courseName(k.course_id) || "") + ")\n" +
          (k.expires ? "Valid until " + k.expires : "No expiry") + "\n" +
          "Note: only linked HTML lessons can be shared this way (uploaded files are excluded).\n\n" +

      app.querySelectorAll(".tabs button").forEach(b =>
        b.addEventListener("click", () => showTab(b.getAttribute("data-tab"))));
      showTab(adminTab);

      // --- drag & drop upload zone ---
      const drop = document.getElementById("l-drop");
      const fileInput = document.getElementById("l-file");
      const dropText = document.getElementById("l-drop-text");
      const dropDefault = dropText.innerHTML;
      const allowedExt = ["pdf","doc","docx","ppt","pptx","xls","xlsx","csv","txt",
                          "png","jpg","jpeg","webp","gif","mp3","wav","m4a","mp4","html"];

      function refreshDrop() {
        const f = fileInput.files[0];
        if (!f) { dropText.innerHTML = dropDefault; return; }
        dropText.innerHTML =
          `📄 <span class="file-picked">${esc(f.name)}</span>` +
          ` <span class="kind">(${(f.size / 1024 / 1024).toFixed(1)} MB)</span>` +
          `<span class="file-remove" id="l-file-remove">remove</span>`;
        // Autofill the title from the file name if it's still empty.
        const titleBox = document.getElementById("l-title");
        if (!titleBox.value.trim()) {
          titleBox.value = f.name.replace(/\.[^.]+$/, "").replace(/[_-]+/g, " ").trim();
        }
      }

      drop.addEventListener("click", (e) => {
        if (e.target.id === "l-file-remove") {
          fileInput.value = ""; refreshDrop(); return;
        }
        fileInput.click();
      });
      fileInput.addEventListener("change", refreshDrop);

      ["dragover", "dragenter"].forEach(ev =>
        drop.addEventListener(ev, (e) => { e.preventDefault(); drop.classList.add("dragover"); }));
      ["dragleave", "dragend"].forEach(ev =>
        drop.addEventListener(ev, () => drop.classList.remove("dragover")));
      drop.addEventListener("drop", (e) => {
        e.preventDefault();
        drop.classList.remove("dragover");
        const f = e.dataTransfer.files[0];
        if (!f) return;
        const ext = (f.name.split(".").pop() || "").toLowerCase();
        const m = document.getElementById("l-msg");
        if (!allowedExt.includes(ext)) {
          m.textContent = "That file type isn't supported. Use PDF, Word, PowerPoint, Excel, image, audio, video, text, or HTML.";
          m.className = "msg err"; return;
        }
        m.textContent = ""; m.className = "msg";
        fileInput.files = e.dataTransfer.files;
        refreshDrop();
      });

      document.getElementById("l-add").addEventListener("click", async () => {
        const title = document.getElementById("l-title").value.trim();
        const url = document.getElementById("l-url").value.trim();
        const file = document.getElementById("l-file").files[0] || null;
        const sort_order = parseInt(document.getElementById("l-order").value, 10) || 0;
        const est_minutes = parseInt(document.getElementById("l-min").value, 10) || null;
        const course_id = document.getElementById("l-course").value || null;
        const m = document.getElementById("l-msg");
        m.className = "msg";

        if (!title || (!url && !file)) {
          m.textContent = "Add a title, plus either a link or a file."; m.className = "msg err"; return;
        }
        if (file && file.size > 50 * 1024 * 1024) {

      // predefined swatches for quick color choice

      document.getElementById("nu-add").addEventListener("click", async () => {

      document.getElementById("e-add").addEventListener("click", async () => {

      app.querySelectorAll(".e-remove").forEach(btn => {
