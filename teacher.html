<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Teacher — Learning Ecology</title>
  <link rel="stylesheet" href="styles.css" />
  <script>
    /* apply dark mode before first paint: saved choice, else device preference */
    try { var __t = localStorage.getItem("hub_theme");
      if (__t === "dark" || (!__t && matchMedia("(prefers-color-scheme: dark)").matches))
        document.documentElement.setAttribute("data-theme", "dark");
    } catch (e) {}
  </script>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#17263e" />
  <link rel="icon" type="image/png" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" href="icons/icon-180.png" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Learning Ecology" />
</head>
<body>
  <header class="topbar">
    <span class="brand"><img src="icons/icon-192.png" alt="" />Learning Ecology</span>
    <div style="display:flex; align-items:center; gap:0.4rem;">
      <span id="bell-slot"></span>
      <button class="ghost" id="lang-btn"></button>
      <span class="who" id="who"></span>
      <button class="ghost" id="signout"></button>
    </div>
  </header>

  <main class="container" id="app"></main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="config.js"></script>
  <script src="ui.js"></script>
  <script>
    const { t2, toast, confirmDialog, promptDialog, skeleton, csv, icon,
            refreshIcons, wireLangButton, rerender, membership, memberBadge } = window.UI;
    const isPremRow = s => ["premium", "teacher-prem"].includes(membership(s).key);
    const app = document.getElementById("app");
    const who = document.getElementById("who");
    let user = null, myOrg = null, myName = "";
    let tab = localStorage.getItem("hub_teacher_tab") || "overview";
    let dcCourse = null, dcThread = null;   // discussions state

    document.getElementById("signout").textContent = t2("sign_out");
    document.getElementById("signout").addEventListener("click", async () => {
      await sb.auth.signOut();
      window.location.href = "login.html";
    });
    wireLangButton(document.getElementById("lang-btn"));

    function esc(s) {
      return String(s ?? "").replace(/[&<>"']/g, c =>
        ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" }[c]));
    }
    const fmtTime = s => !s ? "—" : (s < 60 ? "<1 min" : Math.round(s / 60) + " min");
    const nameOf = p => p?.full_name || p?.email || "—";

    async function callFn(payload) {
      const { data: { session } } = await sb.auth.getSession();
      const res = await fetch(SUPABASE_URL + "/functions/v1/manage-user", {
        method: "POST",
        headers: { "Content-Type": "application/json",
                   Authorization: "Bearer " + session.access_token,
                   apikey: SUPABASE_ANON_KEY },
        body: JSON.stringify(payload)
      });
      const out = await res.json();
      if (!res.ok || out.error) throw new Error(out.error || "Request failed");
      return out;
    }

    async function start() {
      app.innerHTML = skeleton(3);
      const { data: { session } } = await sb.auth.getSession();
      if (!session) { window.location.href = "login.html"; return; }
      user = session.user;
      const { data: me } = await sb.from("profiles")
        .select("full_name, role, org_id").eq("id", user.id).single();
      if (me?.role !== "teacher") { window.location.href = "dashboard.html"; return; }
      myOrg = me.org_id;
      myName = me.full_name || user.email;
      who.textContent = myName;
      window.UI.initBell(document.getElementById("bell-slot"));
      render();
    }

    async function render() {
      // RLS filters everything to this teacher's own courses/students.
      const [{ data: courses }, { data: lessons }, { data: enrollments },
             { data: students }, { data: prog }, { data: activity },
             { data: licenses }, { data: anns },
             { data: asgns }, { data: subs },
             { data: sess }, { data: mats },
             { data: orgRow }] = await Promise.all([
        sb.from("courses").select("*").order("sort_order").order("created_at"),
        sb.from("lessons").select("id, title, course_id, kind").order("sort_order"),
        sb.from("enrollments").select("id, student_id, course_id, created_at")
          .eq("teacher_id", user.id).order("created_at"),
        sb.from("profiles").select("id, full_name, email, avatar_url, access_expires, suspended, plan, premium_until")
          .eq("role", "student").order("created_at"),
        sb.from("progress").select("student_id, lesson_id, status, updated_at"),
        sb.from("lesson_activity").select("student_id, lesson_id, kind, key, value, max_value, updated_at"),
        sb.from("course_licenses").select("course_id, seats, expires_on"),
        sb.from("announcements").select("*").eq("author_id", user.id)
          .order("created_at", { ascending: false }),
        sb.from("assignments").select("*").eq("teacher_id", user.id)
          .order("created_at", { ascending: false }),
        sb.from("submissions").select("*"),
        sb.from("sessions").select("*").eq("teacher_id", user.id)
          .order("starts_at", { ascending: true }),
        sb.from("teacher_materials").select("*").eq("teacher_id", user.id)
          .order("created_at", { ascending: false }),
        sb.from("organizations").select("brand_color").limit(1)
      ]);

      if (orgRow?.[0]?.brand_color) window.UI.applyBrand(orgRow[0].brand_color);

      const cTitle = id => (courses || []).find(c => c.id === id)?.title || "—";
      const sById = id => (students || []).find(s => s.id === id);
      const seatUse = cid => (enrollments || []).filter(e => e.course_id === cid).length;
      const licOf = cid => (licenses || []).find(l => l.course_id === cid);

      const timeBy = {}, doneBy = {}, lastBy = {};
      (activity || []).forEach(a => {
        if (a.kind === "time" && a.key === "total")
          timeBy[a.student_id] = (timeBy[a.student_id] || 0) + (Number(a.value) || 0);
        if (a.updated_at && (!lastBy[a.student_id] || a.updated_at > lastBy[a.student_id]))
          lastBy[a.student_id] = a.updated_at;
      });
      (prog || []).forEach(p => {
        if (p.status === "completed") doneBy[p.student_id] = (doneBy[p.student_id] || 0) + 1;
        if (p.updated_at && (!lastBy[p.student_id] || p.updated_at > lastBy[p.student_id]))
          lastBy[p.student_id] = p.updated_at;
      });

      const myStudents = (students || []).filter(s =>
        (enrollments || []).some(e => e.student_id === s.id));
      const courseOptions = (courses || []).map(c =>
        `<option value="${c.id}">${esc(c.title)}</option>`).join("");
      const studentOptions = (students || []).map(s =>
        `<option value="${s.id}">${esc(nameOf(s))}</option>`).join("");

      // ---- attention banner: expiring licenses / full seats ----
      const today = new Date(); today.setHours(0,0,0,0);
      const expSoon = (licenses || []).filter(l => {
        if (!l.expires_on) return false;
        const d = Math.round((new Date(l.expires_on) - today) / 86400000);
        return d >= 0 && d <= 30;
      });
      const seatWarn = (licenses || []).filter(l =>
        l.seats && seatUse(l.course_id) >= l.seats * 0.8);
      const attention = (expSoon.length || seatWarn.length) ? `
        <div class="attention">${icon("alert-triangle")} <b>${t2("needs_attention")}</b>
          <ul>
            ${expSoon.map(l => `<li>${esc(cTitle(l.course_id))} — ${t2("license_until")} ${esc(l.expires_on)} (${t2("expiring_soon")})</li>`).join("")}
            ${seatWarn.map(l => `<li>${esc(cTitle(l.course_id))} — ${seatUse(l.course_id)}/${l.seats} ${t2("seats_used")}</li>`).join("")}
          </ul>
        </div>` : "";

      const stat = (k, v, sub) =>
        `<div class="stat"><div class="k">${k}</div><div class="v">${v}</div>${sub ? `<div class="sub">${sub}</div>` : ""}</div>`;

      const seatBar = lic => {
        if (!lic?.seats) return "";
        const used = seatUse(lic.course_id), pct = Math.min(100, Math.round(used / lic.seats * 100));
        const cls = pct >= 100 ? "full" : (pct >= 80 ? "warn" : "");
        return `<div class="seatbar ${cls}"><span style="width:${pct}%;"></span></div>`;
      };

      const courseCards = (courses || []).map(c => {
        const lic = licOf(c.id);
        return `
        <div class="lesson">
          <span style="width:14px;height:14px;border-radius:50%;background:${esc(c.color || "#1e4f8f")};flex:none;"></span>
          <div class="meta">
            <div class="title">${c.icon ? esc(c.icon) + " " : ""}${esc(c.title)}</div>
            <span class="kind">${(lessons || []).filter(l => l.course_id === c.id).length} ${t2("lessons")} ·
              ${seatUse(c.id)}${lic?.seats ? " / " + lic.seats : ""} ${t2("students").toLowerCase()}${
              lic?.expires_on ? " · " + t2("license_until") + " " + esc(lic.expires_on) : ""}</span>
            ${seatBar(lic)}
          </div>
        </div>`;
      }).join("");

      const progRows = (enrollments || []).flatMap(e =>
        (lessons || []).filter(l => l.course_id === e.course_id).map(l => {
          const p = (prog || []).find(x => x.student_id === e.student_id && x.lesson_id === l.id);
          return { sid: e.student_id, lesson: l, cid: e.course_id,
                   status: p?.status || "not_started", date: p?.updated_at };
        }));

      // per (student, lesson) engagement: study time + best quiz score
      const aggT = {}, aggS = {};
      (activity || []).forEach(a => {
        const k = a.student_id + "|" + a.lesson_id;
        if (a.kind === "time" && a.key === "total") aggT[k] = Number(a.value) || 0;
        if (a.kind === "activity" && a.key !== "opened" && Number(a.max_value) > 1) {
          const r = (Number(a.value) || 0) / Number(a.max_value);
          if (!(k in aggS) || r > aggS[k]) aggS[k] = r;
        }
      });

      // ---- per-student drill-down (printable) ----
      const studentDetailHtml = s => {
        const myEnr = (enrollments || []).filter(e => e.student_id === s.id);
        const courseBlocks = myEnr.map(e => {
          const ls = (lessons || []).filter(l => l.course_id === e.course_id);
          const rows = ls.map(l => {
            const k = s.id + "|" + l.id;
            const p = (prog || []).find(x => x.student_id === s.id && x.lesson_id === l.id);
            return `<tr><td>${esc(l.title)}</td>
              <td>${p?.status === "completed"
                ? `<span class="pill done">${t2("completed").toLowerCase()}</span>`
                : `<span class="kind">${t2(p ? "in_progress" : "not_started")}</span>`}</td>
              <td>${fmtTime(aggT[k] || 0)}</td>
              <td>${k in aggS ? Math.round(aggS[k] * 100) + "%" : "—"}</td></tr>`;
          }).join("");
          const done = ls.filter(l => (prog || []).some(p =>
            p.student_id === s.id && p.lesson_id === l.id && p.status === "completed")).length;
          const pct = ls.length ? Math.round(done / ls.length * 100) : 0;
          return `
            <h2 style="font-size:0.98rem; margin:0.8rem 0 0.25rem;">${esc(cTitle(e.course_id))}
              <span class="kind">${done}/${ls.length} · ${pct}%</span></h2>
            <div class="progress" style="max-width:220px; margin:0 0 0.5rem;"><span style="width:${pct}%;"></span></div>
            <table><thead><tr><th>${t2("lessons")}</th><th></th><th>${t2("time")}</th><th>${t2("score")}</th></tr></thead>
              <tbody>${rows}</tbody></table>`;
        }).join("");
        const mySb = (subs || []).filter(x => x.student_id === s.id);
        const aRows = mySb.map(x => {
          const a = (asgns || []).find(y => y.id === x.assignment_id);
          return `<tr><td>${esc(a?.title || "—")}</td>
            <td>${x.status === "graded" ? (x.grade ?? "—") + (a?.points ? " / " + a.points : "") : t2("submitted")}</td>
            <td>${esc(x.feedback || "—")}</td></tr>`;
        }).join("");
        return `
          <div style="display:flex; align-items:center; gap:0.7rem; flex-wrap:wrap;">
            <b>${esc(nameOf(s))}</b><span class="kind">${esc(s.email || "")}</span>
            <button class="ghost sd-print" data-id="${s.id}" style="margin-left:auto;">🖨 ${t2("print")}</button>
          </div>
          <p class="kind" style="margin:0.2rem 0 0;">${t2("generated")}: ${new Date().toLocaleDateString()} ·
            ${t2("total_time")}: ${fmtTime(timeBy[s.id] || 0)} ·
            ${t2("last_active")}: ${lastBy[s.id] ? new Date(lastBy[s.id]).toLocaleDateString() : t2("never")}</p>
          ${courseBlocks || `<p class="empty">${t2("no_data")}</p>`}
          ${aRows ? `
            <h2 style="font-size:0.98rem; margin-top:0.9rem;">${t2("asgn_grades")}</h2>
            <table><thead><tr><th>${t2("title_label")}</th><th>${t2("grade")}</th><th>${t2("feedback")}</th></tr></thead>
              <tbody>${aRows}</tbody></table>` : ""}`;
      };

      const tabs = [["overview", t2("overview")], ["students", t2("students")],
                    ["progress", t2("progress")], ["asgn", t2("asgn")],
                    ["disc", t2("disc")], ["sched", t2("schedule")],
                    ["announce", t2("announcements")]];

      app.innerHTML = `
        <p class="eyebrow">${t2("teacher")}</p>
        <h1>${t2("my_teaching")}</h1>

        <div class="tabpane" data-tab="overview">
          ${attention}
          <div class="stat-grid">
            ${stat(t2("my_courses"), (courses || []).length)}
            ${stat(t2("my_students"), myStudents.length)}
            ${stat(t2("lessons_completed"), (prog || []).filter(p => p.status === "completed").length, t2("by_students"))}
          </div>
          <div class="card">
            <div class="card-head"><h2>${icon("book-open", 18)} ${t2("my_courses")}</h2></div>
            ${courseCards || `<p class="empty">${t2("no_courses_assigned")}</p>`}
          </div>

          <div class="card">
            <div class="card-head"><h2>${icon("paperclip", 18)} ${t2("materials")}</h2></div>
            <div class="form-row">
              <div class="field"><label>${t2("title_label")}</label><input id="tm-title" /></div>
              <div class="field" style="max-width:200px;"><label>${t2("course")}</label>
                <select id="tm-course">${courseOptions || `<option value="">${t2("no_courses")}</option>`}</select></div>
              <div class="field"><label>${t2("link_label")}</label><input id="tm-url" placeholder="https://…" /></div>
              <div class="field" style="max-width:230px;"><label>&nbsp;</label>
                <input type="file" id="tm-file" style="padding:0.42rem;" /></div>
              <button id="tm-add">${t2("add_material")}</button>
            </div>
            ${(mats || []).map(m => `
              <div class="lesson">
                <span class="icon">${m.storage_path ? "📎" : "🔗"}</span>
                <div class="meta">
                  <div class="title">${esc(m.title)}</div>
                  <span class="kind">${esc(cTitle(m.course_id))} · ${m.storage_path ? t2("uploaded_file") : esc(m.url || "")}</span>
                </div>
                <button class="ghost tm-open" data-id="${m.id}">${t2("open_btn")}</button>
                <button class="ghost tm-del" data-id="${m.id}"
                        style="color:var(--danger); border-color:var(--danger);">${t2("delete_")}</button>
              </div>`).join("") || `<p class="empty">${t2("no_data")}</p>`}
          </div>
        </div>

        <div class="tabpane" data-tab="students">
          <div class="card">
            <div class="card-head"><h2>${icon("user-plus", 18)} ${t2("add_student")}</h2></div>
            <div class="form-row">
              <div class="field"><label>${t2("email")}</label><input id="ns-email" placeholder="student@example.com" /></div>
              <div class="field" style="max-width:170px;"><label>${t2("password")}</label><input id="ns-pass" placeholder="${t2("pw_min6")}" /></div>
              <div class="field"><label>${t2("full_name_opt")}</label><input id="ns-name" /></div>
              <button id="ns-add">${icon("user-plus")} ${t2("create_student")}</button>
            </div>
            <label style="font-size:0.85rem; color:var(--muted); cursor:pointer; display:block; margin-top:0.5rem;">
              <input type="checkbox" id="ns-invite" /> ${t2("invite_instead")}
            </label>
            <p class="kind" id="ns-invite-note" style="display:none; margin:0.3rem 0 0;">${t2("invite_note")}</p>
          </div>

          <div class="card">
            <div class="card-head"><h2>${icon("book-plus", 18)} ${t2("enroll_title")}</h2></div>
            <div class="form-row">
              <div class="field"><label>${t2("student")}</label>
                <select id="en-student">${studentOptions || `<option value="">${t2("no_students")}</option>`}</select></div>
              <div class="field"><label>${t2("course")}</label>
                <select id="en-course">${courseOptions || `<option value="">${t2("no_courses")}</option>`}</select></div>
              <button id="en-add">${t2("enroll")}</button>
            </div>
            ${(enrollments || []).length ? `
            <table class="stackable" style="margin-top:0.75rem;">
              <thead><tr><th>${t2("student")}</th><th>${t2("course")}</th><th></th></tr></thead>
              <tbody>${(enrollments || []).map(e => `
                <tr>
                  <td data-th="${t2("student")}">${esc(nameOf(sById(e.student_id)))}</td>
                  <td data-th="${t2("course")}">${esc(cTitle(e.course_id))}</td>
                  <td><button class="ghost en-remove" data-id="${e.id}">${t2("remove")}</button></td>
                </tr>`).join("")}</tbody>
            </table>` : `<p class="empty" style="margin-top:0.75rem;">${t2("no_enrollments")}</p>`}
          </div>

          <div class="card">
            <div class="card-head">
              <h2>${icon("users", 18)} ${t2("my_students")}</h2>
              <button class="ghost" id="stu-csv">${icon("download")} ${t2("export_csv")}</button>
            </div>
            ${myStudents.length ? `
            <table class="stackable">
              <thead><tr><th>${t2("student")}</th><th>${t2("email")}</th><th>${t2("completed")}</th>
                <th>${t2("study_time")}</th><th>${t2("last_active")}</th><th>${t2("actions")}</th></tr></thead>
              <tbody>${myStudents.map(s => `
                <tr class="${isPremRow(s) ? "row-premium" : ""}">
                  <td data-th="${t2("student")}">${esc(nameOf(s))} ${memberBadge(s)}${s.plan === "premium" && s.premium_until ? ` <span class="kind">→ ${esc(s.premium_until)}</span>` : ""}${s.suspended ? ` <span class="pill off">${t2("suspended")}</span>` : ""}</td>
                  <td data-th="${t2("email")}">${esc(s.email || "—")}</td>
                  <td data-th="${t2("completed")}">${doneBy[s.id] || 0} ${t2("lessons")}</td>
                  <td data-th="${t2("study_time")}">${fmtTime(timeBy[s.id] || 0)}</td>
                  <td data-th="${t2("last_active")}">${lastBy[s.id] ? new Date(lastBy[s.id]).toLocaleDateString() : t2("never")}</td>
                  <td style="white-space:nowrap;">
                    <button class="ghost pm-tgl" data-id="${s.id}" data-p="${s.plan === "premium" ? "free" : "premium"}">${s.plan === "premium" ? "→ " + t2("free_plan") : "👑 " + t2("premium")}</button>
                    <button class="ghost sd-open" data-id="${s.id}">▸ ${t2("detail")}</button>
                    <button class="ghost st-reset" data-id="${s.id}" data-name="${esc(nameOf(s))}">${icon("key-round")} ${t2("reset_pw")}</button>
                  </td>
                </tr>
                <tr class="sd-panel" data-id="${s.id}" style="display:none;"><td colspan="6">
                  <div class="eng-detail sd-content" data-id="${s.id}">${studentDetailHtml(s)}</div>
                </td></tr>`).join("")}</tbody>
            </table>` : `<p class="empty">${t2("no_students_hint")}</p>`}
          </div>
        </div>

        <div class="tabpane" data-tab="progress">
          <div class="card">
            <div class="card-head">
              <h2>${icon("bar-chart-3", 18)} ${t2("progress")} <span class="kind" id="tp-count"></span></h2>
              <button class="ghost" id="prog-csv">${icon("download")} ${t2("export_csv")}</button>
            </div>
            <div class="form-row" style="margin-bottom:0.6rem;">
              <div class="field" style="max-width:220px;"><label>${t2("course")}</label>
                <select id="tp-course"><option value="all">${t2("all_courses")}</option>${courseOptions}</select></div>
              <div class="field" style="max-width:220px;"><label>${t2("student")}</label>
                <select id="tp-student"><option value="all">${t2("all_students")}</option>
                  ${myStudents.map(s => `<option value="${s.id}">${esc(nameOf(s))}</option>`).join("")}</select></div>
            </div>
            <div id="tp-table"></div>
          </div>
        </div>

        <div class="tabpane" data-tab="asgn">
          <div class="card">
            <div class="card-head"><h2>${icon("clipboard-list", 18)} ${t2("new_asgn")}</h2></div>
            <div class="form-row">
              <div class="field"><label>${t2("title_label")}</label><input id="ag-title" /></div>
              <div class="field" style="max-width:210px;"><label>${t2("course")}</label>
                <select id="ag-course">${courseOptions || `<option value="">${t2("no_courses")}</option>`}</select></div>
              <div class="field" style="max-width:160px;"><label>${t2("due_date")}</label>
                <input type="date" id="ag-due" /></div>
              <div class="field" style="max-width:170px;"><label>${t2("points")}</label>
                <input type="number" id="ag-points" min="1" /></div>
            </div>
            <div class="field" style="margin-top:0.5rem;"><label>${t2("instructions")}</label>
              <textarea id="ag-inst"></textarea></div>
            <button id="ag-add">${icon("clipboard-list")} ${t2("create_asgn")}</button>
          </div>

          <div class="card">
            <div class="card-head"><h2>${icon("clipboard-check", 18)} ${t2("asgn")}</h2></div>
            ${(asgns || []).map(a => {
              const aSubs = (subs || []).filter(s => s.assignment_id === a.id);
              const expected = (enrollments || []).filter(e => e.course_id === a.course_id).length;
              const late = a.due_on && a.due_on < new Date().toISOString().slice(0, 10);
              return `
              <div class="lesson">
                <div class="meta">

      });

        const email = document.getElementById("ns-email").value.trim();
        const password = document.getElementById("ns-pass").value;
        const full_name = document.getElementById("ns-name").value.trim() || null;
        const invite = inviteCb.checked;
        if (!email || (!invite && password.length < 6)) { toast(t2("need_email_pw"), "err"); return; }
        const btn = document.getElementById("ns-add");
        btn.disabled = true;
        try {
          await callFn({ action: "create", email, password, full_name, role: "student",
                         invite, redirect: new URL("reset.html", location.href).href });
          toast(invite ? t2("invited_ok") : t2("created_ok"));

        if (!dcCourse || ![...sel.options].some(o => o.value === dcCourse)) dcCourse = sel.value;

        if (!dcThread) {
          const [{ data: threads }, { data: pc }] = await Promise.all([
            sb.from("discussion_threads").select("*").eq("course_id", dcCourse)
              .order("pinned", { ascending: false }).order("created_at", { ascending: false }),
            sb.from("discussion_posts").select("id, thread_id")
          ]);
          const nP = id => (pc || []).filter(p => p.thread_id === id).length;
          box.innerHTML = `
            <div class="form-row" style="margin-bottom:0.8rem;">
              <div class="field"><label>${t2("new_question")}</label>
                <input id="dq-title" placeholder="${esc(t2("question_ph"))}" /></div>
              <div class="field"><label>${t2("message")}</label>
                <input id="dq-body" placeholder="${esc(t2("first_msg"))}" /></div>
              <button id="dq-ask">${t2("ask")}</button>
            </div>
            ${(threads || []).map(th => `
              <div class="lesson thread-row" data-id="${th.id}">
                <span class="icon">${th.pinned ? "📌" : "💬"}</span>
                <div class="meta">
                  <div class="title">${esc(th.title)}</div>
                  <span class="kind">${esc(th.author_name || "—")} · ${new Date(th.created_at).toLocaleDateString()} ·
                    ${nP(th.id)} ${t2("replies")}${th.locked ? " · 🔒 " + t2("locked") : ""}</span>
                </div>
              </div>`).join("") || `<p class="empty">${t2("no_threads")}</p>`}`;
          box.querySelectorAll(".thread-row").forEach(r => r.addEventListener("click", () => {
            dcThread = r.getAttribute("data-id"); renderDisc();
          }));
          document.getElementById("dq-ask").addEventListener("click", async () => {
            const title = document.getElementById("dq-title").value.trim();
            const bodyTxt = document.getElementById("dq-body").value.trim();
            if (!title || !bodyTxt) { toast(t2("need_q"), "err"); return; }
            const { data: th, error } = await sb.from("discussion_threads").insert({
              course_id: dcCourse, org_id: myOrg, author_id: user.id,
              author_name: myName, title }).select().single();
            if (error) { toast(t2("err_post") + error.message, "err"); return; }
            await sb.from("discussion_posts").insert({
              thread_id: th.id, author_id: user.id, author_name: myName, body: bodyTxt });
            toast(t2("q_posted"));
            renderDisc();
          });
        } else {
          const [{ data: th }, { data: posts }] = await Promise.all([
            sb.from("discussion_threads").select("*").eq("id", dcThread).single(),
            sb.from("discussion_posts").select("*").eq("thread_id", dcThread).order("created_at")
          ]);
          if (!th) { dcThread = null; renderDisc(); return; }
          box.innerHTML = `
            <button class="ghost" id="dc-back" style="margin-bottom:0.7rem;">${t2("back_list")}</button>
            <div class="card-head">
              <h2 style="font-size:1.05rem;">${th.pinned ? "📌 " : ""}${esc(th.title)}</h2>
              <button class="ghost dc-pin">${th.pinned ? t2("unpin") : t2("pin")}</button>
              <button class="ghost dc-lock">${th.locked ? t2("unlock") : t2("lock")}</button>
              <button class="ghost dc-delth"
                      style="color:var(--danger); border-color:var(--danger);">${t2("delete_")}</button>
            </div>
            ${(posts || []).map(p => `
              <div class="post">
                <span class="kind">${esc(p.author_name || "—")} · ${new Date(p.created_at).toLocaleString()}</span>
                <p>${esc(p.body)}</p>
                <button class="ghost dc-delpost" data-id="${p.id}"
                        style="margin-top:0.35rem; padding:0.2rem 0.6rem; font-size:0.78rem; min-height:0;
                               color:var(--danger); border-color:var(--danger);">${t2("delete_")}</button>
              </div>`).join("")}
            ${th.locked ? `<p class="kind">🔒 ${t2("locked_note")}</p>` : `
              <div class="form-row" style="margin-top:0.6rem;">
                <div class="field"><textarea id="dr-body" placeholder="${esc(t2("reply_ph"))}" style="min-height:64px;"></textarea></div>
                <button id="dr-send">${t2("reply")}</button>
              </div>`}`;
          document.getElementById("dc-back").addEventListener("click", () => { dcThread = null; renderDisc(); });
          box.querySelector(".dc-pin").addEventListener("click", async () => {
            await sb.from("discussion_threads").update({ pinned: !th.pinned }).eq("id", th.id);
            renderDisc();
          });
          box.querySelector(".dc-lock").addEventListener("click", async () => {
            await sb.from("discussion_threads").update({ locked: !th.locked }).eq("id", th.id);
            renderDisc();
          });
          box.querySelector(".dc-delth").addEventListener("click", async () => {
            if (!await confirmDialog({ title: t2("del_thread_title"), body: t2("del_thread_body"),
                                       okText: t2("delete_"), danger: true })) return;
            const { error } = await sb.from("discussion_threads").delete().eq("id", th.id);
            if (error) { toast(t2("err_delete") + error.message, "err"); return; }
            toast(t2("deleted_ok"));
            dcThread = null; renderDisc();
          });
          box.querySelectorAll(".dc-delpost").forEach(b => b.addEventListener("click", async () => {
            if (!await confirmDialog({ title: t2("del_post_title"), okText: t2("delete_"), danger: true })) return;
            const { error } = await sb.from("discussion_posts").delete().eq("id", b.getAttribute("data-id"));
            if (error) { toast(t2("err_delete") + error.message, "err"); return; }
            renderDisc();
          }));
          const send = document.getElementById("dr-send");
          if (send) send.addEventListener("click", async () => {
            const bodyTxt = document.getElementById("dr-body").value.trim();
            if (!bodyTxt) { toast(t2("write_message"), "err"); return; }
            const { error } = await sb.from("discussion_posts").insert({
              thread_id: th.id, author_id: user.id, author_name: myName, body: bodyTxt });
            if (error) { toast(t2("err_post") + error.message, "err"); return; }
            toast(t2("reply_posted"));
            renderDisc();
          });
        }
        refreshIcons();
      }
      document.getElementById("dc-course").addEventListener("change", () => {
        dcCourse = document.getElementById("dc-course").value;
        dcThread = null;
        renderDisc();
      });
      renderDisc();

      refreshIcons();
    }

    start();
  </script>
  <script>
    // PWA: offline shell + installability (needs HTTPS, e.g. GitHub Pages)
    if ("serviceWorker" in navigator && location.protocol === "https:")
      navigator.serviceWorker.register("sw.js");
  </script>
</body>
</html>
