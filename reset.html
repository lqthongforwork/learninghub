<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thong's Learning Hub</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="login-wrap">
    <div class="login-card">
      <p class="eyebrow">Thong's Learning Hub</p>
      <h1 data-i18n="reset_title">Set a new password</h1>
      <p data-i18n="reset_sub" style="color:var(--muted); margin:0 0 1.5rem; font-size:0.9rem;">
        Choose a new password for your account.
      </p>

      <div class="field">
        <label for="pw1" data-i18n="new_pw">New password</label>
        <input id="pw1" type="password" autocomplete="new-password" data-i18n-ph="ph_min8" />
      </div>
      <div class="field">
        <label for="pw2" data-i18n="repeat_pw">Repeat new password</label>
        <input id="pw2" type="password" autocomplete="new-password" data-i18n-ph="ph_same" />
      </div>

      <button id="save" data-i18n="save_new_pw" style="width:100%;">Save new password</button>
      <p id="msg" class="msg"></p>
      <p style="text-align:center; margin:1.1rem 0 0; border-top:1px solid var(--line); padding-top:0.9rem;">
        <a href="#" id="lang-toggle" style="font-size:0.85rem; color:var(--muted);"></a>
      </p>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="lang.js"></script>
  <script src="config.js"></script>
  <script>
    applyI18n();
    const langLink = document.getElementById("lang-toggle");
    langLink.textContent = t("lang_name");
    langLink.addEventListener("click", (e) => { e.preventDefault(); setLang(otherLang()); });

    const msg = document.getElementById("msg");
    let ready = false;

    // When the user arrives from the email link, Supabase creates a
    // temporary "recovery" session. We wait for it before allowing a save.
    sb.auth.onAuthStateChange((event, session) => {
      if (event === "PASSWORD_RECOVERY" || session) ready = true;
    });
    sb.auth.getSession().then(({ data }) => { if (data.session) ready = true; });

    document.getElementById("save").addEventListener("click", async () => {
      const p1 = document.getElementById("pw1").value;
      const p2 = document.getElementById("pw2").value;
      msg.className = "msg";

      if (p1.length < 8) { msg.textContent = t("err_min8"); msg.className = "msg err"; return; }
      if (p1 !== p2)     { msg.textContent = t("err_mismatch"); msg.className = "msg err"; return; }
      if (!ready) {
        msg.textContent = t("err_need_link");
        msg.className = "msg err";
        return;
      }

      const { error } = await sb.auth.updateUser({ password: p1 });
      if (error) { msg.textContent = t("err_save") + error.message; msg.className = "msg err"; return; }

      msg.textContent = t("reset_ok");
      setTimeout(() => (window.location.href = "dashboard.html"), 1200);
    });
  </script>
</body>
</html>
